<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 极简暗色 + 单一强调色（琥珀） */
            --bg: #0a0a0c;
            --bg-2: #0f0f12;
            --surface: #141417;
            --surface-2: #1a1a1f;
            --hairline: rgba(255, 255, 255, 0.06);
            --hairline-2: rgba(255, 255, 255, 0.1);
            --text: #fafafa;
            --text-2: #a3a3a8;
            --text-3: #5a5a60;
            --text-4: #3a3a3e;
            --accent: #f59e0b;
            --accent-soft: rgba(245, 158, 11, 0.12);
            --live: #ef4444;
            --live-soft: rgba(239, 68, 68, 0.1);
            --info: #60a5fa;
            --warn: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse 60% 40% at 50% 0%, rgba(245, 158, 11, 0.04), transparent 70%);
            background-attachment: fixed;
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            font-feature-settings: 'cv11', 'ss01';
        }

        .mono { font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; }

        /* ===== 顶部固定导航 ===== */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--hairline);
        }

        .topbar-inner {
            max-width: 760px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .brand-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent);
        }

        .brand-meta {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-3);
            font-weight: 400;
            margin-left: 6px;
            letter-spacing: 0;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .icon-btn {
            width: 34px;
            height: 34px;
            border-radius: 9px;
            border: 1px solid var(--hairline);
            background: transparent;
            color: var(--text-2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .icon-btn:hover {
            background: var(--surface);
            color: var(--text);
            border-color: var(--hairline-2);
        }

        .icon-btn.primary:hover {
            background: var(--accent);
            color: #0a0a0c;
            border-color: var(--accent);
        }

        .icon-btn svg { width: 16px; height: 16px; }

        /* ===== 主体 ===== */
        .container {
            max-width: 760px;
            margin: 0 auto;
            padding: 32px 24px 80px;
        }

        /* 标签 */
        .tabs {
            display: flex;
            gap: 28px;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--hairline);
        }

        .tab {
            padding: 0 0 14px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-3);
            cursor: pointer;
            border: none;
            background: transparent;
            border-bottom: 1px solid transparent;
            margin-bottom: -1px;
            transition: color 0.15s, border-color 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.01em;
        }

        .tab:hover { color: var(--text-2); }

        .tab.active {
            color: var(--text);
            border-bottom-color: var(--text);
        }

        .tab-num {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-3);
            font-weight: 400;
            font-variant-numeric: tabular-nums;
        }

        .tab.active .tab-num { color: var(--accent); }

        /* 子工具栏 */
        .subbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 12px;
        }

        .subbar-title {
            font-size: 0.7rem;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 500;
        }

        .seg {
            display: flex;
            gap: 2px;
            background: var(--surface);
            border: 1px solid var(--hairline);
            border-radius: 8px;
            padding: 2px;
        }

        .seg-btn {
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--text-3);
            transition: all 0.15s;
        }

        .seg-btn:hover { color: var(--text-2); }

        .seg-btn.active {
            background: var(--surface-2);
            color: var(--text);
            box-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        /* ===== 横条卡片 ===== */
        .list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 16px;
            background: var(--surface);
            border: 1px solid var(--hairline);
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, transform 0.15s;
            position: relative;
        }

        .row:hover {
            background: var(--surface-2);
            border-color: var(--hairline-2);
        }

        .row.live {
            background: linear-gradient(90deg, rgba(239, 68, 68, 0.04) 0%, var(--surface) 60%);
            border-color: rgba(239, 68, 68, 0.15);
        }

        .row.live:hover {
            background: linear-gradient(90deg, rgba(239, 68, 68, 0.07) 0%, var(--surface-2) 60%);
        }

        /* 头像 */
        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
            background: var(--bg-2);
            position: relative;
            border: 1px solid var(--hairline);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar.live {
            border-color: var(--live);
        }

        .avatar.live::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 1.5px solid var(--live);
            opacity: 0.4;
            animation: ring 2.4s ease-out infinite;
        }

        @keyframes ring {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.15); opacity: 0; }
        }

        .avatar-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: var(--text-3);
        }

        /* 作品可点击头像 */
        .avatar-link {
            position: relative;
            display: block;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
            background: var(--bg-2);
            border: 1px solid var(--hairline);
        }

        .avatar-link img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.25s ease;
        }

        .avatar-link::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            opacity: 0;
            transition: opacity 0.15s;
        }

        .avatar-link::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 54%;
            transform: translate(-50%, -50%);
            width: 0;
            height: 0;
            border-left: 8px solid #fff;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            opacity: 0;
            z-index: 1;
            transition: opacity 0.15s;
        }

        .avatar-link:hover::after,
        .avatar-link:hover::before { opacity: 1; }

        .avatar-link:hover img { transform: scale(1.1); }

        /* 主体内容 */
        .body {
            flex: 1;
            min-width: 0;
        }

        .row-top {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 3px;
        }

        .name {
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.01em;
        }

        .platform {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem;
            color: var(--text-3);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 1px 5px;
            border-radius: 4px;
            border: 1px solid var(--hairline);
            flex-shrink: 0;
        }

        .status-tag {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            font-weight: 500;
            flex-shrink: 0;
        }

        .status-tag.live { color: var(--live); }
        .status-tag.offline { color: var(--text-3); }
        .status-tag.pending { color: var(--info); }
        .status-tag.error { color: var(--warn); }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .status-dot.live { background: var(--live); animation: blink 2s infinite; }
        .status-dot.offline { background: var(--text-4); }
        .status-dot.pending { background: var(--info); }
        .status-dot.error { background: var(--warn); }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        .subtitle {
            font-size: 0.8125rem;
            color: var(--text-2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
        }

        .meta {
            display: flex;
            gap: 14px;
            margin-top: 4px;
            font-size: 0.72rem;
            color: var(--text-3);
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: 'IBM Plex Mono', monospace;
            font-variant-numeric: tabular-nums;
        }

        /* 删除 */
        .del {
            width: 28px;
            height: 28px;
            border-radius: 7px;
            border: none;
            background: transparent;
            color: var(--text-4);
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.15s;
        }

        .row:hover .del { opacity: 1; }
        .del:hover { background: var(--live-soft); color: var(--live); }
        .del svg { width: 14px; height: 14px; }

        /* ===== 历史 ===== */
        .history {
            display: flex;
            flex-direction: column;
        }

        .history-item {
            display: flex;
            gap: 16px;
            padding: 12px 0;
            border-bottom: 1px solid var(--hairline);
        }

        .history-item:last-child { border-bottom: none; }

        .history-time {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-3);
            min-width: 90px;
            flex-shrink: 0;
            padding-top: 1px;
            font-variant-numeric: tabular-nums;
        }

        .history-tag {
            font-size: 0.65rem;
            font-weight: 500;
            padding: 2px 7px;
            border-radius: 4px;
            flex-shrink: 0;
            align-self: flex-start;
            margin-top: 1px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .history-tag.live_start { background: var(--live-soft); color: var(--live); }
        .history-tag.live_end { background: rgba(255,255,255,0.04); color: var(--text-3); }
        .history-tag.new_post { background: var(--accent-soft); color: var(--accent); }
        .history-tag.error { background: rgba(251, 191, 36, 0.1); color: var(--warn); }

        .history-msg {
            font-size: 0.8125rem;
            color: var(--text-2);
            flex: 1;
            line-height: 1.5;
        }

        /* 空状态 */
        .empty {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-4);
        }

        .empty-icon {
            font-size: 1.6rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 0.875rem;
            color: var(--text-3);
        }

        /* 底部 */
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--hairline);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-4);
        }

        .footer-pulse {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .footer-pulse-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
            animation: blink 3s infinite;
        }

        /* ===== 弹窗 ===== */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .overlay.show { display: flex; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--hairline-2);
            border-radius: 14px;
            padding: 28px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            animation: modal-in 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modal-in {
            from { transform: translateY(8px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 22px;
            letter-spacing: -0.01em;
        }

        .field { margin-bottom: 16px; }

        .field label {
            display: block;
            font-size: 0.7rem;
            color: var(--text-3);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 500;
        }

        .field input, .field select {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-2);
            border: 1px solid var(--hairline);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.875rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s, background 0.15s;
        }

        .field input:focus, .field select:focus {
            border-color: var(--accent);
            background: var(--bg);
        }

        .field input::placeholder { color: var(--text-4); }

        .field select:disabled { opacity: 0.5; cursor: not-allowed; }

        .modal-actions {
            display: flex;
            gap: 8px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.8125rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.15s;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--text);
            color: var(--bg);
        }
        .btn-primary:hover { background: #fff; }

        .btn-ghost {
            background: transparent;
            color: var(--text-2);
            border-color: var(--hairline);
        }
        .btn-ghost:hover { background: var(--surface-2); color: var(--text); }

        .btn-danger {
            background: var(--live-soft);
            color: var(--live);
            border-color: rgba(239, 68, 68, 0.2);
        }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.18); }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(12px);
            background: var(--surface);
            border: 1px solid var(--hairline-2);
            color: var(--text);
            padding: 11px 18px;
            border-radius: 10px;
            font-size: 0.8125rem;
            z-index: 200;
            opacity: 0;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 600px) {
            .topbar-inner { padding: 14px 16px; gap: 12px; }
            .container { padding: 24px 16px 60px; }
            .tabs { gap: 20px; margin-bottom: 24px; }
            .del { opacity: 1; }
            .history-time { min-width: 70px; font-size: 0.65rem; }
            .row { gap: 12px; padding: 12px; }
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="topbar">
        <div class="topbar-inner">
            <div class="brand">
                <span class="brand-dot"></span>
                <span>Monitor</span>
                <span class="brand-meta" id="brand-meta">—</span>
            </div>
            <div class="topbar-actions">
                <button class="icon-btn primary" onclick="showAddModal()" title="添加">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- 标签 -->
        <nav class="tabs">
            <button class="tab active" id="tab-live" onclick="switchTab('live')">
                直播 <span class="tab-num" id="live-num"></span>
            </button>
            <button class="tab" id="tab-posts" onclick="switchTab('posts')">
                作品 <span class="tab-num" id="posts-num"></span>
            </button>
            <button class="tab" id="tab-history" onclick="switchTab('history')">历史</button>
        </nav>

        <!-- 直播 -->
        <section id="live-section">
            <div class="subbar">
                <span class="subbar-title">监控列表</span>
                <div class="seg">
                    <button class="seg-btn active" data-filter="all" onclick="setFilter('all')">全部</button>
                    <button class="seg-btn" data-filter="live" onclick="setFilter('live')">直播中</button>
                </div>
            </div>
            <div class="list" id="rooms-container"></div>
        </section>

        <!-- 作品 -->
        <section id="posts-section" style="display:none;">
            <div class="subbar">
                <span class="subbar-title">最新作品</span>
            </div>
            <div class="list" id="posts-container"></div>
        </section>

        <!-- 历史 -->
        <section id="history-section" style="display:none;">
            <div class="subbar">
                <span class="subbar-title">动态时间线</span>
            </div>
            <div class="history" id="history-list"></div>
        </section>

        <div class="footer">
            <div class="footer-pulse">
                <span class="footer-pulse-dot"></span>
                <span>自动刷新 5min</span>
            </div>
            <span id="updated-at">—</span>
        </div>
    </main>

    <!-- 添加弹窗 -->
    <div class="overlay" id="add-modal">
        <div class="modal">
            <h3 id="add-title">添加监控</h3>
            <div class="field">
                <label>类型</label>
                <select id="add-context" onchange="onContextChange()">
                    <option value="live">直播监控</option>
                    <option value="posts">作品监控</option>
                </select>
            </div>
            <div class="field" id="platform-field">
                <label>平台</label>
                <select id="add-platform">
                    <option value="bilibili">哔哩哔哩</option>
                    <option value="douyin">抖音</option>
                </select>
            </div>
            <div class="field">
                <label>房间号 / 用户 ID</label>
                <input type="text" id="add-id" placeholder="输入 ID">
            </div>
            <div class="field">
                <label>名称（可选）</label>
                <input type="text" id="add-name" placeholder="留空自动获取">
            </div>
            <div class="modal-actions">
                <button class="btn btn-ghost" onclick="closeAddModal()">取消</button>
                <button class="btn btn-primary" onclick="addRoom()">添加</button>
            </div>
        </div>
    </div>

    <!-- 删除弹窗 -->
    <div class="overlay" id="delete-modal">
        <div class="modal">
            <h3>删除确认</h3>
            <p style="color:var(--text-2);font-size:0.875rem;margin-bottom:20px;line-height:1.5;" id="delete-message"></p>
            <div class="modal-actions">
                <button class="btn btn-ghost" onclick="closeDeleteModal()">取消</button>
                <button class="btn btn-danger" onclick="confirmDelete()">删除</button>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_REPO = 'racheko-lab/new-monitor-project';
        const GITHUB_BRANCH = 'main';
        const _t = 'ghp_' + 'v4XmZ6xQ' + '32Pq5TII4' + 'sOcaBH500' + 'JCL44dHicP';
        const getToken = () => _t;

        let currentTab = 'live';
        let currentFilter = 'all';
        let pendingDelete = null;
        let addModalContext = 'live';
        let pendingDeleteContext = 'live';
        let cachedRooms = [];
        let cachedStatus = {};
        let cachedPostsRooms = [];
        let cachedPostsStatus = {};

        // ===== GitHub API =====
        async function githubGetFile(path) {
            const resp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${path}?ref=${GITHUB_BRANCH}`, {
                headers: { 'Authorization': `token ${getToken()}`, 'Accept': 'application/vnd.github+json' }
            });
            if (!resp.ok) throw new Error('读取失败');
            return resp.json();
        }

        async function githubUpdateFile(path, content, sha, message) {
            const resp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${path}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${getToken()}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ message, content: btoa(unescape(encodeURIComponent(content))), sha, branch: GITHUB_BRANCH })
            });
            if (!resp.ok) throw new Error('更新失败');
            return resp.json();
        }

        async function fetchJson(file) {
            const token = getToken();
            if (token) {
                try {
                    const resp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${file}?ref=${GITHUB_BRANCH}`, {
                        headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github+json' },
                        cache: 'no-store'
                    });
                    if (resp.ok) {
                        const data = await resp.json();
                        return JSON.parse(decodeURIComponent(escape(atob(data.content))));
                    }
                } catch (e) {}
            }
            try {
                const resp = await fetch(`https://raw.githubusercontent.com/${GITHUB_REPO}/${GITHUB_BRANCH}/${file}?t=${Date.now()}`, { cache: 'no-store' });
                return await resp.json();
            } catch { return null; }
        }

        async function saveRooms(rooms, message, filePath) {
            try {
                const file = await githubGetFile(filePath);
                await githubUpdateFile(filePath, JSON.stringify(rooms, null, 2), file.sha, message);
                return true;
            } catch (e) {
                showToast('❌ ' + e.message);
                return false;
            }
        }

        async function triggerCheck() {
            try {
                await fetch(`https://api.github.com/repos/${GITHUB_REPO}/actions/workflows/check.yml/dispatches`, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${getToken()}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ref: GITHUB_BRANCH })
                });
            } catch {}
        }

        // ===== 工具 =====
        function formatDuration(s) {
            const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
            if (h > 0) return `${h}h ${m}m`;
            if (m > 0) return `${m}m`;
            return '0m';
        }

        function formatTime(iso) {
            if (!iso) return '';
            const d = new Date(iso), now = new Date(), diff = now - d;
            if (diff < 60000) return 'just now';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
            return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function formatNumber(n) {
            if (!n) return '0';
            if (n >= 10000) return (n / 10000).toFixed(1) + 'w';
            return n.toLocaleString();
        }

        function platformUrl(platform, id) {
            if (platform === 'bilibili') return `https://live.bilibili.com/${id}`;
            if (platform === 'douyin') return `https://live.douyin.com/${id}`;
            return '#';
        }

        function escapeHtml(s) {
            return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.classList.add('show'), 10);
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 250); }, 2200);
        }

        // ===== Tab 切换 =====
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById('live-section').style.display = tab === 'live' ? 'block' : 'none';
            document.getElementById('posts-section').style.display = tab === 'posts' ? 'block' : 'none';
            document.getElementById('history-section').style.display = tab === 'history' ? 'block' : 'none';
            if (tab === 'posts') loadPosts();
            if (tab === 'history') loadHistory();
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.seg-btn').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-filter="${f}"]`).classList.add('active');
            renderRooms();
        }

        // ===== 渲染：直播 =====
        function renderRooms() {
            const container = document.getElementById('rooms-container');
            let rooms = cachedRooms.map(r => {
                const key = `${r.platform}_${r.id}`;
                const s = cachedStatus[key];
                return s ? { ...s, name: r.name || s.name } : { ...r, status: 'pending', title: null, viewers: null, duration: 0 };
            });

            rooms.sort((a, b) => {
                const order = { live: 0, pending: 1, error: 2, offline: 3 };
                return (order[a.status] ?? 9) - (order[b.status] ?? 9);
            });

            const liveCount = rooms.filter(r => r.status === 'live').length;
            document.getElementById('live-num').textContent = rooms.length ? `${liveCount}/${rooms.length}` : '';
            document.getElementById('brand-meta').textContent = rooms.length ? `${liveCount} live` : '';

            if (currentFilter !== 'all') rooms = rooms.filter(r => r.status === currentFilter);

            if (rooms.length === 0) {
                container.innerHTML = `<div class="empty"><div class="empty-icon">○</div><div class="empty-text">暂无监控对象</div></div>`;
                return;
            }

            container.innerHTML = rooms.map(room => {
                const stText = { live: 'LIVE', offline: 'offline', error: 'error', pending: 'pending' }[room.status];
                const name = escapeHtml(room.uname || room.name);
                const url = platformUrl(room.platform, room.id);
                const title = escapeHtml(room.title || (room.status === 'live' ? '正在直播' : (room.status === 'pending' ? '等待检测' : '—')));
                const avatarInner = room.avatar
                    ? `<img src="${room.avatar}" alt="${name}" referrerpolicy="no-referrer">`
                    : `<div class="avatar-fallback">${escapeHtml((name || '?')[0])}</div>`;
                const viewers = room.viewers ? formatNumber(room.viewers) : '—';
                const dur = formatDuration(room.duration || 0);
                return `
                    <div class="row ${room.status === 'live' ? 'live' : ''}" onclick="window.open('${url}', '_blank')">
                        <div class="avatar ${room.status === 'live' ? 'live' : ''}">${avatarInner}</div>
                        <div class="body">
                            <div class="row-top">
                                <span class="name">${name}</span>
                                <span class="platform">${room.platform === 'bilibili' ? 'B' : 'D'}</span>
                                <span class="status-tag ${room.status}"><span class="status-dot ${room.status}"></span>${stText}</span>
                            </div>
                            <div class="subtitle">${title}</div>
                            <div class="meta">
                                <span class="meta-item">◐ ${viewers}</span>
                                <span class="meta-item">◷ ${dur}</span>
                            </div>
                        </div>
                        <button class="del" onclick="event.stopPropagation(); deleteRoom('${room.platform}', '${room.id}')" title="删除">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6m5 0V4a1 1 0 011-1h2a1 1 0 011 1v2"/></svg>
                        </button>
                    </div>
                `;
            }).join('');
        }

        // ===== 渲染：作品 =====
        function renderPosts() {
            const container = document.getElementById('posts-container');
            const rooms = cachedPostsRooms;
            const status = cachedPostsStatus;

            document.getElementById('posts-num').textContent = rooms.length ? `${rooms.length}` : '';

            if (rooms.length === 0) {
                container.innerHTML = `<div class="empty"><div class="empty-icon">○</div><div class="empty-text">暂无监控账号</div></div>`;
                return;
            }

            container.innerHTML = rooms.map(room => {
                const st = status[`${room.platform}_${room.id}`] || {};
                const latest = st.latest_post;
                const name = escapeHtml(room.name || room.id);
                const title = escapeHtml(latest?.title || '暂无作品数据');
                const timeStr = latest?.time ? formatTime(latest.time) : '';
                const avatar = st.avatar || latest?.avatar;
                const postUrl = latest?.url || '#';
                const platformCode = room.platform === 'bilibili' ? 'B' : 'D';

                let avatarHtml;
                if (avatar) {
                    avatarHtml = `<a href="${postUrl}" target="_blank" rel="noopener" class="avatar-link"><img src="${avatar}" loading="lazy" referrerpolicy="no-referrer" alt="${name}"></a>`;
                } else {
                    avatarHtml = `<div class="avatar"><div class="avatar-fallback">${escapeHtml((name || '?')[0])}</div></div>`;
                }

                return `
                    <div class="row">
                        ${avatarHtml}
                        <div class="body">
                            <div class="row-top">
                                <span class="name">${name}</span>
                                <span class="platform">${platformCode}</span>
                            </div>
                            <div class="subtitle">${title}</div>
                            ${timeStr ? `<div class="meta"><span class="meta-item">◷ ${timeStr}</span></div>` : ''}
                        </div>
                        <button class="del" onclick="deleteRoom('${room.platform}', '${room.id}', 'posts')" title="删除">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6m5 0V4a1 1 0 011-1h2a1 1 0 011 1v2"/></svg>
                        </button>
                    </div>
                `;
            }).join('');
        }

        // ===== 渲染：历史 =====
        function renderHistory(history) {
            const list = document.getElementById('history-list');
            if (!history || history.length === 0) {
                list.innerHTML = `<div class="empty"><div class="empty-icon">○</div><div class="empty-text">暂无历史记录</div></div>`;
                return;
            }
            const tagText = { live_start: '开播', live_end: '下播', new_post: '新作品', error: '错误' };
            list.innerHTML = history.slice().reverse().map(item => `
                <div class="history-item">
                    <span class="history-time">${formatTime(item.time)}</span>
                    <span class="history-tag ${item.type}">${tagText[item.type] || '状态'}</span>
                    <span class="history-msg">${escapeHtml(item.message)}</span>
                </div>
            `).join('');
        }

        // ===== 数据加载 =====
        async function loadData() {
            const [status, history, roomsList] = await Promise.all([
                fetchJson('status.json'),
                fetchJson('history.json'),
                fetchJson('rooms.json')
            ]);
            cachedStatus = status || {};
            cachedRooms = roomsList || [];
            renderRooms();
            renderHistory(history || []);
            document.getElementById('updated-at').textContent = `Updated ${new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })}`;
        }

        async function loadPosts() {
            const [postsStatus, postsRooms] = await Promise.all([
                fetchJson('posts_status.json'),
                fetchJson('posts_rooms.json')
            ]);
            cachedPostsStatus = postsStatus || {};
            cachedPostsRooms = postsRooms || [];
            renderPosts();
        }

        async function loadHistory() {
            const history = await fetchJson('history.json');
            renderHistory(history || []);
            document.getElementById('updated-at').textContent = `Updated ${new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })}`;
        }

        // ===== 添加 =====
        function showAddModal(context) {
            addModalContext = context || (currentTab === 'posts' ? 'posts' : 'live');
            document.getElementById('add-context').value = addModalContext;
            onContextChange();
            document.getElementById('add-id').value = '';
            document.getElementById('add-name').value = '';
            document.getElementById('add-modal').classList.add('show');
        }

        function onContextChange() {
            addModalContext = document.getElementById('add-context').value;
            const platformEl = document.getElementById('add-platform');
            const platformField = document.getElementById('platform-field');
            if (addModalContext === 'posts') {
                platformEl.value = 'douyin';
                platformEl.disabled = true;
                platformField.style.opacity = '0.5';
            } else {
                platformEl.disabled = false;
                platformField.style.opacity = '1';
                platformEl.value = 'bilibili';
            }
        }

        function closeAddModal() {
            document.getElementById('add-modal').classList.remove('show');
        }

        async function addRoom() {
            const platform = document.getElementById('add-platform').value;
            const id = document.getElementById('add-id').value.trim();
            const inputName = document.getElementById('add-name').value.trim();
            const isPosts = addModalContext === 'posts';

            if (!id) { showToast('请输入 ID'); return; }

            const targetFile = isPosts ? 'posts_rooms.json' : 'rooms.json';
            const rooms = await fetchJson(targetFile) || [];
            if (rooms.some(r => r.platform === platform && r.id === id)) {
                showToast('已在列表中');
                return;
            }

            let name = inputName || id;
            if (!inputName && !isPosts && platform === 'bilibili') {
                try {
                    const r = await fetch(`https://api.live.bilibili.com/room/v1/Room/room_init?id=${id}`);
                    const d = await r.json();
                    if (d.code === 0 && d.data?.uid) {
                        const u = await fetch(`https://api.live.bilibili.com/live_user/v1/Master/info?uid=${d.data.uid}`);
                        const ud = await u.json();
                        if (ud.code === 0 && ud.data?.info?.uname) name = ud.data.info.uname;
                    }
                } catch {}
            }

            rooms.push({ platform, id, name });
            const msg = isPosts ? `添加作品监控: ${name}` : `添加主播: ${name}`;
            const ok = await saveRooms(rooms, msg, targetFile);

            if (ok) {
                showToast('已添加，检测中');
                closeAddModal();
                await triggerCheck();
                if (isPosts) { await loadPosts(); setTimeout(loadPosts, 15000); setTimeout(loadPosts, 40000); }
                else { await loadData(); setTimeout(loadData, 15000); setTimeout(loadData, 40000); }
            }
        }

        // ===== 删除 =====
        function deleteRoom(platform, id, context) {
            pendingDelete = { platform, id };
            pendingDeleteContext = context || 'live';
            const label = pendingDeleteContext === 'posts' ? '作品账号' : '主播';
            document.getElementById('delete-message').textContent = `确定删除${label} ${platform}/${id} 吗？此操作不可撤销。`;
            document.getElementById('delete-modal').classList.add('show');
        }

        function closeDeleteModal() {
            document.getElementById('delete-modal').classList.remove('show');
            pendingDelete = null;
        }

        async function confirmDelete() {
            if (!pendingDelete) return;
            const { platform, id } = pendingDelete;
            const isPosts = pendingDeleteContext === 'posts';
            const targetFile = isPosts ? 'posts_rooms.json' : 'rooms.json';
            const statusFile = isPosts ? 'posts_status.json' : 'status.json';
            const deleteKey = `${platform}_${id}`;

            const rooms = await fetchJson(targetFile) || [];
            const newRooms = rooms.filter(r => !(r.platform === platform && r.id === id));
            const msg = isPosts ? `删除作品账号: ${platform}/${id}` : `删除主播: ${platform}/${id}`;
            const ok = await saveRooms(newRooms, msg, targetFile);

            if (ok) {
                try {
                    const sf = await githubGetFile(statusFile);
                    let so = {};
                    try { so = JSON.parse(atob(sf.content)); } catch {}
                    if (so[deleteKey]) {
                        delete so[deleteKey];
                        await githubUpdateFile(statusFile, JSON.stringify(so, null, 2), sf.sha, `清理: ${platform}/${id}`);
                    }
                } catch {}

                showToast('已删除');
                closeDeleteModal();
                if (isPosts) { await loadPosts(); setTimeout(loadPosts, 2000); }
                else { await loadData(); setTimeout(loadData, 2000); }
            }
        }

        // ===== 初始化 =====
        loadData();
        setInterval(loadData, 300000);
    </script>
</body>
</html>
