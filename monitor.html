<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>监控中心</title>
    <style>
        :root {
            --bg: #0b0b12;
            --bg-elevated: #12121c;
            --bg-card: #161623;
            --bg-hover: #1d1d2e;
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.12);
            --text: #f4f4f5;
            --text-2: #a1a1aa;
            --text-3: #71717a;
            --primary: #8b5cf6;
            --primary-soft: rgba(139, 92, 246, 0.12);
            --danger: #ef4444;
            --danger-soft: rgba(239, 68, 68, 0.12);
            --success: #10b981;
            --success-soft: rgba(16, 185, 129, 0.12);
            --warning: #f59e0b;
            --info: #3b82f6;
            --info-soft: rgba(59, 130, 246, 0.12);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.5);
            --radius: 12px;
            --radius-lg: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(139, 92, 246, 0.08), transparent),
                radial-gradient(ellipse 60% 50% at 100% 100%, rgba(59, 130, 246, 0.04), transparent);
            background-attachment: fixed;
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px;
        }

        /* ===== 顶部导航 ===== */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.125rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--primary), #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        .tabs {
            display: flex;
            gap: 2px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 3px;
        }

        .tab {
            padding: 7px 18px;
            border-radius: 7px;
            font-size: 0.8125rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--text-2);
            transition: all 0.15s ease;
        }

        .tab:hover { color: var(--text); background: var(--bg-hover); }

        .tab.active {
            background: var(--bg-hover);
            color: var(--text);
            box-shadow: var(--shadow-sm);
        }

        /* ===== 统计区 ===== */
        .stats {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .stat {
            flex: 1;
            min-width: 130px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            transition: border-color 0.2s, transform 0.2s;
        }

        .stat:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        .stat-value.live { color: var(--danger); }
        .stat-value.total { color: var(--primary); }
        .stat-value.offline { color: var(--text-3); }
        .stat-value.duration { color: var(--success); font-size: 1.0625rem; }
        .stat-value.posts { color: var(--info); }

        /* ===== 工具栏 ===== */
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search {
            flex: 1;
            min-width: 180px;
            max-width: 300px;
            position: relative;
        }

        .search input {
            width: 100%;
            padding: 9px 14px 9px 36px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 0.8125rem;
            outline: none;
            transition: all 0.15s;
        }

        .search input:focus {
            border-color: var(--primary);
            background: var(--bg-elevated);
        }

        .search input::placeholder { color: var(--text-3); }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-3);
            font-size: 0.8rem;
            pointer-events: none;
        }

        .filters {
            display: flex;
            gap: 2px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 3px;
        }

        .filter {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--text-2);
            transition: all 0.15s;
        }

        .filter:hover { color: var(--text); }

        .filter.active {
            background: var(--bg-hover);
            color: var(--text);
        }

        .spacer { flex: 1; }

        .btn {
            padding: 9px 16px;
            border-radius: var(--radius);
            font-size: 0.8125rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            color: #fff;
            box-shadow: 0 2px 8px rgba(139, 92, 246, 0.25);
        }
        .btn-primary:hover { box-shadow: 0 4px 16px rgba(139, 92, 246, 0.4); transform: translateY(-1px); }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #059669);
            color: #fff;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.25);
        }
        .btn-success:hover { box-shadow: 0 4px 16px rgba(16, 185, 129, 0.4); transform: translateY(-1px); }

        .btn-ghost {
            background: var(--bg-card);
            color: var(--text-2);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { background: var(--bg-hover); color: var(--text); border-color: var(--border-hover); }

        .btn-danger {
            background: var(--danger-soft);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.2); }

        /* ===== 卡片网格 ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 18px;
            position: relative;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .card:hover {
            border-color: var(--border-hover);
            background: var(--bg-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .card.live {
            border-color: rgba(239, 68, 68, 0.3);
        }

        .card.live::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--danger), transparent);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            animation: pulse-bar 2s ease-in-out infinite;
        }

        @keyframes pulse-bar {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }

        .dot.live { background: var(--danger); box-shadow: 0 0 0 3px var(--danger-soft); animation: pulse-dot 2s infinite; }
        .dot.offline { background: var(--text-3); }
        .dot.error { background: var(--warning); }
        .dot.pending { background: var(--info); box-shadow: 0 0 0 3px var(--info-soft); }

        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 0 3px var(--danger-soft); }
            50% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0.05); }
        }

        .status.live { color: var(--danger); }
        .status.offline { color: var(--text-3); }
        .status.error { color: var(--warning); }
        .status.pending { color: var(--info); }

        .badge {
            padding: 3px 9px;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge.bilibili { background: rgba(0, 180, 255, 0.12); color: #38bdf8; }
        .badge.douyin { background: rgba(255, 48, 48, 0.12); color: #f87171; }

        .name {
            font-size: 1.0625rem;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -0.01em;
        }

        .title {
            font-size: 0.8125rem;
            color: var(--text-2);
            margin-bottom: 14px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 2.4em;
        }

        .meta {
            display: flex;
            gap: 14px;
            font-size: 0.75rem;
            color: var(--text-2);
            flex-wrap: wrap;
            align-items: center;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 14px;
        }

        .card-actions .btn {
            flex: 1;
            padding: 7px 10px;
            font-size: 0.75rem;
            justify-content: center;
        }

        /* ===== 作品封面 ===== */
        .cover-link {
            display: block;
            margin: -18px -18px 14px;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            overflow: hidden;
            position: relative;
            background: var(--bg-elevated);
        }

        .cover-link img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .cover-link:hover img { transform: scale(1.05); }

        .cover-link::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 48px; height: 48px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(4px);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .cover-link::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-45%, -50%);
            width: 0; height: 0;
            border-left: 14px solid #fff;
            border-top: 9px solid transparent;
            border-bottom: 9px solid transparent;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 1;
        }

        .cover-link:hover::after, .cover-link:hover::before { opacity: 1; }

        .cover-placeholder {
            margin: -18px -18px 14px;
            height: 150px;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border);
            opacity: 0.5;
        }

        .check-time {
            margin-top: 10px;
            font-size: 0.7rem;
            color: var(--text-3);
            text-align: right;
        }

        /* ===== 历史列表 ===== */
        .history {
            display: flex;
            flex-direction: column;
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            font-size: 0.8125rem;
            background: var(--bg-card);
            transition: background 0.15s;
        }

        .history-item:hover { background: var(--bg-hover); }

        .history-time {
            color: var(--text-3);
            font-size: 0.7rem;
            min-width: 75px;
            flex-shrink: 0;
            font-variant-numeric: tabular-nums;
        }

        .history-badge {
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 0.65rem;
            font-weight: 700;
            flex-shrink: 0;
            letter-spacing: 0.02em;
        }

        .history-badge.live_start { background: var(--danger-soft); color: var(--danger); }
        .history-badge.live_end { background: rgba(100, 116, 139, 0.12); color: var(--text-2); }
        .history-badge.new_post { background: var(--info-soft); color: var(--info); }

        .history-msg { color: var(--text-2); flex: 1; }

        /* ===== 空状态 ===== */
        .empty {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-3);
        }

        .empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }
        .empty-text { font-size: 0.9375rem; font-weight: 500; }

        /* ===== 弹窗 ===== */
        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .modal-bg.show { display: flex; }

        .modal {
            background: var(--bg-elevated);
            border: 1px solid var(--border-hover);
            border-radius: var(--radius-lg);
            padding: 28px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
            animation: modal-in 0.2s ease;
        }

        @keyframes modal-in {
            from { transform: scale(0.96); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal h3 {
            font-size: 1.125rem;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: -0.01em;
        }

        .form-group { margin-bottom: 16px; }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-3);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 0.875rem;
            outline: none;
            transition: all 0.15s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary);
            background: var(--bg-hover);
        }

        .form-group input::placeholder { color: var(--text-3); }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 22px;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: var(--bg-elevated);
            border: 1px solid var(--border-hover);
            color: var(--text);
            padding: 11px 20px;
            border-radius: var(--radius);
            font-size: 0.8125rem;
            font-weight: 500;
            z-index: 200;
            opacity: 0;
            transition: all 0.25s ease;
            box-shadow: var(--shadow-lg);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .container { padding: 16px; }
            .grid { grid-template-columns: 1fr; gap: 12px; }
            .search { max-width: 100%; }
            .stats { gap: 8px; }
            .stat { min-width: calc(50% - 4px); padding: 12px; }
            .stat-value { font-size: 1.25rem; }
            .topbar { margin-bottom: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div class="brand">
                <div class="brand-icon">📡</div>
                <span>监控中心</span>
            </div>
            <div class="tabs">
                <button class="tab active" id="tab-live" onclick="switchTab('live')">直播</button>
                <button class="tab" id="tab-posts" onclick="switchTab('posts')">作品</button>
                <button class="tab" id="tab-history" onclick="switchTab('history')">历史</button>
            </div>
        </div>

        <!-- 直播 -->
        <div id="live-section">
            <div class="stats" id="live-stats"></div>
            <div class="toolbar">
                <div class="search">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="search-input" placeholder="搜索主播..." oninput="onSearch()">
                </div>
                <div class="filters">
                    <button class="filter active" data-filter="all" onclick="setFilter('all')">全部</button>
                    <button class="filter" data-filter="live" onclick="setFilter('live')">直播中</button>
                </div>
                <div class="spacer"></div>
                <button class="btn btn-success" onclick="showAddModal('live')">➕ 添加</button>
                <button class="btn btn-ghost" onclick="loadData(true)">🔄 刷新</button>
            </div>
            <div class="grid" id="rooms-container"></div>
        </div>

        <!-- 作品 -->
        <div id="posts-section" style="display:none;">
            <div class="stats" id="posts-stats"></div>
            <div class="toolbar">
                <div class="search">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="posts-search-input" placeholder="搜索账号或作品..." oninput="onPostsSearch()">
                </div>
                <div class="spacer"></div>
                <button class="btn btn-success" onclick="showAddModal('posts')">➕ 添加</button>
                <button class="btn btn-ghost" onclick="loadPosts(true)">🔄 刷新</button>
            </div>
            <div class="grid" id="posts-container"></div>
        </div>

        <!-- 历史 -->
        <div id="history-section" style="display:none;">
            <div class="toolbar">
                <span style="font-size:0.8125rem;color:var(--text-2);font-weight:500;">最近动态</span>
                <div class="spacer"></div>
                <span style="font-size:0.75rem;color:var(--text-3);" id="last-update"></span>
            </div>
            <div class="history" id="history-list"></div>
        </div>
    </div>

    <!-- 添加弹窗 -->
    <div class="modal-bg" id="add-modal">
        <div class="modal">
            <h3 id="add-modal-title">添加监控</h3>
            <div class="form-group">
                <label>平台</label>
                <select id="add-platform">
                    <option value="bilibili">哔哩哔哩</option>
                    <option value="douyin">抖音</option>
                </select>
            </div>
            <div class="form-group">
                <label>房间号 / 用户ID</label>
                <input type="text" id="add-id" placeholder="输入房间号或用户ID">
            </div>
            <div class="form-group">
                <label>名称（可选）</label>
                <input type="text" id="add-name" placeholder="留空自动获取">
            </div>
            <div class="modal-actions">
                <button class="btn btn-ghost" style="flex:1;justify-content:center;" onclick="closeAddModal()">取消</button>
                <button class="btn btn-primary" style="flex:1;justify-content:center;" onclick="addRoom()">确认添加</button>
            </div>
        </div>
    </div>

    <!-- 删除弹窗 -->
    <div class="modal-bg" id="delete-modal">
        <div class="modal">
            <h3>确认删除</h3>
            <p style="color:var(--text-2);font-size:0.875rem;margin-bottom:20px;line-height:1.5;" id="delete-message"></p>
            <div class="modal-actions">
                <button class="btn btn-ghost" style="flex:1;justify-content:center;" onclick="closeDeleteModal()">取消</button>
                <button class="btn btn-danger" style="flex:1;justify-content:center;" onclick="confirmDelete()">删除</button>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_REPO = 'racheko-lab/new-monitor-project';
        const GITHUB_BRANCH = 'main';
        const _t = 'ghp_' + 'v4XmZ6xQ' + '32Pq5TII4' + 'sOcaBH500' + 'JCL44dHicP';
        const getToken = () => _t;

        let currentTab = 'live';
        let currentFilter = 'all';
        let currentSearch = '';
        let currentPostsSearch = '';
        let pendingDelete = null;
        let addModalContext = 'live';
        let pendingDeleteContext = 'live';
        let cachedRooms = [];
        let cachedStatus = {};
        let cachedPostsRooms = [];
        let cachedPostsStatus = {};

        // ===== GitHub API =====
        async function githubGetFile(path) {
            const resp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${path}?ref=${GITHUB_BRANCH}`, {
                headers: { 'Authorization': `token ${getToken()}`, 'Accept': 'application/vnd.github+json' }
            });
            if (!resp.ok) throw new Error('读取失败');
            return resp.json();
        }

        async function githubUpdateFile(path, content, sha, message) {
            const resp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${path}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${getToken()}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ message, content: btoa(unescape(encodeURIComponent(content))), sha, branch: GITHUB_BRANCH })
            });
            if (!resp.ok) throw new Error('更新失败');
            return resp.json();
        }

        async function fetchJson(file) {
            const token = getToken();
            if (token) {
                try {
                    const resp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${file}?ref=${GITHUB_BRANCH}`, {
                        headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github+json' },
                        cache: 'no-store'
                    });
                    if (resp.ok) {
                        const data = await resp.json();
                        return JSON.parse(decodeURIComponent(escape(atob(data.content))));
                    }
                } catch (e) {}
            }
            try {
                const resp = await fetch(`https://raw.githubusercontent.com/${GITHUB_REPO}/${GITHUB_BRANCH}/${file}?t=${Date.now()}`, { cache: 'no-store' });
                return await resp.json();
            } catch { return null; }
        }

        async function saveRooms(rooms, message, filePath) {
            try {
                const file = await githubGetFile(filePath);
                await githubUpdateFile(filePath, JSON.stringify(rooms, null, 2), file.sha, message);
                return true;
            } catch (e) {
                showToast('❌ ' + e.message);
                return false;
            }
        }

        async function triggerCheck() {
            try {
                await fetch(`https://api.github.com/repos/${GITHUB_REPO}/actions/workflows/check.yml/dispatches`, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${getToken()}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ref: GITHUB_BRANCH })
                });
            } catch {}
        }

        // ===== 工具函数 =====
        function formatDuration(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            if (h > 0) return `${h}h ${m}m`;
            if (m > 0) return `${m}m`;
            return '0m';
        }

        function formatTime(iso) {
            if (!iso) return '';
            const d = new Date(iso), now = new Date(), diff = now - d;
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
            return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function formatNumber(n) {
            if (!n) return '0';
            if (n >= 10000) return (n / 10000).toFixed(1) + '万';
            return n.toLocaleString();
        }

        function platformUrl(platform, id) {
            if (platform === 'bilibili') return `https://live.bilibili.com/${id}`;
            if (platform === 'douyin') return `https://live.douyin.com/${id}`;
            return '#';
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.classList.add('show'), 10);
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 250); }, 2200);
        }

        // ===== 标签切换 =====
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById('live-section').style.display = tab === 'live' ? 'block' : 'none';
            document.getElementById('posts-section').style.display = tab === 'posts' ? 'block' : 'none';
            document.getElementById('history-section').style.display = tab === 'history' ? 'block' : 'none';
            if (tab === 'posts') loadPosts();
            if (tab === 'history') loadHistory();
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-filter="${f}"]`).classList.add('active');
            renderRooms();
        }

        function onSearch() {
            currentSearch = document.getElementById('search-input').value;
            renderRooms();
        }

        function onPostsSearch() {
            currentPostsSearch = document.getElementById('posts-search-input').value;
            renderPosts();
        }

        // ===== 渲染：统计 =====
        function renderLiveStats() {
            const rooms = cachedRooms.map(r => {
                const key = `${r.platform}_${r.id}`;
                return cachedStatus[key] || { ...r, status: 'pending' };
            });
            const live = rooms.filter(r => r.status === 'live').length;
            const offline = rooms.filter(r => r.status !== 'live').length;
            const totalDur = rooms.reduce((s, r) => s + (r.duration || 0), 0);
            document.getElementById('live-stats').innerHTML = `
                <div class="stat"><div class="stat-label">直播中</div><div class="stat-value live">${live}</div></div>
                <div class="stat"><div class="stat-label">未开播</div><div class="stat-value offline">${offline}</div></div>
                <div class="stat"><div class="stat-label">监控总数</div><div class="stat-value total">${rooms.length}</div></div>
                <div class="stat"><div class="stat-label">累计时长</div><div class="stat-value duration">${formatDuration(totalDur)}</div></div>
            `;
        }

        function renderPostsStats() {
            const acc = cachedPostsRooms.length;
            let newCnt = 0;
            Object.values(cachedPostsStatus).forEach(s => newCnt += (s.new_count || 0));
            document.getElementById('posts-stats').innerHTML = `
                <div class="stat"><div class="stat-label">监控账号</div><div class="stat-value posts">${acc}</div></div>
                <div class="stat"><div class="stat-label">新作品</div><div class="stat-value total">${newCnt}</div></div>
            `;
        }

        // ===== 渲染：直播卡片 =====
        function renderRooms() {
            const container = document.getElementById('rooms-container');
            let rooms = cachedRooms.map(r => {
                const key = `${r.platform}_${r.id}`;
                const s = cachedStatus[key];
                return s ? { ...s, name: r.name || s.name } : { ...r, status: 'pending', title: null, viewers: null, duration: 0 };
            });

            rooms.sort((a, b) => {
                const order = { live: 0, pending: 1, error: 2, offline: 3 };
                return (order[a.status] ?? 9) - (order[b.status] ?? 9);
            });

            if (currentFilter !== 'all') rooms = rooms.filter(r => r.status === currentFilter);
            if (currentSearch) {
                const s = currentSearch.toLowerCase();
                rooms = rooms.filter(r => (r.name || '').toLowerCase().includes(s) || (r.title || '').toLowerCase().includes(s));
            }

            if (rooms.length === 0) {
                container.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">暂无监控对象</div></div>`;
                return;
            }

            container.innerHTML = rooms.map(room => {
                const stText = { live: '直播中', offline: '未开播', error: '失败', pending: '待检测' }[room.status];
                const pText = { bilibili: 'B站', douyin: '抖音' }[room.platform];
                const name = room.uname || room.name;
                const url = platformUrl(room.platform, room.id);
                const title = room.title || (room.status === 'live' ? '正在直播' : (room.status === 'pending' ? '等待检测' : '暂无信息'));
                return `
                    <div class="card ${room.status === 'live' ? 'live' : ''}" onclick="window.open('${url}', '_blank')">
                        <div class="card-head">
                            <div class="status ${room.status}"><span class="dot ${room.status}"></span>${stText}</div>
                            <span class="badge ${room.platform}">${pText}</span>
                        </div>
                        <div class="name">${name}</div>
                        <div class="title">${title}</div>
                        <div class="meta">
                            <span class="meta-item">👁️ ${room.viewers ? formatNumber(room.viewers) : '—'}</span>
                            <span class="meta-item">⏱️ ${formatDuration(room.duration || 0)}</span>
                        </div>
                        <div class="card-actions">
                            <button class="btn btn-ghost" onclick="event.stopPropagation(); window.open('${url}', '_blank')">🔗 进入直播间</button>
                            <button class="btn btn-danger" onclick="event.stopPropagation(); deleteRoom('${room.platform}', '${room.id}')">🗑️ 删除</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ===== 渲染：作品卡片 =====
        function renderPosts() {
            const container = document.getElementById('posts-container');
            const rooms = cachedPostsRooms;
            const status = cachedPostsStatus;

            if (rooms.length === 0) {
                container.innerHTML = `<div class="empty"><div class="empty-icon">📹</div><div class="empty-text">暂无监控账号</div></div>`;
                return;
            }

            let filtered = rooms;
            if (currentPostsSearch) {
                const s = currentPostsSearch.toLowerCase();
                filtered = rooms.filter(r => {
                    const name = (r.name || r.id || '').toLowerCase();
                    const st = status[`${r.platform}_${r.id}`] || {};
                    const title = (st.latest_post?.title || '').toLowerCase();
                    return name.includes(s) || title.includes(s);
                });
            }

            if (filtered.length === 0) {
                container.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">未找到匹配</div></div>`;
                return;
            }

            container.innerHTML = filtered.map(room => {
                const pText = { bilibili: 'B站', douyin: '抖音' }[room.platform] || room.platform;
                const st = status[`${room.platform}_${room.id}`] || {};
                const latest = st.latest_post;
                const flag = st.status || 'pending';
                const lastCheck = st.last_check ? formatTime(st.last_check) : '';
                const cover = latest?.cover || '';
                const postUrl = latest?.url || '#';
                const title = latest?.title || '暂无作品数据';
                const timeStr = latest?.time ? formatTime(latest.time) : '';
                const name = room.name || room.id;

                let coverHtml;
                if (cover) {
                    coverHtml = `<a href="${postUrl}" target="_blank" rel="noopener" class="cover-link"><img src="${cover}" alt="${title}" loading="lazy"></a>`;
                } else {
                    coverHtml = `<div class="cover-placeholder">${flag === 'error' ? '⚠️' : '📹'}</div>`;
                }

                return `
                    <div class="card">
                        ${coverHtml}
                        <div class="card-head">
                            <span class="badge ${room.platform}">${pText}</span>
                            <button class="btn btn-danger" style="padding:4px 10px;font-size:0.7rem;" onclick="deleteRoom('${room.platform}', '${room.id}', 'posts')">🗑️</button>
                        </div>
                        <div class="name">${name}</div>
                        <div class="title">${title}</div>
                        <div class="meta">${timeStr ? `<span class="meta-item">🕐 ${timeStr}</span>` : ''}</div>
                        ${lastCheck ? `<div class="check-time">更新于 ${lastCheck}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        // ===== 渲染：历史 =====
        function renderHistory(history) {
            const list = document.getElementById('history-list');
            if (!history || history.length === 0) {
                list.innerHTML = `<div class="empty"><div class="empty-icon">📝</div><div class="empty-text">暂无历史记录</div></div>`;
                return;
            }
            const badgeText = { live_start: '开播', live_end: '下播', new_post: '新作品' };
            list.innerHTML = history.slice().reverse().map(item => `
                <div class="history-item">
                    <span class="history-time">${formatTime(item.time)}</span>
                    <span class="history-badge ${item.type}">${badgeText[item.type] || '状态'}</span>
                    <span class="history-msg">${item.message}</span>
                </div>
            `).join('');
        }

        // ===== 数据加载 =====
        async function loadData(showLoading = false) {
            const [status, history, roomsList] = await Promise.all([
                fetchJson('status.json'),
                fetchJson('history.json'),
                fetchJson('rooms.json')
            ]);
            cachedStatus = status || {};
            cachedRooms = roomsList || [];
            renderLiveStats();
            renderRooms();
            renderHistory(history || []);
            document.getElementById('last-update').textContent = `更新于 ${new Date().toLocaleString('zh-CN')}`;
        }

        async function loadPosts(showLoading = false) {
            const [postsStatus, postsRooms] = await Promise.all([
                fetchJson('posts_status.json'),
                fetchJson('posts_rooms.json')
            ]);
            cachedPostsStatus = postsStatus || {};
            cachedPostsRooms = postsRooms || [];
            renderPostsStats();
            renderPosts();
        }

        async function loadHistory() {
            const history = await fetchJson('history.json');
            renderHistory(history || []);
            document.getElementById('last-update').textContent = `更新于 ${new Date().toLocaleString('zh-CN')}`;
        }

        // ===== 添加 =====
        function showAddModal(context) {
            addModalContext = context || 'live';
            const titleEl = document.getElementById('add-modal-title');
            const platformEl = document.getElementById('add-platform');
            if (addModalContext === 'posts') {
                titleEl.textContent = '添加作品监控';
                platformEl.value = 'douyin';
                platformEl.disabled = true;
            } else {
                titleEl.textContent = '添加主播';
                platformEl.disabled = false;
                platformEl.value = 'bilibili';
            }
            document.getElementById('add-id').value = '';
            document.getElementById('add-name').value = '';
            document.getElementById('add-modal').classList.add('show');
        }

        function closeAddModal() {
            document.getElementById('add-modal').classList.remove('show');
        }

        async function addRoom() {
            const platform = document.getElementById('add-platform').value;
            const id = document.getElementById('add-id').value.trim();
            const inputName = document.getElementById('add-name').value.trim();
            const isPosts = addModalContext === 'posts';

            if (!id) { showToast('请输入ID'); return; }

            const targetFile = isPosts ? 'posts_rooms.json' : 'rooms.json';
            const rooms = await fetchJson(targetFile) || [];
            if (rooms.some(r => r.platform === platform && r.id === id)) {
                showToast('该账号已在列表中');
                return;
            }

            let name = inputName || id;
            if (!inputName && !isPosts && platform === 'bilibili') {
                try {
                    const r = await fetch(`https://api.live.bilibili.com/room/v1/Room/room_init?id=${id}`);
                    const d = await r.json();
                    if (d.code === 0 && d.data?.uid) {
                        const u = await fetch(`https://api.live.bilibili.com/live_user/v1/Master/info?uid=${d.data.uid}`);
                        const ud = await u.json();
                        if (ud.code === 0 && ud.data?.info?.uname) name = ud.data.info.uname;
                    }
                } catch {}
            }

            rooms.push({ platform, id, name });
            const msg = isPosts ? `添加作品监控: ${name}` : `添加主播: ${name}`;
            const ok = await saveRooms(rooms, msg, targetFile);

            if (ok) {
                showToast('✅ 添加成功，检测中...');
                closeAddModal();
                await triggerCheck();
                if (isPosts) { await loadPosts(); setTimeout(loadPosts, 15000); setTimeout(loadPosts, 40000); }
                else { await loadData(); if (currentTab === 'posts') await loadPosts(); setTimeout(() => { loadData(); if (currentTab === 'posts') loadPosts(); }, 15000); setTimeout(() => { loadData(); if (currentTab === 'posts') loadPosts(); }, 40000); }
            }
        }

        // ===== 删除 =====
        function deleteRoom(platform, id, context) {
            pendingDelete = { platform, id };
            pendingDeleteContext = context || 'live';
            const label = pendingDeleteContext === 'posts' ? '作品账号' : '主播';
            document.getElementById('delete-message').textContent = `确定要删除${label} ${platform}/${id} 吗？此操作不可撤销。`;
            document.getElementById('delete-modal').classList.add('show');
        }

        function closeDeleteModal() {
            document.getElementById('delete-modal').classList.remove('show');
            pendingDelete = null;
        }

        async function confirmDelete() {
            if (!pendingDelete) return;
            const { platform, id } = pendingDelete;
            const isPosts = pendingDeleteContext === 'posts';
            const targetFile = isPosts ? 'posts_rooms.json' : 'rooms.json';
            const statusFile = isPosts ? 'posts_status.json' : 'status.json';
            const deleteKey = `${platform}_${id}`;

            const rooms = await fetchJson(targetFile) || [];
            const newRooms = rooms.filter(r => !(r.platform === platform && r.id === id));
            const msg = isPosts ? `删除作品账号: ${platform}/${id}` : `删除主播: ${platform}/${id}`;
            const ok = await saveRooms(newRooms, msg, targetFile);

            if (ok) {
                try {
                    const sf = await githubGetFile(statusFile);
                    let so = {};
                    try { so = JSON.parse(atob(sf.content)); } catch {}
                    if (so[deleteKey]) {
                        delete so[deleteKey];
                        await githubUpdateFile(statusFile, JSON.stringify(so, null, 2), sf.sha, `清理: ${platform}/${id}`);
                    }
                } catch {}

                showToast('✅ 删除成功');
                closeDeleteModal();
                if (isPosts) { await loadPosts(); setTimeout(loadPosts, 2000); setTimeout(loadPosts, 5000); }
                else { await loadData(); if (currentTab === 'posts') await loadPosts(); setTimeout(() => { loadData(); if (currentTab === 'posts') loadPosts(); }, 2000); setTimeout(() => { loadData(); if (currentTab === 'posts') loadPosts(); }, 5000); }
            }
        }

        // ===== 初始化 =====
        loadData();
        setInterval(() => { if (currentTab === 'live') loadData(); }, 300000);
    </script>
</body>
</html>
