<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08080b;
            --surface: #0e0e13;
            --surface-hi: #16161d;
            --surface-active: #1c1c25;
            --divider: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.08);
            --border-hi: rgba(255,255,255,0.14);
            --text: #fafafa;
            --text-2: #9ca3af;
            --text-3: #6b7280;
            --text-4: #374151;
            --live: #ef4444;
            --live-soft: rgba(239,68,68,0.08);
            --live-glow: rgba(239,68,68,0.12);
            --new: #3b82f6;
            --new-soft: rgba(59,130,246,0.08);
            --warn: #f59e0b;
            --ease: cubic-bezier(0.4,0,0.2,1);
            --ease-out: cubic-bezier(0.16,1,0.3,1);
            --r: 14px;
            --r-sm: 10px;
            --r-xs: 7px;
        }

        *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

        html { font-size: 15px; -webkit-text-size-adjust: 100%; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        .app {
            max-width: 680px;
            margin: 0 auto;
            padding: 52px 24px 96px;
        }

        /* ===== Header ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 36px;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.035em;
            color: var(--text);
        }

        .icon-btn {
            width: 38px;
            height: 38px;
            border-radius: var(--r-sm);
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.18s var(--ease);
        }
        .icon-btn:hover {
            background: var(--surface-hi);
            color: var(--text);
            border-color: var(--border-hi);
        }
        .icon-btn:active { transform: scale(0.97); }
        .icon-btn svg { width: 15px; height: 15px; }

        /* ===== Segmented Control ===== */
        .segmented {
            display: flex;
            gap: 2px;
            padding: 3px;
            background: var(--surface);
            border-radius: var(--r-sm);
            margin-bottom: 28px;
        }

        .seg {
            flex: 1;
            padding: 8px 12px;
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--text-3);
            cursor: pointer;
            border: none;
            background: none;
            border-radius: var(--r-xs);
            transition: all 0.2s var(--ease);
            font-family: inherit;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .seg:hover { color: var(--text-2); }
        .seg.active {
            color: var(--text);
            background: var(--surface-hi);
            box-shadow: 0 1px 2px rgba(0,0,0,0.25);
        }

        .seg-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6875rem;
            color: var(--text-4);
            font-weight: 500;
        }
        .seg.active .seg-count { color: var(--text-3); }

        /* ===== Chips ===== */
        .chips {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
        }

        .chip {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: none;
            color: var(--text-3);
            transition: all 0.15s var(--ease);
            font-family: inherit;
        }
        .chip:hover { color: var(--text-2); background: var(--surface); }
        .chip.active {
            color: var(--text);
            background: var(--surface-hi);
        }

        /* ===== Panel Transition ===== */
        .panel { display: none; }
        .panel.active {
            display: block;
            animation: panelIn 0.28s var(--ease-out);
        }
        @keyframes panelIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== Surface (no border, depth via bg) ===== */
        .surface {
            background: var(--surface);
            border-radius: var(--r);
            overflow: hidden;
        }

        /* ===== Row ===== */
        .row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 20px;
            cursor: pointer;
            transition: background 0.15s var(--ease);
            position: relative;
        }
        .row + .row { border-top: 1px solid var(--divider); }
        .row:hover { background: var(--surface-hi); }
        .row:hover .row-del { opacity: 1; }

        .row.is-live {
            background: linear-gradient(90deg, var(--live-soft) 0%, transparent 40%);
        }
        .row.is-live:hover {
            background: linear-gradient(90deg, var(--live-glow) 0%, var(--surface-hi) 40%);
        }

        /* Avatar */
        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
            background: var(--surface-hi);
            position: relative;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .avatar.is-live {
            box-shadow: 0 0 0 2px var(--surface), 0 0 0 3.5px var(--live);
        }
        .avatar-fb {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--text-3);
        }

        /* Avatar link (posts) */
        .av-link {
            display: block;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
            background: var(--surface-hi);
            position: relative;
        }
        .av-link img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.2s var(--ease), transform 0.25s var(--ease-out);
        }
        .av-link:hover img { filter: brightness(0.55); transform: scale(1.06); }
        .av-link .play {
            position: absolute;
            top: 50%; left: 52%;
            transform: translate(-50%,-50%);
            width: 0; height: 0;
            border-left: 9px solid #fff;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            opacity: 0;
            transition: opacity 0.2s var(--ease);
            filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5));
        }
        .av-link:hover .play { opacity: 1; }

        /* Row body */
        .row-body { flex: 1; min-width: 0; }

        .row-head {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 3px;
        }

        .row-name {
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.015em;
        }

        .tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.625rem;
            color: var(--text-4);
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .status {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.6875rem;
            font-weight: 600;
            flex-shrink: 0;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .status.live { color: var(--live); }
        .status.offline { color: var(--text-4); }
        .status.pending { color: var(--new); }
        .status.error { color: var(--warn); }

        .sd {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .sd.live { background: var(--live); box-shadow: 0 0 7px var(--live); animation: pulse 2s ease-in-out infinite; }
        .sd.offline { background: var(--text-4); }
        .sd.pending { background: var(--new); }
        .sd.error { background: var(--warn); }

        @keyframes pulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        .row-sub {
            font-size: 0.8125rem;
            color: var(--text-2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
        }

        .row-meta {
            display: flex;
            gap: 14px;
            margin-top: 4px;
            font-size: 0.6875rem;
            color: var(--text-3);
        }
        .row-meta span {
            font-family: 'JetBrains Mono', monospace;
            font-variant-numeric: tabular-nums;
        }

        /* Delete */
        .row-del {
            width: 30px;
            height: 30px;
            border-radius: var(--r-xs);
            border: none;
            background: none;
            color: var(--text-4);
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.15s var(--ease);
        }
        .row-del:hover {
            background: var(--live-soft);
            color: var(--live);
        }
        .row-del svg { width: 13px; height: 13px; }

        /* ===== Timeline ===== */
        .tl-item {
            display: flex;
            gap: 14px;
            padding: 13px 20px;
            transition: background 0.15s var(--ease);
        }
        .tl-item:hover { background: var(--surface-hi); }
        .tl-item + .tl-item { border-top: 1px solid var(--divider); }

        .tl-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6875rem;
            color: var(--text-4);
            min-width: 56px;
            flex-shrink: 0;
            padding-top: 2px;
        }

        .tl-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 5px;
        }
        .tl-dot.live_start { background: var(--live); box-shadow: 0 0 5px var(--live); }
        .tl-dot.live_end { background: var(--text-4); }
        .tl-dot.new_post { background: var(--new); box-shadow: 0 0 5px var(--new); }
        .tl-dot.error { background: var(--warn); }

        .tl-text {
            font-size: 0.8125rem;
            color: var(--text-2);
            flex: 1;
            line-height: 1.5;
        }

        /* ===== Empty ===== */
        .empty {
            text-align: center;
            padding: 72px 20px;
        }
        .empty svg {
            width: 28px;
            height: 28px;
            color: var(--text-4);
            margin: 0 auto 14px;
            display: block;
        }
        .empty-text {
            font-size: 0.8125rem;
            color: var(--text-3);
        }

        /* ===== Modal ===== */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s var(--ease), visibility 0.25s var(--ease);
        }
        .overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 28px;
            width: 100%;
            max-width: 380px;
            transform: scale(0.96) translateY(8px);
            transition: transform 0.3s var(--ease-out);
            box-shadow: 0 20px 50px -12px rgba(0,0,0,0.5);
        }
        .overlay.show .modal {
            transform: scale(1) translateY(0);
        }

        .modal-title {
            font-size: 1.0625rem;
            font-weight: 600;
            margin-bottom: 24px;
            letter-spacing: -0.02em;
        }

        .field { margin-bottom: 16px; }
        .field label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-3);
            margin-bottom: 7px;
            font-weight: 500;
        }
        .field input, .field select {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            color: var(--text);
            font-size: 0.8125rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s var(--ease), background 0.15s var(--ease);
        }
        .field input:focus, .field select:focus {
            border-color: var(--border-hi);
            background: var(--surface-hi);
        }
        .field input::placeholder { color: var(--text-4); }
        .field select:disabled { opacity: 0.4; }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 26px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border-radius: var(--r-sm);
            font-size: 0.8125rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            font-family: inherit;
            transition: all 0.15s var(--ease);
        }
        .btn-primary {
            background: var(--text);
            color: var(--bg);
        }
        .btn-primary:hover { background: #fff; }
        .btn-primary:active { transform: scale(0.98); }

        .btn-ghost {
            background: transparent;
            color: var(--text-2);
            border-color: var(--border);
        }
        .btn-ghost:hover {
            background: var(--surface-hi);
            color: var(--text);
            border-color: var(--border-hi);
        }

        .btn-danger {
            background: var(--live-soft);
            color: var(--live);
            border-color: rgba(239,68,68,0.15);
        }
        .btn-danger:hover { background: var(--live-glow); }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(16px);
            background: var(--surface-active);
            border: 1px solid var(--border-hi);
            color: var(--text);
            padding: 11px 20px;
            border-radius: var(--r-sm);
            font-size: 0.8125rem;
            font-weight: 500;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s var(--ease-out);
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 640px) {
            .app { padding: 32px 16px 80px; }
            .header { margin-bottom: 28px; }
            .header-title { font-size: 1.35rem; }
            .segmented { margin-bottom: 22px; }
            .row { padding: 14px 16px; gap: 12px; }
            .avatar, .av-link { width: 38px; height: 38px; }
            .row-del { opacity: 1; }
            .tl-item { padding: 12px 16px; }
            .empty { padding: 56px 20px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <h1 class="header-title">Monitor</h1>
            <button class="icon-btn" onclick="showAddModal()" aria-label="添加">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            </button>
        </header>

        <nav class="segmented">
            <button class="seg active" id="tab-live" onclick="switchTab('live')">直播<span class="seg-count" id="live-n"></span></button>
            <button class="seg" id="tab-posts" onclick="switchTab('posts')">作品<span class="seg-count" id="posts-n"></span></button>
            <button class="seg" id="tab-history" onclick="switchTab('history')">历史</button>
        </nav>

        <section id="live-section" class="panel active">
            <div class="chips">
                <button class="chip active" data-f="all" onclick="setFilter('all')">全部</button>
                <button class="chip" data-f="live" onclick="setFilter('live')">直播中</button>
            </div>
            <div class="surface" id="live-surface"></div>
        </section>

        <section id="posts-section" class="panel">
            <div class="surface" id="posts-surface"></div>
        </section>

        <section id="history-section" class="panel">
            <div class="surface" id="history-surface"></div>
        </section>
    </div>

    <div class="overlay" id="add-modal">
        <div class="modal">
            <div class="modal-title">添加监控</div>
            <div class="field">
                <label>类型</label>
                <select id="add-ctx" onchange="onCtxChange()">
                    <option value="live">直播监控</option>
                    <option value="posts">作品监控</option>
                </select>
            </div>
            <div class="field" id="plat-field">
                <label>平台</label>
                <select id="add-plat">
                    <option value="bilibili">哔哩哔哩</option>
                    <option value="douyin">抖音</option>
                </select>
            </div>
            <div class="field">
                <label>房间号 / 用户 ID</label>
                <input type="text" id="add-id" placeholder="输入 ID">
            </div>
            <div class="field">
                <label>名称（可选）</label>
                <input type="text" id="add-name" placeholder="留空自动获取">
            </div>
            <div class="modal-actions">
                <button class="btn btn-ghost" onclick="closeAdd()">取消</button>
                <button class="btn btn-primary" onclick="doAdd()">添加</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="del-modal">
        <div class="modal">
            <div class="modal-title">删除确认</div>
            <p style="color:var(--text-2);font-size:0.8125rem;margin-bottom:8px;line-height:1.6;" id="del-msg"></p>
            <div class="modal-actions">
                <button class="btn btn-ghost" onclick="closeDel()">取消</button>
                <button class="btn btn-danger" onclick="doDel()">删除</button>
            </div>
        </div>
    </div>

    <script>
        const REPO = 'racheko-lab/new-monitor-project';
        const BRANCH = 'main';
        const TK = 'ghp_' + 'v4XmZ6xQ' + '32Pq5TII4' + 'sOcaBH500' + 'JCL44dHicP';
        const tok = () => TK;

        let tab = 'live', filter = 'all';
        let rooms = [], status = {}, prooms = [], pstatus = [];
        let pendingDel = null, delCtx = 'live', addCtx = 'live';

        async function ghGet(p) {
            const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${p}?ref=${BRANCH}`, {
                headers: { Authorization: `token ${tok()}`, Accept: 'application/vnd.github+json' }
            });
            if (!r.ok) throw new Error('fail');
            return r.json();
        }
        async function ghPut(p, c, s, m) {
            const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${p}`, {
                method: 'PUT',
                headers: { Authorization: `token ${tok()}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: m, content: btoa(unescape(encodeURIComponent(c))), sha: s, branch: BRANCH })
            });
            if (!r.ok) throw new Error('fail');
            return r.json();
        }
        async function fetchJ(f) {
            if (tok()) {
                try {
                    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${f}?ref=${BRANCH}`, {
                        headers: { Authorization: `token ${tok()}`, Accept: 'application/vnd.github+json' }, cache: 'no-store'
                    });
                    if (r.ok) { const d = await r.json(); return JSON.parse(decodeURIComponent(escape(atob(d.content)))); }
                } catch {}
            }
            try { const r = await fetch(`https://raw.githubusercontent.com/${REPO}/${BRANCH}/${f}?t=${Date.now()}`, {cache:'no-store'}); return await r.json(); }
            catch { return null; }
        }
        async function saveRooms(arr, msg, fp) {
            try { const f = await ghGet(fp); await ghPut(fp, JSON.stringify(arr,null,2), f.sha, msg); return true; }
            catch (e) { toast('失败: '+e.message); return false; }
        }
        async function trigger() {
            try { await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/check.yml/dispatches`, {
                method:'POST', headers:{Authorization:`token ${tok()}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},
                body: JSON.stringify({ref:BRANCH}) }); } catch {}
        }

        function fmtDur(s) { const h=Math.floor(s/3600),m=Math.floor((s%3600)/60); return h?`${h}h ${m}m`:(m?`${m}m`:'0m'); }
        function fmtTime(iso) {
            if(!iso) return '';
            const d=new Date(iso), n=new Date(), df=n-d;
            if(df<60000) return '刚刚';
            if(df<3600000) return Math.floor(df/60000)+'m';
            if(df<86400000) return Math.floor(df/3600000)+'h';
            return d.toLocaleDateString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
        }
        function fmtNum(n) { return n>=10000?(n/10000).toFixed(1)+'w':(n||'0').toLocaleString(); }
        function pUrl(p,id) { return p==='bilibili'?`https://live.bilibili.com/${id}`:(p==='douyin'?`https://live.douyin.com/${id}`:'#'); }
        function esc(s){return(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
        function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);requestAnimationFrame(()=>t.classList.add('show'));setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},2200);}

        function switchTab(t) {
            tab = t;
            document.querySelectorAll('.seg').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(t+'-section').classList.add('active');
            if (t === 'posts') loadPosts();
            if (t === 'history') loadHistory();
        }
        function setFilter(f) {
            filter = f;
            document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-f="${f}"]`).classList.add('active');
            renderRooms();
        }

        const TRASH_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6m5 0V4a1 1 0 011-1h2a1 1 0 011 1v2"/></svg>';
        const EMPTY_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="9"/></svg>';

        function renderRooms() {
            const el = document.getElementById('live-surface');
            let arr = rooms.map(r => {
                const k = `${r.platform}_${r.id}`, s = status[k];
                return s ? {...s, name: r.name || s.name} : {...r, status:'pending', title:null, viewers:null, duration:0};
            });
            arr.sort((a,b) => ({live:0,pending:1,error:2,offline:3}[a.status]??9) - ({live:0,pending:1,error:2,offline:3}[b.status]??9));
            const liveN = arr.filter(r => r.status === 'live').length;
            document.getElementById('live-n').textContent = arr.length ? `${liveN}/${arr.length}` : '';
            if (filter !== 'all') arr = arr.filter(r => r.status === filter);
            if (!arr.length) { el.innerHTML = emptyHtml('暂无监控对象'); return; }
            el.innerHTML = arr.map(r => {
                const st = {live:'LIVE',offline:'OFFLINE',error:'ERROR',pending:'CHECKING'}[r.status];
                const nm = esc(r.uname || r.name);
                const ttl = esc(r.title || (r.status==='live'?'正在直播':r.status==='pending'?'检测中':'—'));
                const av = r.avatar
                    ? `<img src="${r.avatar}" alt="${nm}" referrerpolicy="no-referrer">`
                    : `<div class="avatar-fb">${esc((nm||'?')[0])}</div>`;
                const v = r.viewers ? fmtNum(r.viewers) : '—';
                const d = fmtDur(r.duration||0);
                const isLive = r.status === 'live';
                return `<div class="row${isLive?' is-live':''}" onclick="window.open('${pUrl(r.platform,r.id)}','_blank')">
                    <div class="avatar${isLive?' is-live':''}">${av}</div>
                    <div class="row-body">
                        <div class="row-head">
                            <span class="row-name">${nm}</span>
                            <span class="tag">${r.platform==='bilibili'?'BILI':'DY'}</span>
                            <span class="status ${r.status}"><span class="sd ${r.status}"></span>${st}</span>
                        </div>
                        <div class="row-sub">${ttl}</div>
                        <div class="row-meta"><span>${v} 观看</span><span>${d}</span></div>
                    </div>
                    <button class="row-del" onclick="event.stopPropagation();askDel('${r.platform}','${r.id}')">${TRASH_SVG}</button>
                </div>`;
            }).join('');
        }

        function renderPosts() {
            const el = document.getElementById('posts-surface');
            document.getElementById('posts-n').textContent = prooms.length ? `${prooms.length}` : '';
            if (!prooms.length) { el.innerHTML = emptyHtml('暂无监控账号'); return; }
            el.innerHTML = prooms.map(r => {
                const st = pstatus[`${r.platform}_${r.id}`] || {}, lp = st.latest_post;
                const nm = esc(r.name||r.id), ttl = esc(lp?.title||'暂无作品'), ts = lp?.time ? fmtTime(lp.time) : '';
                const av = st.avatar || lp?.avatar, url = lp?.url || '#';
                const avH = av
                    ? `<a href="${url}" target="_blank" rel="noopener" class="av-link"><img src="${av}" referrerpolicy="no-referrer" alt="${nm}"><span class="play"></span></a>`
                    : `<div class="avatar"><div class="avatar-fb">${esc((nm||'?')[0])}</div></div>`;
                return `<div class="row">
                    ${avH}
                    <div class="row-body">
                        <div class="row-head">
                            <span class="row-name">${nm}</span>
                            <span class="tag">${r.platform==='bilibili'?'BILI':'DY'}</span>
                        </div>
                        <div class="row-sub">${ttl}</div>
                        ${ts ? `<div class="row-meta"><span>${ts}</span></div>` : ''}
                    </div>
                    <button class="row-del" onclick="askDel('${r.platform}','${r.id}','posts')">${TRASH_SVG}</button>
                </div>`;
            }).join('');
        }

        function renderHistory(h) {
            const el = document.getElementById('history-surface');
            if (!h || !h.length) { el.innerHTML = emptyHtml('暂无记录'); return; }
            const tg = {live_start:'live_start', live_end:'live_end', new_post:'new_post'};
            el.innerHTML = h.slice().reverse().map(i => `<div class="tl-item">
                <span class="tl-time">${fmtTime(i.time)}</span>
                <span class="tl-dot ${tg[i.type]||'live_end'}"></span>
                <span class="tl-text">${esc(i.message)}</span>
            </div>`).join('');
        }

        function emptyHtml(t) {
            return `<div class="empty">${EMPTY_SVG}<div class="empty-text">${t}</div></div>`;
        }

        async function loadData() {
            const [s,h,rl] = await Promise.all([fetchJ('status.json'), fetchJ('history.json'), fetchJ('rooms.json')]);
            status = s || {}; rooms = rl || [];
            renderRooms(); renderHistory(h||[]);
        }
        async function loadPosts() {
            const [ps,pr] = await Promise.all([fetchJ('posts_status.json'), fetchJ('posts_rooms.json')]);
            pstatus = ps || {}; prooms = pr || []; renderPosts();
        }
        async function loadHistory() { const h = await fetchJ('history.json'); renderHistory(h||[]); }

        function showAddModal(c) {
            addCtx = c || (tab === 'posts' ? 'posts' : 'live');
            document.getElementById('add-ctx').value = addCtx;
            onCtxChange();
            document.getElementById('add-id').value = '';
            document.getElementById('add-name').value = '';
            document.getElementById('add-modal').classList.add('show');
        }
        function onCtxChange() {
            addCtx = document.getElementById('add-ctx').value;
            const p = document.getElementById('add-plat'), pf = document.getElementById('plat-field');
            if (addCtx === 'posts') { p.value = 'douyin'; p.disabled = true; pf.style.opacity = '0.4'; }
            else { p.disabled = false; pf.style.opacity = '1'; p.value = 'bilibili'; }
        }
        function closeAdd() { document.getElementById('add-modal').classList.remove('show'); }

        function askDel(p, id, c) {
            pendingDel = {p, id}; delCtx = c || 'live';
            document.getElementById('del-msg').textContent = `删除${delCtx==='posts'?'作品账号':'主播'} ${p}/${id}？`;
            document.getElementById('del-modal').classList.add('show');
        }
        function closeDel() { document.getElementById('del-modal').classList.remove('show'); pendingDel = null; }

        async function doAdd() {
            const p = document.getElementById('add-plat').value,
                  id = document.getElementById('add-id').value.trim(),
                  nm = document.getElementById('add-name').value.trim();
            const ip = addCtx === 'posts';
            if (!id) { toast('请输入 ID'); return; }
            const tf = ip ? 'posts_rooms.json' : 'rooms.json',
                  arr = (await fetchJ(tf)) || [];
            if (arr.some(r => r.platform === p && r.id === id)) { toast('已存在'); return; }
            let name = nm || id;
            if (!nm && !ip && p === 'bilibili') {
                try {
                    const r = await fetch(`https://api.live.bilibili.com/room/v1/Room/room_init?id=${id}`),
                          d = await r.json();
                    if (d.code === 0 && d.data?.uid) {
                        const u = await fetch(`https://api.live.bilibili.com/live_user/v1/Master/info?uid=${d.data.uid}`),
                              ud = await u.json();
                        if (ud.code === 0 && ud.data?.info?.uname) name = ud.data.info.uname;
                    }
                } catch {}
            }
            arr.push({platform: p, id, name});
            if (await saveRooms(arr, ip ? `添加作品: ${name}` : `添加主播: ${name}`, tf)) {
                toast('已添加'); closeAdd(); await trigger();
                if (ip) { await loadPosts(); setTimeout(loadPosts, 15000); setTimeout(loadPosts, 40000); }
                else { await loadData(); setTimeout(loadData, 15000); setTimeout(loadData, 40000); }
            }
        }

        async function doDel() {
            if (!pendingDel) return;
            const {p, id} = pendingDel, ip = delCtx === 'posts';
            const tf = ip ? 'posts_rooms.json' : 'rooms.json',
                  sf = ip ? 'posts_status.json' : 'status.json',
                  dk = `${p}_${id}`;
            const arr = (await fetchJ(tf)) || [],
                  nr = arr.filter(r => !(r.platform === p && r.id === id));
            if (await saveRooms(nr, ip ? `删除作品: ${p}/${id}` : `删除主播: ${p}/${id}`, tf)) {
                try {
                    const f = await ghGet(sf); let o = {};
                    try { o = JSON.parse(atob(f.content)); } catch {}
                    if (o[dk]) { delete o[dk]; await ghPut(sf, JSON.stringify(o,null,2), f.sha, `清理: ${p}/${id}`); }
                } catch {}
                toast('已删除'); closeDel();
                if (ip) { await loadPosts(); setTimeout(loadPosts, 2000); }
                else { await loadData(); setTimeout(loadData, 2000); }
            }
        }

        document.querySelectorAll('.overlay').forEach(ov => {
            ov.addEventListener('click', e => {
                if (e.target === ov) { if (ov.id === 'add-modal') closeAdd(); else closeDel(); }
            });
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') { closeAdd(); closeDel(); }
        });

        loadData();
        setInterval(loadData, 300000);
    </script>
</body>
</html>
