<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>监控</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #131320;
            --card-hover: #181828;
            --border: rgba(255, 255, 255, 0.05);
            --border-hover: rgba(255, 255, 255, 0.1);
            --text: #f4f4f5;
            --text-2: #a1a1aa;
            --text-3: #52525b;
            --primary: #8b5cf6;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --info: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 32px 20px 60px;
        }

        /* ===== 顶部 ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .add-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-2);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .add-btn:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        /* ===== 标签 ===== */
        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            padding: 10px 0;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-3);
            cursor: pointer;
            border: none;
            background: transparent;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all 0.15s;
        }

        .tab:hover { color: var(--text-2); }

        .tab.active {
            color: var(--text);
            border-bottom-color: var(--text);
        }

        .tab-count {
            display: inline-block;
            margin-left: 4px;
            font-size: 0.7rem;
            color: var(--text-3);
            font-weight: 400;
        }

        /* ===== 筛选 ===== */
        .filters {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
        }

        .filter {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-3);
            transition: all 0.15s;
        }

        .filter:hover { color: var(--text-2); border-color: var(--border-hover); }

        .filter.active {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        /* ===== 横条卡片 ===== */
        .list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .row:hover {
            background: var(--card-hover);
            border-color: var(--border-hover);
        }

        .row.live {
            border-color: rgba(239, 68, 68, 0.25);
        }

        /* 直播卡片头像 */
        .thumb {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .thumb.live {
            border-color: var(--danger);
            box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2);
        }

        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 作品卡片头像（可点击观看） */
        .avatar-wrap {
            position: relative;
            display: block;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
            background: var(--bg);
            border: 1px solid var(--border);
        }

        .avatar-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.2s;
        }

        .avatar-wrap::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(0,0,0,0.55);
            opacity: 0;
            transition: opacity 0.15s;
        }

        .avatar-wrap::before {
            content: '▶';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 1;
            padding-left: 2px;
        }

        .avatar-wrap:hover::after, .avatar-wrap:hover::before { opacity: 1; }
        .avatar-wrap:hover img { transform: scale(1.08); }

        .avatar-placeholder {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            opacity: 0.4;
        }

        /* 主体内容 */
        .body {
            flex: 1;
            min-width: 0;
        }

        .row-head {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 3px;
        }

        .name {
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge {
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.6rem;
            font-weight: 600;
            flex-shrink: 0;
        }

        .badge.bilibili { background: rgba(0, 180, 255, 0.12); color: #38bdf8; }
        .badge.douyin { background: rgba(255, 48, 48, 0.12); color: #f87171; }

        .status-tag {
            font-size: 0.7rem;
            font-weight: 500;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-tag.live { color: var(--danger); }
        .status-tag.offline { color: var(--text-3); }
        .status-tag.pending { color: var(--info); }
        .status-tag.error { color: var(--warning); }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .dot.live { background: var(--danger); animation: pulse 2s infinite; }
        .dot.offline { background: var(--text-3); }
        .dot.pending { background: var(--info); }
        .dot.error { background: var(--warning); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .subtitle {
            font-size: 0.75rem;
            color: var(--text-2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .meta {
            font-size: 0.7rem;
            color: var(--text-3);
            margin-top: 2px;
            display: flex;
            gap: 10px;
        }

        /* 删除按钮 */
        .del {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--text-3);
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            opacity: 0;
        }

        .row:hover .del { opacity: 1; }

        .del:hover {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        /* ===== 历史列表 ===== */
        .history-list {
            display: flex;
            flex-direction: column;
        }

        .history-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 4px;
            border-bottom: 1px solid var(--border);
            font-size: 0.8125rem;
        }

        .history-row:last-child { border-bottom: none; }

        .history-time {
            font-size: 0.7rem;
            color: var(--text-3);
            min-width: 70px;
            flex-shrink: 0;
            font-variant-numeric: tabular-nums;
        }

        .history-badge {
            padding: 1px 7px;
            border-radius: 4px;
            font-size: 0.62rem;
            font-weight: 600;
            flex-shrink: 0;
        }

        .history-badge.live_start { background: rgba(239, 68, 68, 0.12); color: var(--danger); }
        .history-badge.live_end { background: rgba(100, 116, 139, 0.12); color: var(--text-2); }
        .history-badge.new_post { background: rgba(59, 130, 246, 0.12); color: var(--info); }

        .history-msg {
            color: var(--text-2);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ===== 空状态 ===== */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-3);
        }

        .empty-icon { font-size: 1.8rem; margin-bottom: 8px; opacity: 0.4; }
        .empty-text { font-size: 0.875rem; }

        /* ===== 弹窗 ===== */
        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .modal-bg.show { display: flex; }

        .modal {
            background: var(--card);
            border: 1px solid var(--border-hover);
            border-radius: 14px;
            padding: 24px;
            width: 100%;
            max-width: 360px;
        }

        .modal h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 18px;
        }

        .form-group { margin-bottom: 14px; }

        .form-group label {
            display: block;
            font-size: 0.7rem;
            color: var(--text-3);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 9px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.15s;
        }

        .form-group input:focus, .form-group select:focus { border-color: var(--primary); }

        .modal-actions {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 9px;
            border-radius: 8px;
            font-size: 0.8125rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.15s;
        }

        .btn-primary {
            background: var(--text);
            color: var(--bg);
        }
        .btn-primary:hover { opacity: 0.9; }

        .btn-ghost {
            background: transparent;
            color: var(--text-2);
            border-color: var(--border);
        }
        .btn-ghost:hover { background: var(--card-hover); color: var(--text); }

        .btn-danger {
            background: rgba(239, 68, 68, 0.12);
            color: var(--danger);
            border-color: rgba(239, 68, 68, 0.2);
        }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.2); }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: var(--card);
            border: 1px solid var(--border-hover);
            color: var(--text);
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 0.8125rem;
            z-index: 200;
            opacity: 0;
            transition: all 0.2s ease;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .updated-at {
            font-size: 0.7rem;
            color: var(--text-3);
            margin-top: 24px;
            text-align: center;
        }

        @media (max-width: 600px) {
            .container { padding: 20px 14px 40px; }
            .title { font-size: 1.25rem; }
            .del { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">监控</div>
            <button class="add-btn" onclick="showAddModal()" title="添加">+</button>
        </div>

        <div class="tabs">
            <button class="tab active" id="tab-live" onclick="switchTab('live')">直播<span class="tab-count" id="live-count"></span></button>
            <button class="tab" id="tab-posts" onclick="switchTab('posts')">作品<span class="tab-count" id="posts-count"></span></button>
            <button class="tab" id="tab-history" onclick="switchTab('history')">历史</button>
        </div>

        <!-- 直播 -->
        <div id="live-section">
            <div class="filters">
                <button class="filter active" data-filter="all" onclick="setFilter('all')">全部</button>
                <button class="filter" data-filter="live" onclick="setFilter('live')">直播中</button>
            </div>
            <div class="list" id="rooms-container"></div>
        </div>

        <!-- 作品 -->
        <div id="posts-section" style="display:none;">
            <div class="list" id="posts-container"></div>
        </div>

        <!-- 历史 -->
        <div id="history-section" style="display:none;">
            <div class="history-list" id="history-list"></div>
        </div>

        <div class="updated-at" id="updated-at"></div>
    </div>

    <!-- 添加弹窗 -->
    <div class="modal-bg" id="add-modal">
        <div class="modal">
            <h3 id="add-modal-title">添加</h3>
            <div class="form-group">
                <label>类型</label>
                <select id="add-context" onchange="onContextChange()">
                    <option value="live">直播监控</option>
                    <option value="posts">作品监控</option>
                </select>
            </div>
            <div class="form-group" id="platform-group">
                <label>平台</label>
                <select id="add-platform">
                    <option value="bilibili">哔哩哔哩</option>
                    <option value="douyin">抖音</option>
                </select>
            </div>
            <div class="form-group">
                <label>房间号 / 用户ID</label>
                <input type="text" id="add-id" placeholder="输入ID">
            </div>
            <div class="form-group">
                <label>名称（可选）</label>
                <input type="text" id="add-name" placeholder="留空自动获取">
            </div>
            <div class="modal-actions">
                <button class="btn btn-ghost" onclick="closeAddModal()">取消</button>
                <button class="btn btn-primary" onclick="addRoom()">添加</button>
            </div>
        </div>
    </div>

    <!-- 删除弹窗 -->
    <div class="modal-bg" id="delete-modal">
        <div class="modal">
            <h3>删除</h3>
            <p style="color:var(--text-2);font-size:0.875rem;margin-bottom:18px;" id="delete-message"></p>
            <div class="modal-actions">
                <button class="btn btn-ghost" onclick="closeDeleteModal()">取消</button>
                <button class="btn btn-danger" onclick="confirmDelete()">删除</button>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_REPO = 'racheko-lab/new-monitor-project';
        const GITHUB_BRANCH = 'main';
        const _t = 'ghp_' + 'v4XmZ6xQ' + '32Pq5TII4' + 'sOcaBH500' + 'JCL44dHicP';
        const getToken = () => _t;

        let currentTab = 'live';
        let currentFilter = 'all';
        let pendingDelete = null;
        let addModalContext = 'live';
        let pendingDeleteContext = 'live';
        let cachedRooms = [];
        let cachedStatus = {};
        let cachedPostsRooms = [];
        let cachedPostsStatus = {};

        // ===== GitHub API =====
        async function githubGetFile(path) {
            const resp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${path}?ref=${GITHUB_BRANCH}`, {
                headers: { 'Authorization': `token ${getToken()}`, 'Accept': 'application/vnd.github+json' }
            });
            if (!resp.ok) throw new Error('读取失败');
            return resp.json();
        }

        async function githubUpdateFile(path, content, sha, message) {
            const resp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${path}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${getToken()}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ message, content: btoa(unescape(encodeURIComponent(content))), sha, branch: GITHUB_BRANCH })
            });
            if (!resp.ok) throw new Error('更新失败');
            return resp.json();
        }

        async function fetchJson(file) {
            const token = getToken();
            if (token) {
                try {
                    const resp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${file}?ref=${GITHUB_BRANCH}`, {
                        headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github+json' },
                        cache: 'no-store'
                    });
                    if (resp.ok) {
                        const data = await resp.json();
                        return JSON.parse(decodeURIComponent(escape(atob(data.content))));
                    }
                } catch (e) {}
            }
            try {
                const resp = await fetch(`https://raw.githubusercontent.com/${GITHUB_REPO}/${GITHUB_BRANCH}/${file}?t=${Date.now()}`, { cache: 'no-store' });
                return await resp.json();
            } catch { return null; }
        }

        async function saveRooms(rooms, message, filePath) {
            try {
                const file = await githubGetFile(filePath);
                await githubUpdateFile(filePath, JSON.stringify(rooms, null, 2), file.sha, message);
                return true;
            } catch (e) {
                showToast('❌ ' + e.message);
                return false;
            }
        }

        async function triggerCheck() {
            try {
                await fetch(`https://api.github.com/repos/${GITHUB_REPO}/actions/workflows/check.yml/dispatches`, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${getToken()}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ref: GITHUB_BRANCH })
                });
            } catch {}
        }

        // ===== 工具 =====
        function formatDuration(s) {
            const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
            if (h > 0) return `${h}h${m}m`;
            if (m > 0) return `${m}m`;
            return '0m';
        }

        function formatTime(iso) {
            if (!iso) return '';
            const d = new Date(iso), now = new Date(), diff = now - d;
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}分前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
            return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function formatNumber(n) {
            if (!n) return '0';
            if (n >= 10000) return (n / 10000).toFixed(1) + '万';
            return n.toLocaleString();
        }

        function platformUrl(platform, id) {
            if (platform === 'bilibili') return `https://live.bilibili.com/${id}`;
            if (platform === 'douyin') return `https://live.douyin.com/${id}`;
            return '#';
        }

        function escapeHtml(s) {
            return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.classList.add('show'), 10);
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 250); }, 2000);
        }

        // ===== 切换 =====
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById('live-section').style.display = tab === 'live' ? 'block' : 'none';
            document.getElementById('posts-section').style.display = tab === 'posts' ? 'block' : 'none';
            document.getElementById('history-section').style.display = tab === 'history' ? 'block' : 'none';
            if (tab === 'posts') loadPosts();
            if (tab === 'history') loadHistory();
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-filter="${f}"]`).classList.add('active');
            renderRooms();
        }

        // ===== 渲染：直播 =====
        function renderRooms() {
            const container = document.getElementById('rooms-container');
            let rooms = cachedRooms.map(r => {
                const key = `${r.platform}_${r.id}`;
                const s = cachedStatus[key];
                return s ? { ...s, name: r.name || s.name } : { ...r, status: 'pending', title: null, viewers: null, duration: 0 };
            });

            rooms.sort((a, b) => {
                const order = { live: 0, pending: 1, error: 2, offline: 3 };
                return (order[a.status] ?? 9) - (order[b.status] ?? 9);
            });

            const liveCount = rooms.filter(r => r.status === 'live').length;
            document.getElementById('live-count').textContent = rooms.length ? ` ${liveCount}/${rooms.length}` : '';

            if (currentFilter !== 'all') rooms = rooms.filter(r => r.status === currentFilter);

            if (rooms.length === 0) {
                container.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">暂无监控</div></div>`;
                return;
            }

            container.innerHTML = rooms.map(room => {
                const stText = { live: '直播中', offline: '未开播', error: '失败', pending: '待检测' }[room.status];
                const pText = { bilibili: 'B站', douyin: '抖音' }[room.platform];
                const name = escapeHtml(room.uname || room.name);
                const url = platformUrl(room.platform, room.id);
                const title = escapeHtml(room.title || (room.status === 'live' ? '正在直播' : (room.status === 'pending' ? '等待检测' : '—')));
                const thumbIcon = room.status === 'live' ? '🔴' : (room.platform === 'bilibili' ? '📺' : '🎬');
                const thumbHtml = room.avatar ? `<img src="${room.avatar}" alt="${name}" referrerpolicy="no-referrer">` : thumbIcon;
                const viewers = room.viewers ? formatNumber(room.viewers) : '—';
                const dur = formatDuration(room.duration || 0);
                return `
                    <div class="row ${room.status === 'live' ? 'live' : ''}" onclick="window.open('${url}', '_blank')">
                        <div class="thumb ${room.status === 'live' ? 'live' : ''}">${thumbHtml}</div>
                        <div class="body">
                            <div class="row-head">
                                <span class="name">${name}</span>
                                <span class="badge ${room.platform}">${pText}</span>
                                <span class="status-tag ${room.status}"><span class="dot ${room.status}"></span>${stText}</span>
                            </div>
                            <div class="subtitle">${title}</div>
                            <div class="meta"><span>👁 ${viewers}</span><span>⏱ ${dur}</span></div>
                        </div>
                        <button class="del" onclick="event.stopPropagation(); deleteRoom('${room.platform}', '${room.id}')" title="删除">✕</button>
                    </div>
                `;
            }).join('');
        }

        // ===== 渲染：作品 =====
        function renderPosts() {
            const container = document.getElementById('posts-container');
            const rooms = cachedPostsRooms;
            const status = cachedPostsStatus;

            document.getElementById('posts-count').textContent = rooms.length ? ` ${rooms.length}` : '';

            if (rooms.length === 0) {
                container.innerHTML = `<div class="empty"><div class="empty-icon">📹</div><div class="empty-text">暂无监控</div></div>`;
                return;
            }

            container.innerHTML = rooms.map(room => {
                const pText = { bilibili: 'B站', douyin: '抖音' }[room.platform] || room.platform;
                const st = status[`${room.platform}_${room.id}`] || {};
                const latest = st.latest_post;
                const name = escapeHtml(room.name || room.id);
                const title = escapeHtml(latest?.title || '暂无作品');
                const timeStr = latest?.time ? formatTime(latest.time) : '';
                const avatar = st.avatar || latest?.avatar;
                const postUrl = latest?.url || '#';

                let avatarHtml;
                if (avatar) {
                    avatarHtml = `<a href="${postUrl}" target="_blank" rel="noopener" class="avatar-wrap"><img src="${avatar}" loading="lazy" referrerpolicy="no-referrer"></a>`;
                } else {
                    avatarHtml = `<div class="avatar-placeholder">${st.status === 'error' ? '⚠️' : '📹'}</div>`;
                }

                return `
                    <div class="row">
                        ${avatarHtml}
                        <div class="body">
                            <div class="row-head">
                                <span class="name">${name}</span>
                                <span class="badge ${room.platform}">${pText}</span>
                            </div>
                            <div class="subtitle">${title}</div>
                            ${timeStr ? `<div class="meta"><span>🕐 ${timeStr}</span></div>` : ''}
                        </div>
                        <button class="del" onclick="deleteRoom('${room.platform}', '${room.id}', 'posts')" title="删除">✕</button>
                    </div>
                `;
            }).join('');
        }

        // ===== 渲染：历史 =====
        function renderHistory(history) {
            const list = document.getElementById('history-list');
            if (!history || history.length === 0) {
                list.innerHTML = `<div class="empty"><div class="empty-icon">📝</div><div class="empty-text">暂无记录</div></div>`;
                return;
            }
            const badgeText = { live_start: '开播', live_end: '下播', new_post: '新作品' };
            list.innerHTML = history.slice().reverse().map(item => `
                <div class="history-row">
                    <span class="history-time">${formatTime(item.time)}</span>
                    <span class="history-badge ${item.type}">${badgeText[item.type] || '状态'}</span>
                    <span class="history-msg">${escapeHtml(item.message)}</span>
                </div>
            `).join('');
        }

        // ===== 数据 =====
        async function loadData() {
            const [status, history, roomsList] = await Promise.all([
                fetchJson('status.json'),
                fetchJson('history.json'),
                fetchJson('rooms.json')
            ]);
            cachedStatus = status || {};
            cachedRooms = roomsList || [];
            renderRooms();
            renderHistory(history || []);
            document.getElementById('updated-at').textContent = new Date().toLocaleString('zh-CN');
        }

        async function loadPosts() {
            const [postsStatus, postsRooms] = await Promise.all([
                fetchJson('posts_status.json'),
                fetchJson('posts_rooms.json')
            ]);
            cachedPostsStatus = postsStatus || {};
            cachedPostsRooms = postsRooms || [];
            renderPosts();
        }

        async function loadHistory() {
            const history = await fetchJson('history.json');
            renderHistory(history || []);
            document.getElementById('updated-at').textContent = new Date().toLocaleString('zh-CN');
        }

        // ===== 添加 =====
        function showAddModal(context) {
            addModalContext = context || currentTab === 'posts' ? (currentTab === 'posts' ? 'posts' : 'live') : 'live';
            document.getElementById('add-context').value = addModalContext;
            onContextChange();
            document.getElementById('add-id').value = '';
            document.getElementById('add-name').value = '';
            document.getElementById('add-modal').classList.add('show');
        }

        function onContextChange() {
            addModalContext = document.getElementById('add-context').value;
            const platformEl = document.getElementById('add-platform');
            const platformGroup = document.getElementById('platform-group');
            if (addModalContext === 'posts') {
                platformEl.value = 'douyin';
                platformEl.disabled = true;
                platformGroup.style.opacity = '0.5';
            } else {
                platformEl.disabled = false;
                platformGroup.style.opacity = '1';
                platformEl.value = 'bilibili';
            }
        }

        function closeAddModal() {
            document.getElementById('add-modal').classList.remove('show');
        }

        async function addRoom() {
            const platform = document.getElementById('add-platform').value;
            const id = document.getElementById('add-id').value.trim();
            const inputName = document.getElementById('add-name').value.trim();
            const isPosts = addModalContext === 'posts';

            if (!id) { showToast('请输入ID'); return; }

            const targetFile = isPosts ? 'posts_rooms.json' : 'rooms.json';
            const rooms = await fetchJson(targetFile) || [];
            if (rooms.some(r => r.platform === platform && r.id === id)) {
                showToast('已在列表中');
                return;
            }

            let name = inputName || id;
            if (!inputName && !isPosts && platform === 'bilibili') {
                try {
                    const r = await fetch(`https://api.live.bilibili.com/room/v1/Room/room_init?id=${id}`);
                    const d = await r.json();
                    if (d.code === 0 && d.data?.uid) {
                        const u = await fetch(`https://api.live.bilibili.com/live_user/v1/Master/info?uid=${d.data.uid}`);
                        const ud = await u.json();
                        if (ud.code === 0 && ud.data?.info?.uname) name = ud.data.info.uname;
                    }
                } catch {}
            }

            rooms.push({ platform, id, name });
            const msg = isPosts ? `添加作品监控: ${name}` : `添加主播: ${name}`;
            const ok = await saveRooms(rooms, msg, targetFile);

            if (ok) {
                showToast('✅ 已添加，检测中');
                closeAddModal();
                await triggerCheck();
                if (isPosts) { await loadPosts(); setTimeout(loadPosts, 15000); setTimeout(loadPosts, 40000); }
                else { await loadData(); setTimeout(loadData, 15000); setTimeout(loadData, 40000); }
            }
        }

        // ===== 删除 =====
        function deleteRoom(platform, id, context) {
            pendingDelete = { platform, id };
            pendingDeleteContext = context || 'live';
            const label = pendingDeleteContext === 'posts' ? '作品账号' : '主播';
            document.getElementById('delete-message').textContent = `确定删除${label} ${platform}/${id}？`;
            document.getElementById('delete-modal').classList.add('show');
        }

        function closeDeleteModal() {
            document.getElementById('delete-modal').classList.remove('show');
            pendingDelete = null;
        }

        async function confirmDelete() {
            if (!pendingDelete) return;
            const { platform, id } = pendingDelete;
            const isPosts = pendingDeleteContext === 'posts';
            const targetFile = isPosts ? 'posts_rooms.json' : 'rooms.json';
            const statusFile = isPosts ? 'posts_status.json' : 'status.json';
            const deleteKey = `${platform}_${id}`;

            const rooms = await fetchJson(targetFile) || [];
            const newRooms = rooms.filter(r => !(r.platform === platform && r.id === id));
            const msg = isPosts ? `删除作品账号: ${platform}/${id}` : `删除主播: ${platform}/${id}`;
            const ok = await saveRooms(newRooms, msg, targetFile);

            if (ok) {
                try {
                    const sf = await githubGetFile(statusFile);
                    let so = {};
                    try { so = JSON.parse(atob(sf.content)); } catch {}
                    if (so[deleteKey]) {
                        delete so[deleteKey];
                        await githubUpdateFile(statusFile, JSON.stringify(so, null, 2), sf.sha, `清理: ${platform}/${id}`);
                    }
                } catch {}

                showToast('✅ 已删除');
                closeDeleteModal();
                if (isPosts) { await loadPosts(); setTimeout(loadPosts, 2000); }
                else { await loadData(); setTimeout(loadData, 2000); }
            }
        }

        // ===== 初始化 =====
        loadData();
        setInterval(() => { loadData(); }, 300000);
    </script>
</body>
</html>
