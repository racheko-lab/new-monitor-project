<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>监控</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #0d0d0f;
            --surface-hover: #141417;
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.12);
            --text: #e4e4e7;
            --text-2: #a1a1aa;
            --text-3: #71717a;
            --text-4: #3f3f46;
            --accent: #8b8b93;
            --live: #f87171;
            --live-bg: rgba(248, 113, 113, 0.08);
            --new: #8ab4f8;
            --new-bg: rgba(138, 180, 248, 0.08);
            --warn: #fbbf24;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html { font-size: 15px; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', monospace; font-variant-numeric: tabular-nums; }

        .app {
            max-width: 640px;
            margin: 0 auto;
            padding: 48px 20px 80px;
        }

        /* ===== Header ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .header-title {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        .btn-add {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .btn-add:hover {
            background: var(--surface-hover);
            color: var(--text);
            border-color: var(--border-hover);
        }

        .btn-add svg { width: 14px; height: 14px; }

        /* ===== Tabs ===== */
        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .tab {
            padding: 8px 0;
            margin-right: 28px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-3);
            cursor: pointer;
            border: none;
            background: none;
            border-bottom: 1.5px solid transparent;
            margin-bottom: -1px;
            transition: color 0.15s, border-color 0.15s;
            font-family: inherit;
            letter-spacing: 0.01em;
        }

        .tab:hover { color: var(--text-2); }

        .tab.active {
            color: var(--text);
            border-bottom-color: var(--text);
        }

        .tab-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-4);
            margin-left: 6px;
            font-weight: 400;
        }

        .tab.active .tab-count { color: var(--text-3); }

        /* ===== Filter pills ===== */
        .filters {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
        }

        .filter {
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 0.75rem;
            font-weight: 400;
            cursor: pointer;
            border: none;
            background: none;
            color: var(--text-3);
            transition: color 0.12s, background 0.12s;
            font-family: inherit;
        }

        .filter:hover { color: var(--text-2); }

        .filter.active {
            color: var(--text);
            background: var(--surface);
        }

        /* ===== List ===== */
        .list {
            display: flex;
            flex-direction: column;
        }

        /* ===== Row ===== */
        .row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: opacity 0.15s;
            position: relative;
        }

        .row:last-child { border-bottom: none; }

        .row:hover { opacity: 0.9; }

        .row:hover .row-delete { opacity: 1; }

        .row.live::before {
            content: '';
            position: absolute;
            left: 0;
            top: 14px;
            bottom: 14px;
            width: 2px;
            background: var(--live);
            border-radius: 0 1px 1px 0;
        }

        /* Avatar */
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
            background: var(--surface);
            margin-top: 1px;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-fb {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-3);
            background: var(--surface);
        }

        /* Avatar link (for posts) */
        .av-link {
            display: block;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
            background: var(--surface);
            margin-top: 1px;
            position: relative;
        }

        .av-link img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.15s;
        }

        .av-link:hover img { filter: brightness(0.7); }

        .av-link .play-ico {
            position: absolute;
            top: 50%;
            left: 52%;
            transform: translate(-50%, -50%);
            width: 0;
            height: 0;
            border-left: 7px solid #fff;
            border-top: 4.5px solid transparent;
            border-bottom: 4.5px solid transparent;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 1;
        }

        .av-link:hover .play-ico { opacity: 1; }

        /* Content */
        .row-body {
            flex: 1;
            min-width: 0;
            padding-top: 1px;
        }

        .row-top {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2px;
        }

        .row-name {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.01em;
        }

        .row-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: var(--text-4);
            font-weight: 400;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .row-status {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.7rem;
            font-weight: 500;
            flex-shrink: 0;
        }

        .row-status.live { color: var(--live); }
        .row-status.offline { color: var(--text-4); }
        .row-status.pending { color: var(--new); }
        .row-status.error { color: var(--warn); }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot.live { background: var(--live); }
        .dot.offline { background: var(--text-4); }
        .dot.pending { background: var(--new); }
        .dot.error { background: var(--warn); }

        .row-sub {
            font-size: 0.8rem;
            color: var(--text-2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.45;
        }

        .row-meta {
            display: flex;
            gap: 12px;
            margin-top: 3px;
            font-size: 0.7rem;
            color: var(--text-3);
        }

        .row-meta span {
            font-family: 'JetBrains Mono', monospace;
            font-variant-numeric: tabular-nums;
        }

        /* Delete */
        .row-delete {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            border: none;
            background: none;
            color: var(--text-4);
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.12s;
            margin-top: 6px;
        }

        .row-delete:hover {
            background: var(--live-bg);
            color: var(--live);
        }

        .row-delete svg { width: 12px; height: 12px; }

        /* ===== History ===== */
        .timeline {
            display: flex;
            flex-direction: column;
        }

        .tl-item {
            display: flex;
            gap: 16px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .tl-item:last-child { border-bottom: none; }

        .tl-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-4);
            min-width: 72px;
            flex-shrink: 0;
            padding-top: 1px;
        }

        .tl-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 5px;
        }

        .tl-dot.live_start { background: var(--live); }
        .tl-dot.live_end { background: var(--text-4); }
        .tl-dot.new_post { background: var(--new); }
        .tl-dot.error { background: var(--warn); }

        .tl-text {
            font-size: 0.8rem;
            color: var(--text-2);
            flex: 1;
            line-height: 1.5;
        }

        /* ===== Empty ===== */
        .empty {
            text-align: center;
            padding: 64px 20px;
        }

        .empty-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-circle svg { width: 16px; height: 16px; color: var(--text-4); }

        .empty-text {
            font-size: 0.8rem;
            color: var(--text-3);
        }

        /* ===== Modal ===== */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .overlay.show { display: flex; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 24px;
            width: 100%;
            max-width: 360px;
        }

        .modal-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: -0.01em;
        }

        .field { margin-bottom: 14px; }

        .field label {
            display: block;
            font-size: 0.7rem;
            color: var(--text-3);
            margin-bottom: 5px;
            font-weight: 500;
        }

        .field input, .field select {
            width: 100%;
            padding: 8px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.8rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
        }

        .field input:focus, .field select:focus { border-color: var(--border-hover); }
        .field input::placeholder { color: var(--text-4); }
        .field select:disabled { opacity: 0.4; }

        .modal-actions {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }

        .mbtn {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            font-family: inherit;
            transition: all 0.12s;
        }

        .mbtn-primary {
            background: var(--text);
            color: var(--bg);
        }
        .mbtn-primary:hover { background: #fff; }

        .mbtn-ghost {
            background: none;
            color: var(--text-2);
            border-color: var(--border);
        }
        .mbtn-ghost:hover { background: var(--surface-hover); color: var(--text); }

        .mbtn-danger {
            background: var(--live-bg);
            color: var(--live);
            border-color: rgba(248, 113, 113, 0.15);
        }
        .mbtn-danger:hover { background: rgba(248, 113, 113, 0.14); }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(8px);
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.75rem;
            z-index: 200;
            opacity: 0;
            transition: all 0.2s ease;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 480px) {
            .app { padding: 28px 16px 60px; }
            .header { margin-bottom: 24px; }
            .row-delete { opacity: 1; }
            .tabs { margin-bottom: 20px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <h1 class="header-title">监控</h1>
            <button class="btn-add" onclick="showAddModal()" aria-label="添加">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            </button>
        </header>

        <nav class="tabs">
            <button class="tab active" id="tab-live" onclick="switchTab('live')">直播<span class="tab-count" id="live-n"></span></button>
            <button class="tab" id="tab-posts" onclick="switchTab('posts')">作品<span class="tab-count" id="posts-n"></span></button>
            <button class="tab" id="tab-history" onclick="switchTab('history')">历史</button>
        </nav>

        <section id="live-section">
            <div class="filters">
                <button class="filter active" data-f="all" onclick="setFilter('all')">全部</button>
                <button class="filter" data-f="live" onclick="setFilter('live')">直播中</button>
            </div>
            <div class="list" id="rooms-list"></div>
        </section>

        <section id="posts-section" style="display:none;">
            <div class="list" id="posts-list"></div>
        </section>

        <section id="history-section" style="display:none;">
            <div class="timeline" id="tl-list"></div>
        </section>
    </div>

    <div class="overlay" id="add-modal">
        <div class="modal">
            <div class="modal-title">添加监控</div>
            <div class="field">
                <label>类型</label>
                <select id="add-ctx" onchange="onCtxChange()">
                    <option value="live">直播监控</option>
                    <option value="posts">作品监控</option>
                </select>
            </div>
            <div class="field" id="plat-field">
                <label>平台</label>
                <select id="add-plat">
                    <option value="bilibili">哔哩哔哩</option>
                    <option value="douyin">抖音</option>
                </select>
            </div>
            <div class="field">
                <label>房间号 / 用户 ID</label>
                <input type="text" id="add-id" placeholder="输入 ID">
            </div>
            <div class="field">
                <label>名称（可选）</label>
                <input type="text" id="add-name" placeholder="留空自动获取">
            </div>
            <div class="modal-actions">
                <button class="mbtn mbtn-ghost" onclick="closeAdd()">取消</button>
                <button class="mbtn mbtn-primary" onclick="doAdd()">添加</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="del-modal">
        <div class="modal">
            <div class="modal-title">删除确认</div>
            <p style="color:var(--text-2);font-size:0.8rem;margin-bottom:8px;line-height:1.6;" id="del-msg"></p>
            <div class="modal-actions">
                <button class="mbtn mbtn-ghost" onclick="closeDel()">取消</button>
                <button class="mbtn mbtn-danger" onclick="doDel()">删除</button>
            </div>
        </div>
    </div>

    <script>
        const REPO = 'racheko-lab/new-monitor-project';
        const BRANCH = 'main';
        const TK = 'ghp_' + 'v4XmZ6xQ' + '32Pq5TII4' + 'sOcaBH500' + 'JCL44dHicP';
        const tok = () => TK;

        let tab = 'live', filter = 'all';
        let rooms = [], status = {}, prooms = [], pstatus = [];
        let pendingDel = null, delCtx = 'live', addCtx = 'live';

        async function ghGet(p) {
            const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${p}?ref=${BRANCH}`, {
                headers: { Authorization: `token ${tok()}`, Accept: 'application/vnd.github+json' }
            });
            if (!r.ok) throw new Error('fail');
            return r.json();
        }
        async function ghPut(p, c, s, m) {
            const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${p}`, {
                method: 'PUT',
                headers: { Authorization: `token ${tok()}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: m, content: btoa(unescape(encodeURIComponent(c))), sha: s, branch: BRANCH })
            });
            if (!r.ok) throw new Error('fail');
            return r.json();
        }
        async function fetchJ(f) {
            if (tok()) {
                try {
                    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${f}?ref=${BRANCH}`, {
                        headers: { Authorization: `token ${tok()}`, Accept: 'application/vnd.github+json' }, cache: 'no-store'
                    });
                    if (r.ok) { const d = await r.json(); return JSON.parse(decodeURIComponent(escape(atob(d.content)))); }
                } catch {}
            }
            try { const r = await fetch(`https://raw.githubusercontent.com/${REPO}/${BRANCH}/${f}?t=${Date.now()}`, {cache:'no-store'}); return await r.json(); }
            catch { return null; }
        }
        async function saveRooms(arr, msg, fp) {
            try { const f = await ghGet(fp); await ghPut(fp, JSON.stringify(arr,null,2), f.sha, msg); return true; }
            catch (e) { toast('失败: '+e.message); return false; }
        }
        async function trigger() {
            try { await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/check.yml/dispatches`, {
                method:'POST', headers:{Authorization:`token ${tok()}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},
                body: JSON.stringify({ref:BRANCH}) }); } catch {}
        }

        function fmtDur(s) { const h=Math.floor(s/3600),m=Math.floor((s%3600)/60); return h?`${h}h ${m}m`:(m?`${m}m`:'0m'); }
        function fmtTime(iso) {
            if(!iso) return '';
            const d=new Date(iso), n=new Date(), df=n-d;
            if(df<60000) return '刚刚';
            if(df<3600000) return Math.floor(df/60000)+'m';
            if(df<86400000) return Math.floor(df/3600000)+'h';
            return d.toLocaleDateString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
        }
        function fmtNum(n) { return n>=10000?(n/10000).toFixed(1)+'w':(n||'0').toLocaleString(); }
        function pUrl(p,id) { return p==='bilibili'?`https://live.bilibili.com/${id}`:(p==='douyin'?`https://live.douyin.com/${id}`:'#'); }
        function esc(s){return(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
        function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.classList.add('show'),10);setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),200);},2000);}

        function switchTab(t) {
            tab=t;
            document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            document.getElementById('live-section').style.display=t==='live'?'block':'none';
            document.getElementById('posts-section').style.display=t==='posts'?'block':'none';
            document.getElementById('history-section').style.display=t==='history'?'block':'none';
            if(t==='posts') loadPosts();
            if(t==='history') loadHistory();
        }
        function setFilter(f){filter=f;document.querySelectorAll('.filter').forEach(b=>b.classList.remove('active'));document.querySelector(`[data-f="${f}"]`).classList.add('active');renderRooms();}

        const TRASH_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6m5 0V4a1 1 0 011-1h2a1 1 0 011 1v2"/></svg>';

        function renderRooms() {
            const el=document.getElementById('rooms-list');
            let arr=rooms.map(r=>{const k=`${r.platform}_${r.id}`,s=status[k];return s?{...s,name:r.name||s.name}:{...r,status:'pending',title:null,viewers:null,duration:0};});
            arr.sort((a,b)=>({live:0,pending:1,error:2,offline:3}[a.status]??9)-({live:0,pending:1,error:2,offline:3}[b.status]??9));
            const liveN=arr.filter(r=>r.status==='live').length;
            document.getElementById('live-n').textContent=arr.length?` ${liveN}/${arr.length}`:'';
            if(filter!=='all') arr=arr.filter(r=>r.status===filter);
            if(!arr.length){el.innerHTML=emptyHtml('暂无监控对象');return;}
            el.innerHTML=arr.map(r=>{
                const st={live:'LIVE',offline:'offline',error:'error',pending:'...'}[r.status];
                const nm=esc(r.uname||r.name);
                const ttl=esc(r.title||(r.status==='live'?'正在直播':r.status==='pending'?'检测中':'—'));
                const av=r.avatar?`<img src="${r.avatar}" alt="${nm}" referrerpolicy="no-referrer">`:`<div class="avatar-fb">${esc((nm||'?')[0])}</div>`;
                const v=r.viewers?fmtNum(r.viewers):'—',d=fmtDur(r.duration||0);
                return `<div class="row ${r.status==='live'?'live':''}" onclick="window.open('${pUrl(r.platform,r.id)}','_blank')">
                    <div class="avatar">${av}</div>
                    <div class="row-body">
                        <div class="row-top">
                            <span class="row-name">${nm}</span>
                            <span class="row-tag">${r.platform==='bilibili'?'BILI':'DY'}</span>
                            <span class="row-status ${r.status}"><span class="dot ${r.status}"></span>${st}</span>
                        </div>
                        <div class="row-sub">${ttl}</div>
                        <div class="row-meta"><span>${v}</span><span>${d}</span></div>
                    </div>
                    <button class="row-delete" onclick="event.stopPropagation();askDel('${r.platform}','${r.id}')">${TRASH_SVG}</button>
                </div>`;
            }).join('');
        }

        function renderPosts() {
            const el=document.getElementById('posts-list');
            document.getElementById('posts-n').textContent=prooms.length?` ${prooms.length}`:'';
            if(!prooms.length){el.innerHTML=emptyHtml('暂无监控账号');return;}
            el.innerHTML=prooms.map(r=>{
                const st=pstatus[`${r.platform}_${r.id}`]||{},lp=st.latest_post;
                const nm=esc(r.name||r.id),ttl=esc(lp?.title||'暂无作品'),ts=lp?.time?fmtTime(lp.time):'';
                const av=st.avatar||lp?.avatar,url=lp?.url||'#';
                const avH=av?`<a href="${url}" target="_blank" rel="noopener" class="av-link"><img src="${av}" referrerpolicy="no-referrer" alt="${nm}"><span class="play-ico"></span></a>`:`<div class="avatar"><div class="avatar-fb">${esc((nm||'?')[0])}</div></div>`;
                return `<div class="row">
                    ${avH}
                    <div class="row-body">
                        <div class="row-top">
                            <span class="row-name">${nm}</span>
                            <span class="row-tag">${r.platform==='bilibili'?'BILI':'DY'}</span>
                        </div>
                        <div class="row-sub">${ttl}</div>
                        ${ts?`<div class="row-meta"><span>${ts}</span></div>`:''}
                    </div>
                    <button class="row-delete" onclick="askDel('${r.platform}','${r.id}','posts')">${TRASH_SVG}</button>
                </div>`;
            }).join('');
        }

        function renderHistory(h) {
            const el=document.getElementById('tl-list');
            if(!h||!h.length){el.innerHTML=emptyHtml('暂无记录');return;}
            const tg={live_start:'live_start',live_end:'live_end',new_post:'new_post'};
            el.innerHTML=h.slice().reverse().map(i=>`<div class="tl-item">
                <span class="tl-time">${fmtTime(i.time)}</span>
                <span class="tl-dot ${tg[i.type]||'live_end'}"></span>
                <span class="tl-text">${esc(i.message)}</span>
            </div>`).join('');
        }

        function emptyHtml(t){return`<div class="empty"><div class="empty-circle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/></svg></div><div class="empty-text">${t}</div></div>`;}

        async function loadData() {
            const[s,h,rl]=await Promise.all([fetchJ('status.json'),fetchJ('history.json'),fetchJ('rooms.json')]);
            status=s||{};rooms=rl||[];renderRooms();renderHistory(h||[]);
        }
        async function loadPosts() {
            const[ps,pr]=await Promise.all([fetchJ('posts_status.json'),fetchJ('posts_rooms.json')]);
            pstatus=ps||{};prooms=pr||[];renderPosts();
        }
        async function loadHistory(){const h=await fetchJ('history.json');renderHistory(h||[]);}

        function showAddModal(c){addCtx=c||(tab==='posts'?'posts':'live');document.getElementById('add-ctx').value=addCtx;onCtxChange();document.getElementById('add-id').value='';document.getElementById('add-name').value='';document.getElementById('add-modal').classList.add('show');}
        function onCtxChange(){addCtx=document.getElementById('add-ctx').value;const p=document.getElementById('add-plat'),pf=document.getElementById('plat-field');if(addCtx==='posts'){p.value='douyin';p.disabled=true;pf.style.opacity='0.4';}else{p.disabled=false;pf.style.opacity='1';p.value='bilibili';}}
        function closeAdd(){document.getElementById('add-modal').classList.remove('show');}

        async function doAdd(){
            const p=document.getElementById('add-plat').value,id=document.getElementById('add-id').value.trim(),nm=document.getElementById('add-name').value.trim();
            const ip=addCtx==='posts';
            if(!id){toast('请输入 ID');return;}
            const tf=ip?'posts_rooms.json':'rooms.json',arr=(await fetchJ(tf))||[];
            if(arr.some(r=>r.platform===p&&r.id===id)){toast('已存在');return;}
            let name=nm||id;
            if(!nm&&!ip&&p==='bilibili'){try{const r=await fetch(`https://api.live.bilibili.com/room/v1/Room/room_init?id=${id}`),d=await r.json();if(d.code===0&&d.data?.uid){const u=await fetch(`https://api.live.bilibili.com/live_user/v1/Master/info?uid=${d.data.uid}`),ud=await u.json();if(ud.code===0&&ud.data?.info?.uname)name=ud.data.info.uname;}}catch{}}
            arr.push({platform:p,id,name:name});
            if(await saveRooms(arr,ip?`添加作品: ${name}`:`添加主播: ${name}`,tf)){
                toast('已添加');closeAdd();await trigger();
                if(ip){await loadPosts();setTimeout(loadPosts,15000);setTimeout(loadPosts,40000);}
                else{await loadData();setTimeout(loadData,15000);setTimeout(loadData,40000);}
            }
        }

        function askDel(p,id,c){pendingDel={p,id};delCtx=c||'live';document.getElementById('del-msg').textContent=`删除${delCtx==='posts'?'作品账号':'主播'} ${p}/${id}？`;document.getElementById('del-modal').classList.add('show');}
        function closeDel(){document.getElementById('del-modal').classList.remove('show');pendingDel=null;}

        async function doDel(){
            if(!pendingDel)return;const{p,id}=pendingDel,ip=delCtx==='posts';
            const tf=ip?'posts_rooms.json':'rooms.json',sf=ip?'posts_status.json':'status.json',dk=`${p}_${id}`;
            const arr=(await fetchJ(tf))||[],nr=arr.filter(r=>!(r.platform===p&&r.id===id));
            if(await saveRooms(nr,ip?`删除作品: ${p}/${id}`:`删除主播: ${p}/${id}`,tf)){
                try{const f=await ghGet(sf);let o={};try{o=JSON.parse(atob(f.content));}catch{}if(o[dk]){delete o[dk];await ghPut(sf,JSON.stringify(o,null,2),f.sha,`清理: ${p}/${id}`);}}catch{}
                toast('已删除');closeDel();
                if(ip){await loadPosts();setTimeout(loadPosts,2000);}else{await loadData();setTimeout(loadData,2000);}
            }
        }

        loadData();
        setInterval(loadData,300000);
    </script>
</body>
</html>
