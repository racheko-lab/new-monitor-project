<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直播监控中心</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --primary: #8b5cf6;
            --primary-light: #a78bfa;
            --primary-dark: #7c3aed;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --bg-dark: #0a0a0f;
            --bg-card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --shadow-hover: 0 12px 48px rgba(139, 92, 246, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text-primary);
            padding: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.05) 0%, transparent 70%);
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
            padding: 30px 0 10px;
        }

        .header h1 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 800;
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 50%, #f59e0b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .main-tabs {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 24px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .tab-btn {
            padding: 12px 32px;
            border-radius: 12px;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 14px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            backdrop-filter: blur(12px);
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            max-width: 300px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 36px 10px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.875rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.75rem;
        }

        .filter-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .filter-tag {
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 0.8125rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
        }

        .filter-tag:hover {
            border-color: var(--primary);
            color: var(--primary-light);
        }

        .filter-tag.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-color: transparent;
            color: white;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8125rem;
            color: var(--text-secondary);
        }

        .toggle-switch {
            width: 40px;
            height: 22px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 11px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s ease;
        }

        .toggle-switch.on {
            background: var(--primary);
        }

        .toggle-switch.on::after {
            transform: translateX(18px);
        }

        .refresh-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 0.8125rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .refresh-btn:hover {
            transform: translateY(-1px);
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0;
            border-radius: 18px 18px 0 0;
            transition: opacity 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(139, 92, 246, 0.3);
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-icon {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: clamp(1.5rem, 3vw, 2.25rem);
            font-weight: 800;
            margin-bottom: 4px;
        }

        .stat-value.live { color: var(--danger); }
        .stat-value.total { color: var(--primary-light); }
        .stat-value.offline { color: var(--text-muted); }
        .stat-value.duration { color: var(--success); }
        .stat-value.posts { color: var(--info); }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.8125rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .rooms-grid, .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 18px;
            margin-bottom: 24px;
        }

        .room-card, .post-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 24px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .room-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .room-card.live::before {
            opacity: 1;
            background: linear-gradient(90deg, #ef4444, #f97316, #ef4444);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .room-card:hover, .post-card:hover {
            transform: translateY(-6px);
            border-color: rgba(139, 92, 246, 0.3);
        }

        .room-header, .post-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .room-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .status-dot.live {
            background: var(--danger);
            box-shadow: 0 0 12px var(--danger);
            animation: pulse-ring 2s infinite;
        }

        .status-dot.offline { background: var(--text-muted); }
        .status-dot.error { 
            background: var(--warning); 
            box-shadow: 0 0 8px var(--warning);
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }

        .status-text {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-text.live { color: var(--danger); }
        .status-text.offline { color: var(--text-muted); }
        .status-text.error { color: var(--warning); }

        .platform-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .platform-badge.bilibili {
            background: rgba(0, 180, 255, 0.15);
            color: #00b4d8;
        }

        .platform-badge.douyin {
            background: rgba(255, 48, 48, 0.15);
            color: #ff3030;
        }

        .room-name, .post-author {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .room-title, .post-title {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 16px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .room-meta, .post-meta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.875rem;
            color: var(--text-secondary);
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .meta-value {
            font-weight: 700;
        }

        .meta-value.live { color: var(--danger); }
        .meta-value.duration { color: var(--success); }
        .meta-value.views { color: var(--info); }
        .meta-value.likes { color: var(--warning); }

        .room-actions, .post-actions {
            margin-top: 16px;
            display: flex;
            gap: 8px;
        }

        .action-btn {
            flex: 1;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 0.8125rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .action-btn:hover {
            background: rgba(139, 92, 246, 0.1);
            border-color: var(--primary);
            color: var(--primary-light);
        }

        .post-cover {
            width: 100%;
            height: 160px;
            border-radius: 14px;
            object-fit: cover;
            margin-bottom: 14px;
            background: rgba(255, 255, 255, 0.05);
        }

        .history-section {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 24px;
        }

        .section-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 12px;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--primary), var(--primary-light));
            border-radius: 2px;
        }

        .last-update {
            color: var(--text-muted);
            font-size: 0.8125rem;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }

        .history-list {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 6px;
        }

        .history-list::-webkit-scrollbar {
            width: 6px;
        }

        .history-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 3px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.3);
            border-radius: 3px;
        }

        .history-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 18px;
            border-radius: 14px;
            margin-bottom: 6px;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.03);
            transform: translateX(4px);
        }

        .history-time {
            color: var(--text-muted);
            font-size: 0.75rem;
            min-width: 75px;
            flex-shrink: 0;
        }

        .history-badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .history-badge.live_start {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }

        .history-badge.live_end {
            background: rgba(100, 116, 139, 0.15);
            color: var(--text-secondary);
        }

        .history-badge.new_post {
            background: rgba(59, 130, 246, 0.15);
            color: var(--info);
        }

        .history-message {
            flex: 1;
            font-size: 0.875rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .loading-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(139, 92, 246, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            .tabs-container {
                padding: 0;
            }

            .tab-btn {
                padding: 10px 20px;
                font-size: 0.875rem;
            }

            .toolbar {
                padding: 12px;
            }

            .search-box {
                min-width: 100%;
                max-width: 100%;
            }

            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .stat-value {
                font-size: 1.25rem;
            }

            .rooms-grid, .posts-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }

            .room-card, .post-card {
                padding: 20px;
            }

            .room-actions, .post-actions {
                flex-direction: column;
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-right {
                width: 100%;
                justify-content: space-between;
            }
        }

        @media (max-width: 480px) {
            .stats-bar {
                grid-template-columns: 1fr;
            }

            .filter-tags {
                width: 100%;
            }

            .filter-tag {
                flex: 1;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="bg-particles"></div>
    <div class="loading-overlay" id="loading-overlay">
        <div class="loader"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>📡 直播监控中心</h1>
            <p>实时监控您关注的主播动态</p>
        </div>

        <div class="main-tabs">
            <button class="tab-btn active" id="tab-live" onclick="switchTab('live')">
                <span>🎬</span> 直播监控
            </button>
            <button class="tab-btn" id="tab-posts" onclick="switchTab('posts')">
                <span>📹</span> 新作品
            </button>
        </div>

        <div id="live-section">
            <div class="toolbar">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="搜索主播名称..." />
                </div>
                <div class="filter-tags">
                    <span class="filter-tag active" data-filter="all" onclick="setFilter('all')">全部</span>
                    <span class="filter-tag" data-filter="live" onclick="setFilter('live')">直播中</span>
                    <span class="filter-tag" data-filter="offline" onclick="setFilter('offline')">未开播</span>
                </div>
                <div class="header-right">
                    <button class="refresh-btn" onclick="loadData(true)">
                        <span>🔄</span> 刷新
                    </button>
                    <div class="auto-refresh">
                        <span>自动刷新</span>
                        <div class="toggle-switch on" id="auto-refresh-toggle" onclick="toggleAutoRefresh()"></div>
                    </div>
                </div>
            </div>

            <div class="stats-bar" id="stats-bar">
                <div class="stat-card">
                    <div class="stat-icon">🔴</div>
                    <div class="stat-value live" id="stat-live">0</div>
                    <div class="stat-label">直播中</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⚫</div>
                    <div class="stat-value offline" id="stat-offline">0</div>
                    <div class="stat-label">未开播</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-value total" id="stat-total">0</div>
                    <div class="stat-label">监控总数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⏱️</div>
                    <div class="stat-value duration" id="stat-duration">0</div>
                    <div class="stat-label">累计直播时长</div>
                </div>
            </div>

            <div class="rooms-grid" id="rooms-container"></div>
        </div>

        <div id="posts-section" style="display: none;">
            <div class="toolbar">
                <div class="search-box">
                    <input type="text" id="posts-search-input" placeholder="搜索作品或作者..." />
                </div>
                <div class="header-right">
                    <button class="refresh-btn" onclick="loadPosts(true)">
                        <span>🔄</span> 刷新
                    </button>
                </div>
            </div>

            <div class="stats-bar" id="posts-stats-bar">
                <div class="stat-card">
                    <div class="stat-icon">📹</div>
                    <div class="stat-value posts" id="stat-posts">0</div>
                    <div class="stat-label">新作品数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">👁️</div>
                    <div class="stat-value total" id="stat-total-views">0</div>
                    <div class="stat-label">总播放量</div>
                </div>
            </div>

            <div class="posts-grid" id="posts-container"></div>
        </div>

        <div class="history-section">
            <div class="section-header">
                <div class="section-title">📝 历史记录</div>
                <span class="last-update" id="last-update"></span>
            </div>
            <div class="history-list" id="history-list"></div>
        </div>
    </div>

    <script>
        const GITHUB_REPO = 'racheko-lab/new-monitor-project';
        const GITHUB_BRANCH = 'main';
        
        let autoRefreshInterval = null;
        let currentFilter = 'all';
        let currentSearch = '';
        let currentPostsSearch = '';
        let currentTab = 'live';

        async function fetchJson(file) {
            const version = 'v2026071202';
            const url = `https://raw.githubusercontent.com/${GITHUB_REPO}/${GITHUB_BRANCH}/${file}?v=${version}`;
            try {
                const resp = await fetch(url, { cache: 'no-store' });
                return await resp.json();
            } catch {
                return null;
            }
        }

        function formatDuration(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            if (h > 0) return `${h}小时${m}分钟`;
            if (m > 0) return `${m}分钟`;
            return '0分钟';
        }

        function formatTime(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
            return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 10000) return (num / 10000).toFixed(1) + '万';
            return num.toLocaleString();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            document.getElementById('live-section').style.display = tab === 'live' ? 'block' : 'none';
            document.getElementById('posts-section').style.display = tab === 'posts' ? 'block' : 'none';

            if (tab === 'posts') {
                loadPosts();
            }
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-tag').forEach(tag => tag.classList.remove('active'));
            document.querySelector(`[data-filter="${filter}"]`).classList.add('active');
            loadData();
        }

        function toggleAutoRefresh() {
            const toggle = document.getElementById('auto-refresh-toggle');
            toggle.classList.toggle('on');
            const isOn = toggle.classList.contains('on');
            
            if (isOn) {
                autoRefreshInterval = setInterval(() => loadData(), 300000);
                showToast('✅ 自动刷新已开启');
            } else {
                if (autoRefreshInterval) {
                    clearInterval(autoRefreshInterval);
                    autoRefreshInterval = null;
                }
                showToast('⏹️ 自动刷新已关闭');
            }
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 24px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0, 0, 0, 0.9);
                color: white;
                padding: 10px 20px;
                border-radius: 10px;
                font-size: 0.875rem;
                font-weight: 600;
                z-index: 200;
                opacity: 0;
                transition: opacity 0.3s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.style.opacity = '1', 10);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        function updateStats(status) {
            if (!status) return;
            const rooms = Object.values(status);
            const liveCount = rooms.filter(r => r.status === 'live').length;
            const offlineCount = rooms.filter(r => r.status === 'offline').length;
            const totalDuration = rooms.reduce((sum, r) => sum + (r.duration || 0), 0);

            animateValue('stat-live', liveCount);
            animateValue('stat-offline', offlineCount);
            animateValue('stat-total', rooms.length);
            
            const durationEl = document.getElementById('stat-duration');
            if (durationEl) {
                durationEl.textContent = formatDuration(totalDuration);
            }
        }

        function animateValue(id, target) {
            const el = document.getElementById(id);
            if (!el) return;
            const current = parseInt(el.textContent.replace(/[^\d]/g, '')) || 0;
            if (current === target) return;
            
            const duration = 500;
            const steps = 20;
            const stepValue = (target - current) / steps;
            let currentValue = current;
            let step = 0;
            
            const timer = setInterval(() => {
                step++;
                currentValue += stepValue;
                el.textContent = Math.round(currentValue);
                if (step >= steps) {
                    clearInterval(timer);
                    el.textContent = target;
                }
            }, duration / steps);
        }

        function getPlatformUrl(platform, roomId) {
            if (platform === 'bilibili') return `https://live.bilibili.com/${roomId}`;
            if (platform === 'douyin') return `https://live.douyin.com/${roomId}`;
            return '#';
        }

        function renderRooms(status) {
            const container = document.getElementById('rooms-container');
            if (!status) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔌</div>
                        <div class="empty-title">加载失败</div>
                        <div class="empty-desc">无法获取监控数据，请检查网络连接</div>
                    </div>
                `;
                return;
            }

            let rooms = Object.values(status).sort((a, b) => {
                const order = { live: 0, error: 1, offline: 2 };
                return order[a.status] - order[b.status];
            });

            if (currentFilter !== 'all') {
                rooms = rooms.filter(r => r.status === currentFilter);
            }

            if (currentSearch) {
                const searchLower = currentSearch.toLowerCase();
                rooms = rooms.filter(r => 
                    r.name.toLowerCase().includes(searchLower) ||
                    (r.title && r.title.toLowerCase().includes(searchLower))
                );
            }

            if (rooms.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <div class="empty-title">暂无数据</div>
                        <div class="empty-desc">没有找到符合条件的主播</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = rooms.map(room => {
                const statusClass = room.status;
                const statusText = { live: '直播中', offline: '未开播', error: '检测失败' }[room.status];
                const platformText = { bilibili: 'B站', douyin: '抖音' }[room.platform];
                const duration = formatDuration(room.duration || 0);
                const viewers = room.viewers ? formatNumber(room.viewers) : '-';
                const roomUrl = getPlatformUrl(room.platform, room.id);

                return `
                    <div class="room-card ${room.status === 'live' ? 'live' : ''}" onclick="window.open('${roomUrl}', '_blank')">
                        <div class="room-header">
                            <div class="room-status">
                                <div class="status-dot ${statusClass}"></div>
                                <span class="status-text ${statusClass}">${statusText}</span>
                            </div>
                            <span class="platform-badge ${room.platform}">${platformText}</span>
                        </div>
                        <div class="room-name">${room.name}</div>
                        <div class="room-title">${room.title || (room.status === 'live' ? '正在直播...' : '暂无直播信息')}</div>
                        <div class="room-meta">
                            <div class="meta-item">
                                <span>👁️</span>
                                <span class="meta-value ${room.status === 'live' ? 'live' : ''}">${viewers} 观看</span>
                            </div>
                            <div class="meta-item">
                                <span>⏱️</span>
                                <span class="meta-value duration">${duration}</span>
                            </div>
                        </div>
                        <div class="room-actions">
                            <button class="action-btn" onclick="event.stopPropagation(); window.open('${roomUrl}', '_blank')">
                                <span>🔗</span> 进入直播间
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updatePostsStats(posts) {
            if (!posts) return;
            const totalPosts = posts.length;
            const totalViews = posts.reduce((sum, p) => sum + (p.views || 0), 0);
            
            animateValue('stat-posts', totalPosts);
            
            const viewsEl = document.getElementById('stat-total-views');
            if (viewsEl) {
                viewsEl.textContent = formatNumber(totalViews);
            }
        }

        function renderPosts(posts) {
            const container = document.getElementById('posts-container');
            if (!posts || posts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📹</div>
                        <div class="empty-title">暂无新作品</div>
                        <div class="empty-desc">监控到主播发布新作品后，会显示在这里</div>
                    </div>
                `;
                return;
            }

            let filteredPosts = posts.slice().sort((a, b) => new Date(b.time) - new Date(a.time));

            if (currentPostsSearch) {
                const searchLower = currentPostsSearch.toLowerCase();
                filteredPosts = filteredPosts.filter(p => 
                    p.title.toLowerCase().includes(searchLower) ||
                    p.name.toLowerCase().includes(searchLower)
                );
            }

            if (filteredPosts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <div class="empty-title">没有找到</div>
                        <div class="empty-desc">没有找到符合条件的作品</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredPosts.map(post => {
                const platformText = { bilibili: 'B站', douyin: '抖音' }[post.platform];
                const views = post.views ? formatNumber(post.views) : '-';
                const likes = post.likes ? formatNumber(post.likes) : '-';
                const postUrl = post.url || '#';

                return `
                    <div class="post-card" onclick="window.open('${postUrl}', '_blank')">
                        <img src="${post.cover || 'https://via.placeholder.com/320x160?text=No+Cover'}" 
                             alt="${post.title}" class="post-cover" loading="lazy" />
                        <div class="post-header">
                            <span class="platform-badge ${post.platform}">${platformText}</span>
                        </div>
                        <div class="post-author">${post.name}</div>
                        <div class="post-title">${post.title || '无标题'}</div>
                        <div class="post-meta">
                            <div class="meta-item">
                                <span>👁️</span>
                                <span class="meta-value views">${views} 播放</span>
                            </div>
                            <div class="meta-item">
                                <span>❤️</span>
                                <span class="meta-value likes">${likes} 点赞</span>
                            </div>
                        </div>
                        <div class="post-actions">
                            <button class="action-btn" onclick="event.stopPropagation(); window.open('${postUrl}', '_blank')">
                                <span>▶️</span> 观看视频
                            </button>
                            <button class="action-btn" onclick="event.stopPropagation(); copyPostInfo('${post.name}', '${post.title}', '${postUrl}')">
                                <span>📋</span> 复制链接
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function copyPostInfo(name, title, url) {
            const text = `${name} - ${title}\n${url}`;
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ 已复制到剪贴板');
            }).catch(() => {
                showToast('❌ 复制失败');
            });
        }

        function renderHistory(history) {
            const list = document.getElementById('history-list');
            if (!history || history.length === 0) {
                list.innerHTML = `
                    <div class="empty-state" style="padding: 30px 20px;">
                        <div class="empty-icon">📝</div>
                        <div class="empty-title">暂无历史记录</div>
                        <div class="empty-desc">监控到主播动态后，记录会显示在这里</div>
                    </div>
                `;
                return;
            }

            list.innerHTML = history.slice().reverse().map(item => {
                const time = formatTime(item.time);
                const badgeClass = item.type;
                const badgeText = {
                    live_start: '开播',
                    live_end: '下播',
                    new_post: '新作品',
                    error: '状态'
                }[item.type] || '状态';

                return `
                    <div class="history-item">
                        <span class="history-time">${time}</span>
                        <span class="history-badge ${badgeClass}">${badgeText}</span>
                        <span class="history-message">${item.message}</span>
                    </div>
                `;
            }).join('');
        }

        async function loadData(showLoading = false) {
            if (showLoading) {
                document.getElementById('loading-overlay').classList.add('show');
            }

            const [status, history] = await Promise.all([
                fetchJson('status.json'),
                fetchJson('history.json')
            ]);
            
            updateStats(status);
            renderRooms(status);
            renderHistory(history);
            document.getElementById('last-update').textContent = `最后更新: ${new Date().toLocaleString('zh-CN')}`;

            if (showLoading) {
                setTimeout(() => {
                    document.getElementById('loading-overlay').classList.remove('show');
                }, 300);
            }
        }

        async function loadPosts(showLoading = false) {
            if (showLoading) {
                document.getElementById('loading-overlay').classList.add('show');
            }

            const posts = await fetchJson('posts.json');
            updatePostsStats(posts);
            renderPosts(posts);

            if (showLoading) {
                setTimeout(() => {
                    document.getElementById('loading-overlay').classList.remove('show');
                }, 300);
            }
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            currentSearch = e.target.value;
            loadData();
        });

        document.getElementById('posts-search-input').addEventListener('input', (e) => {
            currentPostsSearch = e.target.value;
            loadPosts();
        });

        loadData(true);
        autoRefreshInterval = setInterval(() => loadData(), 300000);
    </script>
</body>
</html>
