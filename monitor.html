<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直播监控中心</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --primary: #8b5cf6;
            --primary-light: #a78bfa;
            --primary-dark: #7c3aed;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --bg-dark: #0a0a0f;
            --bg-card: rgba(255, 255, 255, 0.05);
            --bg-card-hover: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(139, 92, 246, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 12px 48px rgba(139, 92, 246, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text-primary);
            padding: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.05) 0%, transparent 70%);
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            text-align: center;
            margin-bottom: 48px;
            padding: 40px 0 20px;
        }

        .header h1 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 800;
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 50%, #f59e0b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
            text-shadow: 0 0 60px rgba(139, 92, 246, 0.3);
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.125rem;
            font-weight: 400;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding: 16px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            backdrop-filter: blur(12px);
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            max-width: 350px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 40px 10px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.9375rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.875rem;
        }

        .filter-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-tag {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
        }

        .filter-tag:hover {
            border-color: var(--primary);
            color: var(--primary-light);
        }

        .filter-tag.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-color: transparent;
            color: white;
        }

        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .toggle-switch {
            width: 44px;
            height: 24px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .toggle-switch.on {
            background: var(--primary);
        }

        .toggle-switch.on::after {
            transform: translateX(20px);
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px 20px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .stat-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-hover);
            border-color: var(--border-hover);
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-icon {
            font-size: 1.75rem;
            margin-bottom: 12px;
        }

        .stat-value {
            font-size: clamp(1.75rem, 4vw, 2.5rem);
            font-weight: 800;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }

        .stat-value.live { 
            color: var(--danger); 
            text-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
        }
        .stat-value.total { color: var(--primary-light); }
        .stat-value.offline { color: var(--text-muted); }
        .stat-value.duration { color: var(--success); }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .room-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 28px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .room-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .room-card.live::before {
            opacity: 1;
            background: linear-gradient(90deg, #ef4444, #f97316, #ef4444);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .room-card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: var(--shadow-hover);
            border-color: var(--border-hover);
        }

        .room-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .room-status {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .status-dot.live {
            background: var(--danger);
            box-shadow: 0 0 16px var(--danger);
            animation: pulse-ring 2s infinite;
        }

        .status-dot.offline {
            background: var(--text-muted);
        }

        .status-dot.error {
            background: var(--warning);
            box-shadow: 0 0 12px var(--warning);
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .status-text {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .status-text.live { 
            color: var(--danger); 
            animation: blink 1s infinite;
        }
        .status-text.offline { color: var(--text-muted); }
        .status-text.error { color: var(--warning); }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .platform-badge {
            padding: 6px 14px;
            border-radius: 24px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .platform-badge.bilibili {
            background: rgba(0, 180, 255, 0.15);
            color: #00b4d8;
            border: 1px solid rgba(0, 180, 255, 0.2);
        }

        .platform-badge.douyin {
            background: rgba(255, 48, 48, 0.15);
            color: #ff3030;
            border: 1px solid rgba(255, 48, 48, 0.2);
        }

        .room-name {
            font-size: 1.375rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .room-title {
            font-size: 0.9375rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 46px;
        }

        .room-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9375rem;
            color: var(--text-secondary);
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .meta-icon {
            font-size: 1.125rem;
        }

        .meta-value {
            font-weight: 700;
            font-size: 1rem;
        }

        .meta-value.live { 
            color: var(--danger); 
            font-variant-numeric: tabular-nums;
        }
        .meta-value.duration { 
            color: var(--success); 
            font-variant-numeric: tabular-nums;
        }

        .room-actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .action-btn:hover {
            background: rgba(139, 92, 246, 0.1);
            border-color: var(--primary);
            color: var(--primary-light);
        }

        .history-section {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 28px;
        }

        .section-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            gap: 16px;
        }

        .section-title {
            font-size: 1.375rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-primary);
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, var(--primary), var(--primary-light));
            border-radius: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .refresh-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 16px rgba(139, 92, 246, 0.3);
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(139, 92, 246, 0.4);
        }

        .refresh-btn:active {
            transform: translateY(0);
        }

        .refresh-btn.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .last-update {
            color: var(--text-muted);
            font-size: 0.875rem;
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .history-list {
            max-height: 450px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .history-list::-webkit-scrollbar {
            width: 8px;
        }

        .history-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 4px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.3);
            border-radius: 4px;
        }

        .history-list::-webkit-scrollbar-thumb:hover {
            background: rgba(139, 92, 246, 0.5);
        }

        .history-item {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 16px 20px;
            border-radius: 16px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.05);
            transform: translateX(4px);
        }

        .history-time {
            color: var(--text-muted);
            font-size: 0.8125rem;
            min-width: 85px;
            flex-shrink: 0;
            font-variant-numeric: tabular-nums;
        }

        .history-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .history-badge.live_start {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(239, 68, 68, 0.1));
            color: var(--danger);
        }

        .history-badge.live_end {
            background: rgba(100, 116, 139, 0.15);
            color: var(--text-secondary);
        }

        .history-badge.new_post {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(16, 185, 129, 0.1));
            color: var(--success);
        }

        .history-badge.error {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(245, 158, 11, 0.1));
            color: var(--warning);
        }

        .history-message {
            flex: 1;
            font-size: 0.9375rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .empty-desc {
            font-size: 0.9375rem;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .loading-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(139, 92, 246, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            position: relative;
        }

        .loader::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            border: 3px solid rgba(139, 92, 246, 0.2);
            border-top-color: var(--primary-light);
            border-radius: 50%;
            animation: spin 0.8s linear infinite reverse;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 1024px) {
            .rooms-grid {
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            .header {
                margin-bottom: 32px;
                padding: 30px 0 10px;
            }

            .header h1 {
                font-size: 1.75rem;
            }

            .toolbar {
                padding: 14px;
            }

            .search-box {
                min-width: 100%;
                max-width: 100%;
            }

            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            .rooms-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .room-card {
                padding: 20px;
            }

            .room-name {
                font-size: 1.25rem;
            }

            .room-actions {
                flex-direction: column;
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-right {
                width: 100%;
                justify-content: space-between;
            }

            .history-item {
                padding: 12px 16px;
                gap: 12px;
            }
        }

        @media (max-width: 480px) {
            .stats-bar {
                grid-template-columns: 1fr;
            }

            .filter-tags {
                width: 100%;
                justify-content: flex-start;
            }

            .filter-tag {
                flex: 1;
                text-align: center;
            }

            .history-list {
                max-height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-particles"></div>

    <div class="loading-overlay" id="loading-overlay">
        <div class="loader"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>📡 直播监控中心</h1>
            <p>实时监控您关注的主播动态，不错过任何精彩直播</p>
        </div>

        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="搜索主播名称..." />
            </div>
            <div class="filter-tags">
                <span class="filter-tag active" data-filter="all">全部</span>
                <span class="filter-tag" data-filter="live">直播中</span>
                <span class="filter-tag" data-filter="offline">未开播</span>
                <span class="filter-tag" data-filter="error">检测失败</span>
            </div>
            <div class="auto-refresh">
                <span>自动刷新</span>
                <div class="toggle-switch on" id="auto-refresh-toggle"></div>
            </div>
        </div>

        <div class="stats-bar" id="stats-bar">
            <div class="stat-card">
                <div class="stat-icon">🔴</div>
                <div class="stat-value live" id="stat-live">0</div>
                <div class="stat-label">直播中</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⚫</div>
                <div class="stat-value offline" id="stat-offline">0</div>
                <div class="stat-label">未开播</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-value total" id="stat-total">0</div>
                <div class="stat-label">监控总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⏱️</div>
                <div class="stat-value duration" id="stat-duration">0</div>
                <div class="stat-label">累计直播时长</div>
            </div>
        </div>

        <div class="rooms-grid" id="rooms-container"></div>

        <div class="history-section">
            <div class="section-header">
                <div class="section-title">📝 历史记录</div>
                <div class="header-right">
                    <button class="refresh-btn" id="refresh-btn">
                        <span>🔄</span> 刷新数据
                    </button>
                    <span class="last-update" id="last-update"></span>
                </div>
            </div>
            <div class="history-list" id="history-list"></div>
        </div>
    </div>

    <script>
        const GITHUB_REPO = 'racheko-lab/new-monitor-project';
        const GITHUB_BRANCH = 'main';
        
        let autoRefreshInterval = null;
        let currentFilter = 'all';
        let currentSearch = '';

        async function fetchJson(file) {
            const url = `https://raw.githubusercontent.com/${GITHUB_REPO}/${GITHUB_BRANCH}/${file}`;
            try {
                const resp = await fetch(url, { cache: 'no-cache' });
                return await resp.json();
            } catch {
                return null;
            }
        }

        function formatDuration(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            if (h > 0) return `${h}小时${m}分钟`;
            if (m > 0) return `${m}分钟`;
            return '0分钟';
        }

        function formatTime(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
            return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function updateStats(status) {
            if (!status) return;
            const rooms = Object.values(status);
            const liveCount = rooms.filter(r => r.status === 'live').length;
            const offlineCount = rooms.filter(r => r.status === 'offline').length;
            const totalDuration = rooms.reduce((sum, r) => sum + (r.duration || 0), 0);

            animateValue('stat-live', liveCount);
            animateValue('stat-offline', offlineCount);
            animateValue('stat-total', rooms.length);
            
            const durationEl = document.getElementById('stat-duration');
            if (durationEl) {
                durationEl.textContent = formatDuration(totalDuration);
            }
        }

        function animateValue(id, target) {
            const el = document.getElementById(id);
            if (!el) return;
            const current = parseInt(el.textContent) || 0;
            if (current === target) return;
            
            const duration = 500;
            const steps = 20;
            const stepValue = (target - current) / steps;
            let currentValue = current;
            let step = 0;
            
            const timer = setInterval(() => {
                step++;
                currentValue += stepValue;
                el.textContent = Math.round(currentValue);
                
                if (step >= steps) {
                    clearInterval(timer);
                    el.textContent = target;
                }
            }, duration / steps);
        }

        function getPlatformUrl(platform, roomId) {
            if (platform === 'bilibili') return `https://live.bilibili.com/${roomId}`;
            if (platform === 'douyin') return `https://live.douyin.com/${roomId}`;
            return '#';
        }

        function renderRooms(status) {
            const container = document.getElementById('rooms-container');
            if (!status) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔌</div>
                        <div class="empty-title">加载失败</div>
                        <div class="empty-desc">无法获取监控数据，请检查网络连接或稍后重试</div>
                    </div>
                `;
                return;
            }

            let rooms = Object.values(status).sort((a, b) => {
                const order = { live: 0, error: 1, offline: 2 };
                return order[a.status] - order[b.status];
            });

            if (currentFilter !== 'all') {
                rooms = rooms.filter(r => r.status === currentFilter);
            }

            if (currentSearch) {
                const searchLower = currentSearch.toLowerCase();
                rooms = rooms.filter(r => 
                    r.name.toLowerCase().includes(searchLower) ||
                    (r.title && r.title.toLowerCase().includes(searchLower))
                );
            }

            if (rooms.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <div class="empty-title">暂无数据</div>
                        <div class="empty-desc">没有找到符合条件的主播</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = rooms.map(room => {
                const statusClass = room.status;
                const statusText = { live: '直播中', offline: '未开播', error: '检测失败' }[room.status];
                const platformText = { bilibili: 'B站', douyin: '抖音' }[room.platform];
                const duration = formatDuration(room.duration || 0);
                const viewers = room.viewers ? `${room.viewers.toLocaleString()}` : '-';
                const roomUrl = getPlatformUrl(room.platform, room.id);

                return `
                    <div class="room-card ${room.status === 'live' ? 'live' : ''}" onclick="window.open('${roomUrl}', '_blank')">
                        <div class="room-header">
                            <div class="room-status">
                                <div class="status-dot ${statusClass}"></div>
                                <span class="status-text ${statusClass}">${statusText}</span>
                            </div>
                            <span class="platform-badge ${room.platform}">${platformText}</span>
                        </div>
                        <div class="room-name">${room.name}</div>
                        <div class="room-title">${room.title || (room.status === 'live' ? '正在直播...' : '暂无直播信息')}</div>
                        <div class="room-meta">
                            <div class="meta-item">
                                <span class="meta-icon">👁️</span>
                                <span class="meta-value ${room.status === 'live' ? 'live' : ''}">${viewers} 观看</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-icon">⏱️</span>
                                <span class="meta-value duration">${duration}</span>
                            </div>
                        </div>
                        <div class="room-actions">
                            <button class="action-btn" onclick="event.stopPropagation(); window.open('${roomUrl}', '_blank')">
                                <span>🔗</span> 进入直播间
                            </button>
                            <button class="action-btn" onclick="event.stopPropagation(); copyRoomInfo('${room.name}', '${platformText}', '${room.id}')">
                                <span>📋</span> 复制信息
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function copyRoomInfo(name, platform, roomId) {
            const text = `${name} (${platform}) - ${getPlatformUrl(platform === 'B站' ? 'bilibili' : 'douyin', roomId)}`;
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ 已复制到剪贴板');
            }).catch(() => {
                showToast('❌ 复制失败');
            });
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 24px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0, 0, 0, 0.9);
                color: white;
                padding: 12px 24px;
                border-radius: 12px;
                font-size: 0.9375rem;
                font-weight: 600;
                z-index: 200;
                opacity: 0;
                transition: opacity 0.3s ease;
                border: 1px solid rgba(255, 255, 255, 0.1);
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.style.opacity = '1', 10);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        function renderHistory(history) {
            const list = document.getElementById('history-list');
            if (!history || history.length === 0) {
                list.innerHTML = `
                    <div class="empty-state" style="padding: 40px 20px;">
                        <div class="empty-icon">📝</div>
                        <div class="empty-title">暂无历史记录</div>
                        <div class="empty-desc">监控到主播动态后，记录会显示在这里</div>
                    </div>
                `;
                return;
            }

            list.innerHTML = history.slice().reverse().map(item => {
                const time = formatTime(item.time);
                const badgeClass = item.type;

                return `
                    <div class="history-item">
                        <span class="history-time">${time}</span>
                        <span class="history-badge ${badgeClass}">
                            ${item.type === 'live_start' ? '开播' : 
                              item.type === 'live_end' ? '下播' : 
                              item.type === 'new_post' ? '新作品' : '状态'}
                        </span>
                        <span class="history-message">${item.message}</span>
                    </div>
                `;
            }).join('');
        }

        async function loadData(showLoading = false) {
            if (showLoading) {
                document.getElementById('loading-overlay').classList.add('show');
            }

            const [status, history] = await Promise.all([
                fetchJson('status.json'),
                fetchJson('history.json')
            ]);
            
            updateStats(status);
            renderRooms(status);
            renderHistory(history);
            document.getElementById('last-update').textContent = `最后更新: ${new Date().toLocaleString('zh-CN')}`;

            if (showLoading) {
                setTimeout(() => {
                    document.getElementById('loading-overlay').classList.remove('show');
                }, 300);
            }
        }

        function setupEventListeners() {
            document.getElementById('search-input').addEventListener('input', (e) => {
                currentSearch = e.target.value;
                loadData();
            });

            document.querySelectorAll('.filter-tag').forEach(tag => {
                tag.addEventListener('click', () => {
                    document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
                    tag.classList.add('active');
                    currentFilter = tag.dataset.filter;
                    loadData();
                });
            });

            document.getElementById('auto-refresh-toggle').addEventListener('click', (e) => {
                e.target.classList.toggle('on');
                const isOn = e.target.classList.contains('on');
                
                if (isOn) {
                    autoRefreshInterval = setInterval(() => loadData(), 300000);
                    showToast('✅ 自动刷新已开启');
                } else {
                    if (autoRefreshInterval) {
                        clearInterval(autoRefreshInterval);
                        autoRefreshInterval = null;
                    }
                    showToast('⏹️ 自动刷新已关闭');
                }
            });

            document.getElementById('refresh-btn').addEventListener('click', () => {
                const btn = document.getElementById('refresh-btn');
                btn.classList.add('loading');
                btn.innerHTML = '<span>⏳</span> 刷新中...';
                
                loadData(true).then(() => {
                    btn.classList.remove('loading');
                    btn.innerHTML = '<span>🔄</span> 刷新数据';
                });
            });
        }

        setupEventListeners();
        loadData(true);
        autoRefreshInterval = setInterval(() => loadData(), 300000);
    </script>
</body>
</html>
