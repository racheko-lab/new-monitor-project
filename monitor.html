<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>监控中心</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #14141c;
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-2: #a1a1aa;
            --text-3: #71717a;
            --primary: #8b5cf6;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --info: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 顶部导航 */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .topbar h1 {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .tabs {
            display: flex;
            gap: 4px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 4px;
        }

        .tab {
            padding: 7px 16px;
            border-radius: 7px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--text-2);
            transition: all 0.2s;
        }

        .tab:hover { color: var(--text); }

        .tab.active {
            background: var(--primary);
            color: #fff;
        }

        /* 统计条 */
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
            font-size: 0.8125rem;
            color: var(--text-2);
            flex-wrap: wrap;
        }

        .stat b {
            font-size: 1rem;
            font-weight: 700;
            margin-right: 4px;
        }

        .stat.live b { color: var(--danger); }
        .stat.offline b { color: var(--text-3); }
        .stat.total b { color: var(--primary); }
        .stat.duration b { color: var(--success); }
        .stat.posts b { color: var(--info); }

        /* 工具栏 */
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search {
            flex: 1;
            min-width: 160px;
            max-width: 280px;
            position: relative;
        }

        .search input {
            width: 100%;
            padding: 8px 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.8125rem;
            outline: none;
        }

        .search input:focus { border-color: var(--primary); }

        .filters {
            display: flex;
            gap: 4px;
        }

        .filter {
            padding: 6px 12px;
            border-radius: 7px;
            font-size: 0.75rem;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text-2);
            transition: all 0.2s;
        }

        .filter:hover { color: var(--text); }

        .filter.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        .spacer { flex: 1; }

        .btn {
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.8125rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.85; }

        .btn-primary { background: var(--primary); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-ghost {
            background: var(--card);
            color: var(--text-2);
            border: 1px solid var(--border);
        }

        /* 卡片网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            position: relative;
            transition: border-color 0.2s;
        }

        .card:hover { border-color: rgba(139, 92, 246, 0.4); }

        .card.live { border-color: rgba(239, 68, 68, 0.5); }

        .card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .dot.live { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
        .dot.offline { background: var(--text-3); }
        .dot.error { background: var(--warning); }
        .dot.pending { background: var(--info); }

        .status.live { color: var(--danger); }
        .status.offline { color: var(--text-3); }
        .status.error { color: var(--warning); }
        .status.pending { color: var(--info); }

        .badge {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge.bilibili { background: rgba(0, 180, 255, 0.15); color: #00b4d8; }
        .badge.douyin { background: rgba(255, 48, 48, 0.15); color: #ff3030; }

        .name {
            font-size: 1.0625rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .title {
            font-size: 0.8125rem;
            color: var(--text-2);
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .meta {
            display: flex;
            gap: 12px;
            font-size: 0.75rem;
            color: var(--text-2);
            flex-wrap: wrap;
        }

        .meta span { display: flex; align-items: center; gap: 4px; }

        .card-actions {
            display: flex;
            gap: 6px;
            margin-top: 12px;
        }

        .card-actions .btn {
            flex: 1;
            padding: 6px 10px;
            font-size: 0.75rem;
            justify-content: center;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* 作品封面 */
        .cover-link {
            display: block;
            margin: -16px -16px 12px;
            border-radius: 14px 14px 0 0;
            overflow: hidden;
            position: relative;
        }

        .cover-link img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .cover-link::after {
            content: '▶';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 44px; height: 44px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            color: #fff;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            padding-left: 3px;
        }

        .cover-link:hover::after { opacity: 1; }

        .cover-placeholder {
            margin: -16px -16px 12px;
            height: 140px;
            border-radius: 14px 14px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--border);
        }

        .check-time {
            margin-top: 8px;
            font-size: 0.7rem;
            color: var(--text-3);
            text-align: right;
        }

        /* 历史列表 */
        .history {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.8125rem;
            transition: background 0.2s;
        }

        .history-item:hover { background: rgba(255, 255, 255, 0.03); }

        .history-time {
            color: var(--text-3);
            font-size: 0.7rem;
            min-width: 70px;
            flex-shrink: 0;
        }

        .history-badge {
            padding: 2px 7px;
            border-radius: 5px;
            font-size: 0.65rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .history-badge.live_start { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
        .history-badge.live_end { background: rgba(100, 116, 139, 0.15); color: var(--text-2); }
        .history-badge.new_post { background: rgba(59, 130, 246, 0.15); color: var(--info); }

        .history-msg { color: var(--text-2); flex: 1; }

        /* 空状态 */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-3);
        }

        .empty-icon { font-size: 2rem; margin-bottom: 8px; opacity: 0.5; }

        /* 弹窗 */
        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .modal-bg.show { display: flex; }

        .modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            width: 100%;
            max-width: 380px;
        }

        .modal h3 {
            font-size: 1.0625rem;
            margin-bottom: 18px;
        }

        .form-group { margin-bottom: 14px; }

        .form-group label {
            display: block;
            font-size: 0.8125rem;
            color: var(--text-2);
            margin-bottom: 5px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 9px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.875rem;
            outline: none;
        }

        .form-group input:focus, .form-group select:focus { border-color: var(--primary); }

        .modal-actions {
            display: flex;
            gap: 8px;
            margin-top: 18px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 0.8125rem;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .toast.show { opacity: 1; }

        @media (max-width: 600px) {
            .container { padding: 14px; }
            .grid { grid-template-columns: 1fr; }
            .search { max-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <h1>📡 监控中心</h1>
            <div class="tabs">
                <button class="tab active" id="tab-live" onclick="switchTab('live')">直播</button>
                <button class="tab" id="tab-posts" onclick="switchTab('posts')">作品</button>
                <button class="tab" id="tab-history" onclick="switchTab('history')">历史</button>
            </div>
        </div>

        <!-- 直播 -->
        <div id="live-section">
            <div class="stats" id="live-stats"></div>
            <div class="toolbar">
                <div class="search">
                    <input type="text" id="search-input" placeholder="搜索主播..." oninput="onSearch()">
                </div>
                <div class="filters">
                    <span class="filter active" data-filter="all" onclick="setFilter('all')">全部</span>
                    <span class="filter" data-filter="live" onclick="setFilter('live')">直播中</span>
                </div>
                <div class="spacer"></div>
                <button class="btn btn-success" onclick="showAddModal('live')">➕ 添加</button>
                <button class="btn btn-ghost" onclick="loadData(true)">🔄 刷新</button>
            </div>
            <div class="grid" id="rooms-container"></div>
        </div>

        <!-- 作品 -->
        <div id="posts-section" style="display:none;">
            <div class="stats" id="posts-stats"></div>
            <div class="toolbar">
                <div class="search">
                    <input type="text" id="posts-search-input" placeholder="搜索账号或作品..." oninput="onPostsSearch()">
                </div>
                <div class="spacer"></div>
                <button class="btn btn-success" onclick="showAddModal('posts')">➕ 添加</button>
                <button class="btn btn-ghost" onclick="loadPosts(true)">🔄 刷新</button>
            </div>
            <div class="grid" id="posts-container"></div>
        </div>

        <!-- 历史 -->
        <div id="history-section" style="display:none;">
            <div class="toolbar">
                <span style="font-size:0.8125rem;color:var(--text-2);">最近动态记录</span>
                <div class="spacer"></div>
                <span style="font-size:0.75rem;color:var(--text-3);" id="last-update"></span>
            </div>
            <div class="history" id="history-list"></div>
        </div>
    </div>

    <!-- 添加弹窗 -->
    <div class="modal-bg" id="add-modal">
        <div class="modal">
            <h3 id="add-modal-title">➕ 添加</h3>
            <div class="form-group">
                <label>平台</label>
                <select id="add-platform">
                    <option value="bilibili">哔哩哔哩</option>
                    <option value="douyin">抖音</option>
                </select>
            </div>
            <div class="form-group">
                <label>房间号 / 用户ID</label>
                <input type="text" id="add-id" placeholder="输入房间号或用户ID">
            </div>
            <div class="form-group">
                <label>名称（可选）</label>
                <input type="text" id="add-name" placeholder="留空自动获取">
            </div>
            <div class="modal-actions">
                <button class="btn btn-ghost" style="flex:1;" onclick="closeAddModal()">取消</button>
                <button class="btn btn-primary" style="flex:1;" onclick="addRoom()">确认</button>
            </div>
        </div>
    </div>

    <!-- 删除弹窗 -->
    <div class="modal-bg" id="delete-modal">
        <div class="modal">
            <h3>🗑️ 确认删除</h3>
            <p style="color:var(--text-2);font-size:0.875rem;margin-bottom:18px;" id="delete-message"></p>
            <div class="modal-actions">
                <button class="btn btn-ghost" style="flex:1;" onclick="closeDeleteModal()">取消</button>
                <button class="btn btn-danger" style="flex:1;" onclick="confirmDelete()">删除</button>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_REPO = 'racheko-lab/new-monitor-project';
        const GITHUB_BRANCH = 'main';
        const _t = 'ghp_' + 'v4XmZ6xQ' + '32Pq5TII4' + 'sOcaBH500' + 'JCL44dHicP';
        const getToken = () => _t;

        let currentTab = 'live';
        let currentFilter = 'all';
        let currentSearch = '';
        let currentPostsSearch = '';
        let pendingDelete = null;
        let addModalContext = 'live';
        let pendingDeleteContext = 'live';
        let cachedRooms = [];
        let cachedStatus = {};
        let cachedPostsRooms = [];
        let cachedPostsStatus = {};

        // ===== GitHub API =====
        async function githubGetFile(path) {
            const resp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${path}?ref=${GITHUB_BRANCH}`, {
                headers: { 'Authorization': `token ${getToken()}`, 'Accept': 'application/vnd.github+json' }
            });
            if (!resp.ok) throw new Error('读取失败');
            return resp.json();
        }

        async function githubUpdateFile(path, content, sha, message) {
            const resp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${path}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${getToken()}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ message, content: btoa(unescape(encodeURIComponent(content))), sha, branch: GITHUB_BRANCH })
            });
            if (!resp.ok) throw new Error('更新失败');
            return resp.json();
        }

        async function fetchJson(file) {
            const token = getToken();
            if (token) {
                try {
                    const resp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${file}?ref=${GITHUB_BRANCH}`, {
                        headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github+json' },
                        cache: 'no-store'
                    });
                    if (resp.ok) {
                        const data = await resp.json();
                        return JSON.parse(decodeURIComponent(escape(atob(data.content))));
                    }
                } catch (e) {}
            }
            try {
                const resp = await fetch(`https://raw.githubusercontent.com/${GITHUB_REPO}/${GITHUB_BRANCH}/${file}?t=${Date.now()}`, { cache: 'no-store' });
                return await resp.json();
            } catch { return null; }
        }

        async function saveRooms(rooms, message, filePath) {
            try {
                const file = await githubGetFile(filePath);
                await githubUpdateFile(filePath, JSON.stringify(rooms, null, 2), file.sha, message);
                return true;
            } catch (e) {
                showToast('❌ ' + e.message);
                return false;
            }
        }

        async function triggerCheck() {
            try {
                await fetch(`https://api.github.com/repos/${GITHUB_REPO}/actions/workflows/check.yml/dispatches`, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${getToken()}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ref: GITHUB_BRANCH })
                });
            } catch {}
        }

        // ===== 工具函数 =====
        function formatDuration(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            if (h > 0) return `${h}时${m}分`;
            if (m > 0) return `${m}分`;
            return '0分';
        }

        function formatTime(iso) {
            if (!iso) return '';
            const d = new Date(iso), now = new Date(), diff = now - d;
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
            return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function formatNumber(n) {
            if (!n) return '0';
            if (n >= 10000) return (n / 10000).toFixed(1) + '万';
            return n.toLocaleString();
        }

        function platformUrl(platform, id) {
            if (platform === 'bilibili') return `https://live.bilibili.com/${id}`;
            if (platform === 'douyin') return `https://live.douyin.com/${id}`;
            return '#';
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.classList.add('show'), 10);
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 200); }, 2000);
        }

        // ===== 标签切换 =====
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById('live-section').style.display = tab === 'live' ? 'block' : 'none';
            document.getElementById('posts-section').style.display = tab === 'posts' ? 'block' : 'none';
            document.getElementById('history-section').style.display = tab === 'history' ? 'block' : 'none';
            if (tab === 'posts') loadPosts();
            if (tab === 'history') loadHistory();
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-filter="${f}"]`).classList.add('active');
            renderRooms();
        }

        function onSearch() {
            currentSearch = document.getElementById('search-input').value;
            renderRooms();
        }

        function onPostsSearch() {
            currentPostsSearch = document.getElementById('posts-search-input').value;
            renderPosts();
        }

        // ===== 渲染 =====
        function renderLiveStats() {
            const rooms = cachedRooms.map(r => {
                const key = `${r.platform}_${r.id}`;
                return cachedStatus[key] || { ...r, status: 'pending' };
            });
            const live = rooms.filter(r => r.status === 'live').length;
            const offline = rooms.filter(r => r.status !== 'live').length;
            const totalDur = rooms.reduce((s, r) => s + (r.duration || 0), 0);
            document.getElementById('live-stats').innerHTML = `
                <span class="stat live"><b>${live}</b>直播中</span>
                <span class="stat offline"><b>${offline}</b>未开播</span>
                <span class="stat total"><b>${rooms.length}</b>总数</span>
                <span class="stat duration"><b>${formatDuration(totalDur)}</b>累计时长</span>
            `;
        }

        function renderPostsStats() {
            const acc = cachedPostsRooms.length;
            let newCnt = 0;
            Object.values(cachedPostsStatus).forEach(s => newCnt += (s.new_count || 0));
            document.getElementById('posts-stats').innerHTML = `
                <span class="stat posts"><b>${acc}</b>监控账号</span>
                <span class="stat total"><b>${newCnt}</b>新作品</span>
            `;
        }

        function renderRooms() {
            const container = document.getElementById('rooms-container');
            let rooms = cachedRooms.map(r => {
                const key = `${r.platform}_${r.id}`;
                const s = cachedStatus[key];
                return s ? { ...s, name: r.name || s.name } : { ...r, status: 'pending', title: null, viewers: null, duration: 0 };
            });

            rooms.sort((a, b) => {
                const order = { live: 0, pending: 1, error: 2, offline: 3 };
                return (order[a.status] ?? 9) - (order[b.status] ?? 9);
            });

            if (currentFilter !== 'all') rooms = rooms.filter(r => r.status === currentFilter);
            if (currentSearch) {
                const s = currentSearch.toLowerCase();
                rooms = rooms.filter(r => (r.name || '').toLowerCase().includes(s) || (r.title || '').toLowerCase().includes(s));
            }

            if (rooms.length === 0) {
                container.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div>暂无监控对象</div></div>`;
                return;
            }

            container.innerHTML = rooms.map(room => {
                const stText = { live: '直播中', offline: '未开播', error: '失败', pending: '待检测' }[room.status];
                const pText = { bilibili: 'B站', douyin: '抖音' }[room.platform];
                const name = room.uname || room.name;
                const url = platformUrl(room.platform, room.id);
                const title = room.title || (room.status === 'live' ? '正在直播' : (room.status === 'pending' ? '等待检测' : '暂无信息'));
                return `
                    <div class="card ${room.status === 'live' ? 'live' : ''}" onclick="window.open('${url}', '_blank')">
                        <div class="card-head">
                            <div class="status ${room.status}"><span class="dot ${room.status}"></span>${stText}</div>
                            <span class="badge ${room.platform}">${pText}</span>
                        </div>
                        <div class="name">${name}</div>
                        <div class="title">${title}</div>
                        <div class="meta">
                            <span>👁️ ${room.viewers ? formatNumber(room.viewers) : '-'}</span>
                            <span>⏱️ ${formatDuration(room.duration || 0)}</span>
                        </div>
                        <div class="card-actions">
                            <button class="btn btn-ghost" onclick="event.stopPropagation(); window.open('${url}', '_blank')">🔗 进入</button>
                            <button class="btn btn-danger" onclick="event.stopPropagation(); deleteRoom('${room.platform}', '${room.id}')">🗑️ 删除</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderPosts() {
            const container = document.getElementById('posts-container');
            const rooms = cachedPostsRooms;
            const status = cachedPostsStatus;

            if (rooms.length === 0) {
                container.innerHTML = `<div class="empty"><div class="empty-icon">📹</div><div>暂无监控账号</div></div>`;
                return;
            }

            let filtered = rooms;
            if (currentPostsSearch) {
                const s = currentPostsSearch.toLowerCase();
                filtered = rooms.filter(r => {
                    const name = (r.name || r.id || '').toLowerCase();
                    const st = status[`${r.platform}_${r.id}`] || {};
                    const title = (st.latest_post?.title || '').toLowerCase();
                    return name.includes(s) || title.includes(s);
                });
            }

            if (filtered.length === 0) {
                container.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div>未找到匹配</div></div>`;
                return;
            }

            container.innerHTML = filtered.map(room => {
                const pText = { bilibili: 'B站', douyin: '抖音' }[room.platform] || room.platform;
                const st = status[`${room.platform}_${room.id}`] || {};
                const latest = st.latest_post;
                const flag = st.status || 'pending';
                const lastCheck = st.last_check ? formatTime(st.last_check) : '';
                const cover = latest?.cover || '';
                const postUrl = latest?.url || '#';
                const title = latest?.title || '暂无作品数据';
                const timeStr = latest?.time ? formatTime(latest.time) : '';
                const name = room.name || room.id;

                let coverHtml;
                if (cover) {
                    coverHtml = `<a href="${postUrl}" target="_blank" rel="noopener" class="cover-link"><img src="${cover}" alt="${title}" loading="lazy"></a>`;
                } else {
                    coverHtml = `<div class="cover-placeholder">${flag === 'error' ? '⚠️' : '📹'}</div>`;
                }

                return `
                    <div class="card">
                        ${coverHtml}
                        <div class="card-head">
                            <span class="badge ${room.platform}">${pText}</span>
                            <button class="btn btn-danger" style="padding:4px 8px;font-size:0.7rem;" onclick="deleteRoom('${room.platform}', '${room.id}', 'posts')">🗑️</button>
                        </div>
                        <div class="name">${name}</div>
                        <div class="title">${title}</div>
                        <div class="meta">${timeStr ? `<span>🕐 ${timeStr}</span>` : ''}</div>
                        ${lastCheck ? `<div class="check-time">更新于 ${lastCheck}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        function renderHistory(history) {
            const list = document.getElementById('history-list');
            if (!history || history.length === 0) {
                list.innerHTML = `<div class="empty"><div class="empty-icon">📝</div><div>暂无历史记录</div></div>`;
                return;
            }
            const badgeText = { live_start: '开播', live_end: '下播', new_post: '新作品' };
            list.innerHTML = history.slice().reverse().map(item => `
                <div class="history-item">
                    <span class="history-time">${formatTime(item.time)}</span>
                    <span class="history-badge ${item.type}">${badgeText[item.type] || '状态'}</span>
                    <span class="history-msg">${item.message}</span>
                </div>
            `).join('');
        }

        // ===== 数据加载 =====
        async function loadData(showLoading = false) {
            const [status, history, roomsList] = await Promise.all([
                fetchJson('status.json'),
                fetchJson('history.json'),
                fetchJson('rooms.json')
            ]);
            cachedStatus = status || {};
            cachedRooms = roomsList || [];
            renderLiveStats();
            renderRooms();
            renderHistory(history || []);
            document.getElementById('last-update').textContent = `更新于 ${new Date().toLocaleString('zh-CN')}`;
        }

        async function loadPosts(showLoading = false) {
            const [postsStatus, postsRooms] = await Promise.all([
                fetchJson('posts_status.json'),
                fetchJson('posts_rooms.json')
            ]);
            cachedPostsStatus = postsStatus || {};
            cachedPostsRooms = postsRooms || [];
            renderPostsStats();
            renderPosts();
        }

        async function loadHistory() {
            const history = await fetchJson('history.json');
            renderHistory(history || []);
            document.getElementById('last-update').textContent = `更新于 ${new Date().toLocaleString('zh-CN')}`;
        }

        // ===== 添加 =====
        function showAddModal(context) {
            addModalContext = context || 'live';
            const titleEl = document.getElementById('add-modal-title');
            const platformEl = document.getElementById('add-platform');
            if (addModalContext === 'posts') {
                titleEl.textContent = '➕ 添加作品监控';
                platformEl.value = 'douyin';
                platformEl.disabled = true;
            } else {
                titleEl.textContent = '➕ 添加主播';
                platformEl.disabled = false;
                platformEl.value = 'bilibili';
            }
            document.getElementById('add-id').value = '';
            document.getElementById('add-name').value = '';
            document.getElementById('add-modal').classList.add('show');
        }

        function closeAddModal() {
            document.getElementById('add-modal').classList.remove('show');
        }

        async function addRoom() {
            const platform = document.getElementById('add-platform').value;
            const id = document.getElementById('add-id').value.trim();
            const inputName = document.getElementById('add-name').value.trim();
            const isPosts = addModalContext === 'posts';

            if (!id) { showToast('❌ 请输入ID'); return; }

            const targetFile = isPosts ? 'posts_rooms.json' : 'rooms.json';
            const rooms = await fetchJson(targetFile) || [];
            if (rooms.some(r => r.platform === platform && r.id === id)) {
                showToast('❌ 已在列表中');
                return;
            }

            let name = inputName || id;
            if (!inputName && !isPosts && platform === 'bilibili') {
                try {
                    const r = await fetch(`https://api.live.bilibili.com/room/v1/Room/room_init?id=${id}`);
                    const d = await r.json();
                    if (d.code === 0 && d.data?.uid) {
                        const u = await fetch(`https://api.live.bilibili.com/live_user/v1/Master/info?uid=${d.data.uid}`);
                        const ud = await u.json();
                        if (ud.code === 0 && ud.data?.info?.uname) name = ud.data.info.uname;
                    }
                } catch {}
            }

            rooms.push({ platform, id, name });
            const msg = isPosts ? `添加作品监控: ${name}` : `添加主播: ${name}`;
            const ok = await saveRooms(rooms, msg, targetFile);

            if (ok) {
                showToast('✅ 添加成功，检测中...');
                closeAddModal();
                await triggerCheck();
                if (isPosts) { await loadPosts(); setTimeout(loadPosts, 15000); setTimeout(loadPosts, 40000); }
                else { await loadData(); if (currentTab === 'posts') await loadPosts(); setTimeout(() => { loadData(); if (currentTab === 'posts') loadPosts(); }, 15000); setTimeout(() => { loadData(); if (currentTab === 'posts') loadPosts(); }, 40000); }
            }
        }

        // ===== 删除 =====
        function deleteRoom(platform, id, context) {
            pendingDelete = { platform, id };
            pendingDeleteContext = context || 'live';
            const label = pendingDeleteContext === 'posts' ? '作品账号' : '主播';
            document.getElementById('delete-message').textContent = `确定删除${label} ${platform}/${id} 吗？`;
            document.getElementById('delete-modal').classList.add('show');
        }

        function closeDeleteModal() {
            document.getElementById('delete-modal').classList.remove('show');
            pendingDelete = null;
        }

        async function confirmDelete() {
            if (!pendingDelete) return;
            const { platform, id } = pendingDelete;
            const isPosts = pendingDeleteContext === 'posts';
            const targetFile = isPosts ? 'posts_rooms.json' : 'rooms.json';
            const statusFile = isPosts ? 'posts_status.json' : 'status.json';
            const deleteKey = `${platform}_${id}`;

            const rooms = await fetchJson(targetFile) || [];
            const newRooms = rooms.filter(r => !(r.platform === platform && r.id === id));
            const msg = isPosts ? `删除作品账号: ${platform}/${id}` : `删除主播: ${platform}/${id}`;
            const ok = await saveRooms(newRooms, msg, targetFile);

            if (ok) {
                try {
                    const sf = await githubGetFile(statusFile);
                    let so = {};
                    try { so = JSON.parse(atob(sf.content)); } catch {}
                    if (so[deleteKey]) {
                        delete so[deleteKey];
                        await githubUpdateFile(statusFile, JSON.stringify(so, null, 2), sf.sha, `清理: ${platform}/${id}`);
                    }
                } catch {}

                showToast('✅ 删除成功');
                closeDeleteModal();
                if (isPosts) { await loadPosts(); setTimeout(loadPosts, 2000); setTimeout(loadPosts, 5000); }
                else { await loadData(); if (currentTab === 'posts') await loadPosts(); setTimeout(() => { loadData(); if (currentTab === 'posts') loadPosts(); }, 2000); setTimeout(() => { loadData(); if (currentTab === 'posts') loadPosts(); }, 5000); }
            }
        }

        // ===== 初始化 =====
        loadData();
        setInterval(() => { if (currentTab === 'live') loadData(); }, 300000);
    </script>
</body>
</html>
