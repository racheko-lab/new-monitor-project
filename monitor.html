<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直播监控中心</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            --card-bg: rgba(30, 41, 59, 0.8);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-primary);
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.15);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-value.live { color: var(--danger); }
        .stat-value.total { color: var(--primary-light); }
        .stat-value.offline { color: var(--text-muted); }
        .stat-value.duration { color: var(--success); }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .room-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 24px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .room-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .room-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 60px rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .room-card.live::before {
            opacity: 1;
            background: linear-gradient(90deg, transparent, var(--danger), transparent);
        }

        .room-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .room-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .status-dot.live {
            background: var(--danger);
            box-shadow: 0 0 12px var(--danger);
            animation: pulse 2s infinite;
        }

        .status-dot.offline {
            background: var(--text-muted);
        }

        .status-dot.error {
            background: var(--warning);
            box-shadow: 0 0 8px var(--warning);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-text.live { color: var(--danger); }
        .status-text.offline { color: var(--text-muted); }
        .status-text.error { color: var(--warning); }

        .platform-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary-light);
        }

        .room-name {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .room-title {
            font-size: 0.9375rem;
            color: var(--text-secondary);
            margin-bottom: 16px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .room-meta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .meta-icon {
            font-size: 1rem;
        }

        .meta-value {
            font-weight: 600;
        }

        .meta-value.live { color: var(--danger); }
        .meta-value.duration { color: var(--success); }

        .history-section {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 24px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--primary), var(--primary-light));
            border-radius: 2px;
        }

        .last-update {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .history-list {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .history-list::-webkit-scrollbar {
            width: 6px;
        }

        .history-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.5);
            border-radius: 3px;
        }

        .history-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s ease;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.02);
            padding-left: 8px;
            border-radius: 8px;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-time {
            color: var(--text-muted);
            font-size: 0.8125rem;
            min-width: 80px;
            flex-shrink: 0;
        }

        .history-badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .history-badge.live_start {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }

        .history-badge.live_end {
            background: rgba(100, 116, 139, 0.15);
            color: var(--text-secondary);
        }

        .history-badge.new_post {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }

        .history-badge.error {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
        }

        .history-message {
            flex: 1;
            font-size: 0.875rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .refresh-btn {
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: var(--primary-light);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .refresh-btn:hover {
            background: rgba(99, 102, 241, 0.25);
            border-color: rgba(99, 102, 241, 0.5);
            transform: translateY(-1px);
        }

        .refresh-btn:active {
            transform: translateY(0);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(99, 102, 241, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.75rem;
            }

            .rooms-grid {
                grid-template-columns: 1fr;
            }

            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }

            .stat-value {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📡 直播监控中心</h1>
            <p>实时监控您关注的主播动态</p>
        </div>

        <div class="stats-bar" id="stats-bar">
            <div class="stat-card">
                <div class="stat-value live" id="stat-live">0</div>
                <div class="stat-label">直播中</div>
            </div>
            <div class="stat-card">
                <div class="stat-value offline" id="stat-offline">0</div>
                <div class="stat-label">未开播</div>
            </div>
            <div class="stat-card">
                <div class="stat-value total" id="stat-total">0</div>
                <div class="stat-label">监控总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value duration" id="stat-duration">0</div>
                <div class="stat-label">今日直播时长</div>
            </div>
        </div>

        <div class="rooms-grid" id="rooms-container">
            <div class="loading">
                <div class="spinner"></div>
                <p>加载中...</p>
            </div>
        </div>

        <div class="history-section">
            <div class="section-header">
                <div class="section-title">📝 历史记录</div>
                <div style="display: flex; align-items: center; gap: 16px;">
                    <button class="refresh-btn" onclick="loadData()">
                        🔄 刷新
                    </button>
                    <span class="last-update" id="last-update"></span>
                </div>
            </div>
            <div class="history-list" id="history-list"></div>
        </div>
    </div>

    <script>
        const GITHUB_REPO = 'racheko-lab/new-monitor-project';
        const GITHUB_BRANCH = 'main';

        async function fetchJson(file) {
            const url = `https://raw.githubusercontent.com/${GITHUB_REPO}/${GITHUB_BRANCH}/${file}`;
            try {
                const resp = await fetch(url, { cache: 'no-cache' });
                return await resp.json();
            } catch {
                return null;
            }
        }

        function formatDuration(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            if (h > 0) return `${h}小时${m}分钟`;
            if (m > 0) return `${m}分钟`;
            return '0分钟';
        }

        function formatTime(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
            return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function updateStats(status) {
            if (!status) return;
            const rooms = Object.values(status);
            const liveCount = rooms.filter(r => r.status === 'live').length;
            const offlineCount = rooms.filter(r => r.status === 'offline').length;
            const totalDuration = rooms.reduce((sum, r) => sum + (r.duration || 0), 0);

            document.getElementById('stat-live').textContent = liveCount;
            document.getElementById('stat-offline').textContent = offlineCount;
            document.getElementById('stat-total').textContent = rooms.length;
            document.getElementById('stat-duration').textContent = formatDuration(totalDuration);
        }

        function renderRooms(status) {
            const container = document.getElementById('rooms-container');
            if (!status) {
                container.innerHTML = `
                    <div class="loading">
                        <p>加载失败，请稍后重试</p>
                    </div>
                `;
                return;
            }

            const rooms = Object.values(status).sort((a, b) => {
                const order = { live: 0, error: 1, offline: 2 };
                return order[a.status] - order[b.status];
            });

            container.innerHTML = rooms.map(room => {
                const statusClass = room.status;
                const statusText = { live: '直播中', offline: '未开播', error: '检测失败' }[room.status];
                const platformText = { bilibili: '哔哩哔哩', douyin: '抖音' }[room.platform];
                const duration = formatDuration(room.duration || 0);
                const viewers = room.viewers ? `${room.viewers.toLocaleString()}` : '-';

                return `
                    <div class="room-card ${room.status === 'live' ? 'live' : ''}">
                        <div class="room-header">
                            <div class="room-status">
                                <div class="status-dot ${statusClass}"></div>
                                <span class="status-text ${statusClass}">${statusText}</span>
                            </div>
                            <span class="platform-badge">${platformText}</span>
                        </div>
                        <div class="room-name">${room.name}</div>
                        <div class="room-title">${room.title || (room.status === 'live' ? '正在直播...' : '暂无直播信息')}</div>
                        <div class="room-meta">
                            <div class="meta-item">
                                <span class="meta-icon">👁️</span>
                                <span class="meta-value ${room.status === 'live' ? 'live' : ''}">${viewers} 观看</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-icon">⏱️</span>
                                <span class="meta-value duration">${duration}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderHistory(history) {
            const list = document.getElementById('history-list');
            if (!history || history.length === 0) {
                list.innerHTML = `
                    <div class="loading" style="padding: 20px;">
                        <p style="color: var(--text-muted);">暂无历史记录</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = history.slice().reverse().map(item => {
                const time = formatTime(item.time);
                const badgeClass = item.type;

                return `
                    <div class="history-item">
                        <span class="history-time">${time}</span>
                        <span class="history-badge ${badgeClass}">
                            ${item.type === 'live_start' ? '开播' : 
                              item.type === 'live_end' ? '下播' : 
                              item.type === 'new_post' ? '新作品' : '状态'}
                        </span>
                        <span class="history-message">${item.message}</span>
                    </div>
                `;
            }).join('');
        }

        async function loadData() {
            const [status, history] = await Promise.all([
                fetchJson('status.json'),
                fetchJson('history.json')
            ]);
            updateStats(status);
            renderRooms(status);
            renderHistory(history);
            document.getElementById('last-update').textContent = `最后更新: ${new Date().toLocaleString('zh-CN')}`;
        }

        loadData();
        setInterval(loadData, 300000);
    </script>
</body>
</html>
