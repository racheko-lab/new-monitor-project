<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0b;
            --surface: #131316;
            --surface-2: #1a1a1f;
            --border: rgba(255, 255, 255, 0.07);
            --border-strong: rgba(255, 255, 255, 0.12);
            --text: #f4f4f5;
            --text-2: #a1a1aa;
            --text-3: #71717a;
            --text-4: #3f3f46;
            --live: #ef4444;
            --live-bg: rgba(239, 68, 68, 0.1);
            --new: #60a5fa;
            --new-bg: rgba(96, 165, 250, 0.1);
            --warn: #f59e0b;
            --radius: 14px;
            --radius-sm: 10px;
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html { font-size: 15px; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', monospace; font-variant-numeric: tabular-nums; }

        .app {
            max-width: 720px;
            margin: 0 auto;
            padding: 56px 24px 100px;
        }

        /* ===== Header ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        .header-title {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--text);
        }

        .btn-add {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s var(--ease);
        }

        .btn-add:hover {
            background: var(--surface-2);
            color: var(--text);
            border-color: var(--border-strong);
            transform: translateY(-1px);
        }

        .btn-add:active { transform: translateY(0); }

        .btn-add svg { width: 16px; height: 16px; }

        /* ===== Tabs ===== */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 28px;
            background: var(--surface);
            padding: 4px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }

        .tab {
            flex: 1;
            padding: 10px 16px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-3);
            cursor: pointer;
            border: none;
            background: none;
            border-radius: 8px;
            transition: all 0.2s var(--ease);
            font-family: inherit;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .tab:hover { color: var(--text-2); background: rgba(255,255,255,0.03); }

        .tab.active {
            color: var(--text);
            background: var(--surface-2);
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .tab-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-4);
            font-weight: 400;
            padding: 2px 6px;
            background: rgba(255,255,255,0.04);
            border-radius: 5px;
        }

        .tab.active .tab-count { color: var(--text-3); background: rgba(255,255,255,0.06); }

        /* ===== Filter pills ===== */
        .filters {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
        }

        .filter {
            padding: 7px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            background: none;
            color: var(--text-3);
            transition: all 0.15s var(--ease);
            font-family: inherit;
        }

        .filter:hover { color: var(--text-2); background: var(--surface); }

        .filter.active {
            color: var(--text);
            background: var(--surface);
            border-color: var(--border);
        }

        /* ===== Card Container ===== */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .list {
            display: flex;
            flex-direction: column;
        }

        .list > * + * {
            border-top: 1px solid var(--border);
        }

        /* ===== Row ===== */
        .row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            cursor: pointer;
            transition: background 0.15s var(--ease);
            position: relative;
        }

        .row:hover { background: var(--surface-2); }
        .row:hover .row-delete { opacity: 1; }

        .row.live {
            background: linear-gradient(90deg, var(--live-bg) 0%, transparent 60%);
        }
        .row.live:hover {
            background: linear-gradient(90deg, rgba(239, 68, 68, 0.14) 0%, var(--surface-2) 60%);
        }

        /* Avatar */
        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
            background: var(--surface-2);
            border: 1px solid var(--border);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-fb {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-3);
            background: var(--surface-2);
        }

        /* Avatar link (for posts) */
        .av-link {
            display: block;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
            background: var(--surface-2);
            border: 1px solid var(--border);
            position: relative;
            transition: all 0.2s var(--ease);
        }

        .av-link img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.2s var(--ease), transform 0.2s var(--ease);
        }

        .av-link:hover img { filter: brightness(0.6); transform: scale(1.05); }

        .av-link .play-ico {
            position: absolute;
            top: 50%;
            left: 52%;
            transform: translate(-50%, -50%);
            width: 0;
            height: 0;
            border-left: 10px solid #fff;
            border-top: 7px solid transparent;
            border-bottom: 7px solid transparent;
            opacity: 0;
            transition: opacity 0.2s var(--ease);
            z-index: 1;
            filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5));
        }

        .av-link:hover .play-ico { opacity: 1; }

        /* Content */
        .row-body {
            flex: 1;
            min-width: 0;
        }

        .row-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
        }

        .row-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.015em;
        }

        .row-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--text-4);
            font-weight: 500;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            padding: 3px 7px;
            background: rgba(255,255,255,0.03);
            border-radius: 5px;
            flex-shrink: 0;
        }

        .row-status {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            flex-shrink: 0;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .row-status.live { color: var(--live); }
        .row-status.offline { color: var(--text-4); }
        .row-status.pending { color: var(--new); }
        .row-status.error { color: var(--warn); }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot.live { background: var(--live); box-shadow: 0 0 8px var(--live); animation: pulse 2s infinite; }
        .dot.offline { background: var(--text-4); }
        .dot.pending { background: var(--new); }
        .dot.error { background: var(--warn); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .row-sub {
            font-size: 0.85rem;
            color: var(--text-2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
        }

        .row-meta {
            display: flex;
            gap: 16px;
            margin-top: 6px;
            font-size: 0.75rem;
            color: var(--text-3);
        }

        .row-meta span {
            font-family: 'JetBrains Mono', monospace;
            font-variant-numeric: tabular-nums;
        }

        /* Delete */
        .row-delete {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: none;
            color: var(--text-4);
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.15s var(--ease);
        }

        .row-delete:hover {
            background: var(--live-bg);
            color: var(--live);
        }

        .row-delete svg { width: 14px; height: 14px; }

        /* ===== History Timeline ===== */
        .timeline-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 8px 0;
        }

        .timeline {
            display: flex;
            flex-direction: column;
        }

        .tl-item {
            display: flex;
            gap: 16px;
            padding: 14px 20px;
            transition: background 0.15s var(--ease);
        }

        .tl-item:hover { background: var(--surface-2); }
        .tl-item + .tl-item { border-top: 1px solid var(--border); }

        .tl-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-4);
            min-width: 64px;
            flex-shrink: 0;
            padding-top: 2px;
        }

        .tl-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 5px;
        }

        .tl-dot.live_start { background: var(--live); box-shadow: 0 0 6px var(--live); }
        .tl-dot.live_end { background: var(--text-4); }
        .tl-dot.new_post { background: var(--new); box-shadow: 0 0 6px var(--new); }
        .tl-dot.error { background: var(--warn); }

        .tl-text {
            font-size: 0.85rem;
            color: var(--text-2);
            flex: 1;
            line-height: 1.5;
        }

        /* ===== Empty ===== */
        .empty {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-circle {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 1px solid var(--border);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface-2);
        }

        .empty-circle svg { width: 20px; height: 20px; color: var(--text-4); }

        .empty-text {
            font-size: 0.875rem;
            color: var(--text-3);
        }

        /* ===== Modal ===== */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.2s var(--ease);
        }

        .overlay.show { display: flex; }
        .overlay.show.visible { opacity: 1; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius);
            padding: 28px;
            width: 100%;
            max-width: 400px;
            transform: translateY(8px) scale(0.98);
            transition: transform 0.2s var(--ease);
            box-shadow: 0 24px 48px rgba(0,0,0,0.4);
        }

        .overlay.visible .modal { transform: translateY(0) scale(1); }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 24px;
            letter-spacing: -0.02em;
        }

        .field { margin-bottom: 18px; }

        .field label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-3);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .field input, .field select {
            width: 100%;
            padding: 11px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 0.875rem;
            font-family: inherit;
            outline: none;
            transition: all 0.15s var(--ease);
        }

        .field input:focus, .field select:focus {
            border-color: var(--border-strong);
            background: var(--surface-2);
        }
        .field input::placeholder { color: var(--text-4); }
        .field select:disabled { opacity: 0.4; }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 28px;
        }

        .mbtn {
            flex: 1;
            padding: 11px;
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            font-family: inherit;
            transition: all 0.15s var(--ease);
        }

        .mbtn-primary {
            background: var(--text);
            color: var(--bg);
        }
        .mbtn-primary:hover { background: #fff; transform: translateY(-1px); }
        .mbtn-primary:active { transform: translateY(0); }

        .mbtn-ghost {
            background: none;
            color: var(--text-2);
            border-color: var(--border);
        }
        .mbtn-ghost:hover { background: var(--surface-2); color: var(--text); border-color: var(--border-strong); }

        .mbtn-danger {
            background: var(--live-bg);
            color: var(--live);
            border-color: rgba(239, 68, 68, 0.2);
        }
        .mbtn-danger:hover { background: rgba(239, 68, 68, 0.18); }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(12px);
            background: var(--surface-2);
            border: 1px solid var(--border-strong);
            color: var(--text);
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 500;
            z-index: 200;
            opacity: 0;
            transition: all 0.25s var(--ease);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 640px) {
            .app { padding: 32px 16px 80px; }
            .header { margin-bottom: 28px; }
            .header-title { font-size: 1.4rem; }
            .row { padding: 14px 16px; gap: 12px; }
            .avatar, .av-link { width: 40px; height: 40px; }
            .row-delete { opacity: 1; }
            .tabs { margin-bottom: 20px; }
            .tl-item { padding: 12px 16px; }
            .empty { padding: 60px 20px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <h1 class="header-title">Monitor</h1>
            <button class="btn-add" onclick="showAddModal()" aria-label="添加">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            </button>
        </header>

        <nav class="tabs">
            <button class="tab active" id="tab-live" onclick="switchTab('live')">直播<span class="tab-count" id="live-n"></span></button>
            <button class="tab" id="tab-posts" onclick="switchTab('posts')">作品<span class="tab-count" id="posts-n"></span></button>
            <button class="tab" id="tab-history" onclick="switchTab('history')">历史</button>
        </nav>

        <section id="live-section">
            <div class="filters">
                <button class="filter active" data-f="all" onclick="setFilter('all')">全部</button>
                <button class="filter" data-f="live" onclick="setFilter('live')">直播中</button>
            </div>
            <div class="card" id="live-card">
                <div class="list" id="rooms-list"></div>
            </div>
        </section>

        <section id="posts-section" style="display:none;">
            <div class="card" id="posts-card">
                <div class="list" id="posts-list"></div>
            </div>
        </section>

        <section id="history-section" style="display:none;">
            <div class="timeline-card" id="history-card">
                <div class="timeline" id="tl-list"></div>
            </div>
        </section>
    </div>

    <div class="overlay" id="add-modal">
        <div class="modal">
            <div class="modal-title">添加监控</div>
            <div class="field">
                <label>类型</label>
                <select id="add-ctx" onchange="onCtxChange()">
                    <option value="live">直播监控</option>
                    <option value="posts">作品监控</option>
                </select>
            </div>
            <div class="field" id="plat-field">
                <label>平台</label>
                <select id="add-plat">
                    <option value="bilibili">哔哩哔哩</option>
                    <option value="douyin">抖音</option>
                </select>
            </div>
            <div class="field">
                <label>房间号 / 用户 ID</label>
                <input type="text" id="add-id" placeholder="输入 ID">
            </div>
            <div class="field">
                <label>名称（可选）</label>
                <input type="text" id="add-name" placeholder="留空自动获取">
            </div>
            <div class="modal-actions">
                <button class="mbtn mbtn-ghost" onclick="closeAdd()">取消</button>
                <button class="mbtn mbtn-primary" onclick="doAdd()">添加</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="del-modal">
        <div class="modal">
            <div class="modal-title">删除确认</div>
            <p style="color:var(--text-2);font-size:0.875rem;margin-bottom:8px;line-height:1.6;" id="del-msg"></p>
            <div class="modal-actions">
                <button class="mbtn mbtn-ghost" onclick="closeDel()">取消</button>
                <button class="mbtn mbtn-danger" onclick="doDel()">删除</button>
            </div>
        </div>
    </div>

    <script>
        const REPO = 'racheko-lab/new-monitor-project';
        const BRANCH = 'main';
        const TK = 'ghp_' + 'v4XmZ6xQ' + '32Pq5TII4' + 'sOcaBH500' + 'JCL44dHicP';
        const tok = () => TK;

        let tab = 'live', filter = 'all';
        let rooms = [], status = {}, prooms = [], pstatus = [];
        let pendingDel = null, delCtx = 'live', addCtx = 'live';

        async function ghGet(p) {
            const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${p}?ref=${BRANCH}`, {
                headers: { Authorization: `token ${tok()}`, Accept: 'application/vnd.github+json' }
            });
            if (!r.ok) throw new Error('fail');
            return r.json();
        }
        async function ghPut(p, c, s, m) {
            const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${p}`, {
                method: 'PUT',
                headers: { Authorization: `token ${tok()}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: m, content: btoa(unescape(encodeURIComponent(c))), sha: s, branch: BRANCH })
            });
            if (!r.ok) throw new Error('fail');
            return r.json();
        }
        async function fetchJ(f) {
            if (tok()) {
                try {
                    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${f}?ref=${BRANCH}`, {
                        headers: { Authorization: `token ${tok()}`, Accept: 'application/vnd.github+json' }, cache: 'no-store'
                    });
                    if (r.ok) { const d = await r.json(); return JSON.parse(decodeURIComponent(escape(atob(d.content)))); }
                } catch {}
            }
            try { const r = await fetch(`https://raw.githubusercontent.com/${REPO}/${BRANCH}/${f}?t=${Date.now()}`, {cache:'no-store'}); return await r.json(); }
            catch { return null; }
        }
        async function saveRooms(arr, msg, fp) {
            try { const f = await ghGet(fp); await ghPut(fp, JSON.stringify(arr,null,2), f.sha, msg); return true; }
            catch (e) { toast('失败: '+e.message); return false; }
        }
        async function trigger() {
            try { await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/check.yml/dispatches`, {
                method:'POST', headers:{Authorization:`token ${tok()}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},
                body: JSON.stringify({ref:BRANCH}) }); } catch {}
        }

        function fmtDur(s) { const h=Math.floor(s/3600),m=Math.floor((s%3600)/60); return h?`${h}h ${m}m`:(m?`${m}m`:'0m'); }
        function fmtTime(iso) {
            if(!iso) return '';
            const d=new Date(iso), n=new Date(), df=n-d;
            if(df<60000) return '刚刚';
            if(df<3600000) return Math.floor(df/60000)+'m';
            if(df<86400000) return Math.floor(df/3600000)+'h';
            return d.toLocaleDateString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
        }
        function fmtNum(n) { return n>=10000?(n/10000).toFixed(1)+'w':(n||'0').toLocaleString(); }
        function pUrl(p,id) { return p==='bilibili'?`https://live.bilibili.com/${id}`:(p==='douyin'?`https://live.douyin.com/${id}`:'#'); }
        function esc(s){return(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
        function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);requestAnimationFrame(()=>t.classList.add('show'));setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),250);},2200);}

        function switchTab(t) {
            tab=t;
            document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            document.getElementById('live-section').style.display=t==='live'?'block':'none';
            document.getElementById('posts-section').style.display=t==='posts'?'block':'none';
            document.getElementById('history-section').style.display=t==='history'?'block':'none';
            if(t==='posts') loadPosts();
            if(t==='history') loadHistory();
        }
        function setFilter(f){filter=f;document.querySelectorAll('.filter').forEach(b=>b.classList.remove('active'));document.querySelector(`[data-f="${f}"]`).classList.add('active');renderRooms();}

        const TRASH_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6m5 0V4a1 1 0 011-1h2a1 1 0 011 1v2"/></svg>';

        function renderRooms() {
            const card=document.getElementById('live-card');
            let arr=rooms.map(r=>{const k=`${r.platform}_${r.id}`,s=status[k];return s?{...s,name:r.name||s.name}:{...r,status:'pending',title:null,viewers:null,duration:0};});
            arr.sort((a,b)=>({live:0,pending:1,error:2,offline:3}[a.status]??9)-({live:0,pending:1,error:2,offline:3}[b.status]??9));
            const liveN=arr.filter(r=>r.status==='live').length;
            document.getElementById('live-n').textContent=arr.length?` ${liveN}/${arr.length}`:'';
            if(filter!=='all') arr=arr.filter(r=>r.status===filter);
            if(!arr.length){
                card.innerHTML = emptyHtml('暂无监控对象');
                return;
            }
            card.innerHTML = `<div class="list">${arr.map(r=>{
                const st={live:'LIVE',offline:'OFF',error:'ERR',pending:'...'}[r.status];
                const nm=esc(r.uname||r.name);
                const ttl=esc(r.title||(r.status==='live'?'正在直播':r.status==='pending'?'检测中':'—'));
                const av=r.avatar?`<img src="${r.avatar}" alt="${nm}" referrerpolicy="no-referrer">`:`<div class="avatar-fb">${esc((nm||'?')[0])}</div>`;
                const v=r.viewers?fmtNum(r.viewers):'—',d=fmtDur(r.duration||0);
                return `<div class="row ${r.status==='live'?'live':''}" onclick="window.open('${pUrl(r.platform,r.id)}','_blank')">
                    <div class="avatar">${av}</div>
                    <div class="row-body">
                        <div class="row-top">
                            <span class="row-name">${nm}</span>
                            <span class="row-tag">${r.platform==='bilibili'?'BILI':'DY'}</span>
                            <span class="row-status ${r.status}"><span class="dot ${r.status}"></span>${st}</span>
                        </div>
                        <div class="row-sub">${ttl}</div>
                        <div class="row-meta"><span>${v} 观看</span><span>${d}</span></div>
                    </div>
                    <button class="row-delete" onclick="event.stopPropagation();askDel('${r.platform}','${r.id}')">${TRASH_SVG}</button>
                </div>`;
            }).join('')}</div>`;
        }

        function renderPosts() {
            const card=document.getElementById('posts-card');
            document.getElementById('posts-n').textContent=prooms.length?` ${prooms.length}`:'';
            if(!prooms.length){
                card.innerHTML = emptyHtml('暂无监控账号');
                return;
            }
            card.innerHTML = `<div class="list">${prooms.map(r=>{
                const st=pstatus[`${r.platform}_${r.id}`]||{},lp=st.latest_post;
                const nm=esc(r.name||r.id),ttl=esc(lp?.title||'暂无作品'),ts=lp?.time?fmtTime(lp.time):'';
                const av=st.avatar||lp?.avatar,url=lp?.url||'#';
                const avH=av?`<a href="${url}" target="_blank" rel="noopener" class="av-link"><img src="${av}" referrerpolicy="no-referrer" alt="${nm}"><span class="play-ico"></span></a>`:`<div class="avatar"><div class="avatar-fb">${esc((nm||'?')[0])}</div></div>`;
                return `<div class="row">
                    ${avH}
                    <div class="row-body">
                        <div class="row-top">
                            <span class="row-name">${nm}</span>
                            <span class="row-tag">${r.platform==='bilibili'?'BILI':'DY'}</span>
                        </div>
                        <div class="row-sub">${ttl}</div>
                        ${ts?`<div class="row-meta"><span>${ts}</span></div>`:''}
                    </div>
                    <button class="row-delete" onclick="askDel('${r.platform}','${r.id}','posts')">${TRASH_SVG}</button>
                </div>`;
            }).join('')}</div>`;
        }

        function renderHistory(h) {
            const card=document.getElementById('history-card');
            if(!h||!h.length){
                card.innerHTML = emptyHtml('暂无记录');
                return;
            }
            const tg={live_start:'live_start',live_end:'live_end',new_post:'new_post'};
            card.innerHTML = `<div class="timeline">${h.slice().reverse().map(i=>`<div class="tl-item">
                <span class="tl-time">${fmtTime(i.time)}</span>
                <span class="tl-dot ${tg[i.type]||'live_end'}"></span>
                <span class="tl-text">${esc(i.message)}</span>
            </div>`).join('')}</div>`;
        }

        function emptyHtml(t){return`<div class="empty"><div class="empty-circle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/></svg></div><div class="empty-text">${t}</div></div>`;}

        async function loadData() {
            const[s,h,rl]=await Promise.all([fetchJ('status.json'),fetchJ('history.json'),fetchJ('rooms.json')]);
            status=s||{};rooms=rl||[];renderRooms();renderHistory(h||[]);
        }
        async function loadPosts() {
            const[ps,pr]=await Promise.all([fetchJ('posts_status.json'),fetchJ('posts_rooms.json')]);
            pstatus=ps||{};prooms=pr||[];renderPosts();
        }
        async function loadHistory(){const h=await fetchJ('history.json');renderHistory(h||[]);}

        function showAddModal(c){
            addCtx=c||(tab==='posts'?'posts':'live');
            document.getElementById('add-ctx').value=addCtx;
            onCtxChange();
            document.getElementById('add-id').value='';
            document.getElementById('add-name').value='';
            const m=document.getElementById('add-modal');
            m.classList.add('show');
            requestAnimationFrame(()=>m.classList.add('visible'));
        }
        function onCtxChange(){
            addCtx=document.getElementById('add-ctx').value;
            const p=document.getElementById('add-plat'),pf=document.getElementById('plat-field');
            if(addCtx==='posts'){p.value='douyin';p.disabled=true;pf.style.opacity='0.4';}
            else{p.disabled=false;pf.style.opacity='1';p.value='bilibili';}
        }
        function closeAdd(){
            const m=document.getElementById('add-modal');
            m.classList.remove('visible');
            setTimeout(()=>m.classList.remove('show'),200);
        }

        function askDel(p,id,c){
            pendingDel={p,id};delCtx=c||'live';
            document.getElementById('del-msg').textContent=`删除${delCtx==='posts'?'作品账号':'主播'} ${p}/${id}？`;
            const m=document.getElementById('del-modal');
            m.classList.add('show');
            requestAnimationFrame(()=>m.classList.add('visible'));
        }
        function closeDel(){
            const m=document.getElementById('del-modal');
            m.classList.remove('visible');
            setTimeout(()=>m.classList.remove('show'),200);
            pendingDel=null;
        }

        async function doAdd(){
            const p=document.getElementById('add-plat').value,id=document.getElementById('add-id').value.trim(),nm=document.getElementById('add-name').value.trim();
            const ip=addCtx==='posts';
            if(!id){toast('请输入 ID');return;}
            const tf=ip?'posts_rooms.json':'rooms.json',arr=(await fetchJ(tf))||[];
            if(arr.some(r=>r.platform===p&&r.id===id)){toast('已存在');return;}
            let name=nm||id;
            if(!nm&&!ip&&p==='bilibili'){try{const r=await fetch(`https://api.live.bilibili.com/room/v1/Room/room_init?id=${id}`),d=await r.json();if(d.code===0&&d.data?.uid){const u=await fetch(`https://api.live.bilibili.com/live_user/v1/Master/info?uid=${d.data.uid}`),ud=await u.json();if(ud.code===0&&ud.data?.info?.uname)name=ud.data.info.uname;}}catch{}}
            arr.push({platform:p,id,name:name});
            if(await saveRooms(arr,ip?`添加作品: ${name}`:`添加主播: ${name}`,tf)){
                toast('已添加');closeAdd();await trigger();
                if(ip){await loadPosts();setTimeout(loadPosts,15000);setTimeout(loadPosts,40000);}
                else{await loadData();setTimeout(loadData,15000);setTimeout(loadData,40000);}
            }
        }

        async function doDel(){
            if(!pendingDel)return;const{p,id}=pendingDel,ip=delCtx==='posts';
            const tf=ip?'posts_rooms.json':'rooms.json',sf=ip?'posts_status.json':'status.json',dk=`${p}_${id}`;
            const arr=(await fetchJ(tf))||[],nr=arr.filter(r=>!(r.platform===p&&r.id===id));
            if(await saveRooms(nr,ip?`删除作品: ${p}/${id}`:`删除主播: ${p}/${id}`,tf)){
                try{const f=await ghGet(sf);let o={};try{o=JSON.parse(atob(f.content));}catch{}if(o[dk]){delete o[dk];await ghPut(sf,JSON.stringify(o,null,2),f.sha,`清理: ${p}/${id}`);}}catch{}
                toast('已删除');closeDel();
                if(ip){await loadPosts();setTimeout(loadPosts,2000);}else{await loadData();setTimeout(loadData,2000);}
            }
        }

        document.querySelectorAll('.overlay').forEach(ov => {
            ov.addEventListener('click', e => { if(e.target === ov) { if(ov.id==='add-modal') closeAdd(); else closeDel(); } });
        });
        document.addEventListener('keydown', e => {
            if(e.key === 'Escape') { closeAdd(); closeDel(); }
        });

        loadData();
        setInterval(loadData, 300000);
    </script>
</body>
</html>
