name: Check Status

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: check-status
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium

      - name: Check live status
        id: check_live
        continue-on-error: true
        env:
          MONITOR_CONFIG: ${{ secrets.MONITOR_CONFIG }}
        run: python monitor.py

      - name: Check new posts
        id: check_posts
        continue-on-error: true
        env:
          MONITOR_CONFIG: ${{ secrets.MONITOR_CONFIG }}
        run: xvfb-run -a python check_posts.py

      - name: Commit status
        if: always()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add status.json state.json history.json posts.json posts_status.json rooms.json posts_rooms.json 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Update status [skip ci]"
          git pull --rebase origin main 2>/dev/null || true
          git push || echo "push skipped (no changes or conflict)"

      - name: Schedule next run
        if: always()
        run: |
          sleep 600
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/check.yml/dispatches \
            -d '{"ref":"main"}'
